<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The League – Fantasy Baseball Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* ── Tokens ────────────────────────────────────────────────────────────── */
:root {
  --bg:          #090c14;
  --bg2:         #0f1420;
  --bg3:         #161c2d;
  --border:      #1e2840;
  --amber:       #f5a623;
  --amber-dim:   #c4851a;
  --amber-glow:  rgba(245, 166, 35, 0.15);
  --red:         #e05c3a;
  --green:       #3dd68c;
  --blue:        #4e9af1;
  --text:        #d1d9f0;
  --text-dim:    #6b7a99;
  --text-bright: #f0f4ff;
  --my-team:     rgba(245, 166, 35, 0.08);
  --my-border:   rgba(245, 166, 35, 0.4);
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'Barlow Condensed', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
}

/* ── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
.site-wrapper {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 16px 60px;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
header {
  padding: 36px 0 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 12px;
  justify-content: space-between;
}

.header-left {}
.league-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.league-title {
  font-family: var(--font-display);
  font-size: clamp(42px, 6vw, 72px);
  color: var(--text-bright);
  line-height: 1;
  letter-spacing: 0.02em;
}
.league-season {
  font-family: var(--font-display);
  font-size: clamp(42px, 6vw, 72px);
  color: var(--amber);
  line-height: 1;
  letter-spacing: 0.02em;
}

.header-right {
  text-align: right;
}
.my-team-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
  background: var(--amber-glow);
  border: 1px solid var(--my-border);
  border-radius: 4px;
  padding: 4px 10px;
  margin-bottom: 8px;
}
.last-updated {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
}

/* ── Tab Nav ─────────────────────────────────────────────────────────────── */
.tab-nav {
  display: flex;
  gap: 4px;
  padding: 20px 0 0;
  flex-wrap: wrap;
}

.tab-btn {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 9px 20px;
  cursor: pointer;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
}
.tab-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--amber-glow);
  opacity: 0;
  transition: opacity 0.18s;
}
.tab-btn:hover {
  color: var(--amber);
  border-color: var(--amber-dim);
}
.tab-btn:hover::before { opacity: 1; }
.tab-btn.active {
  color: var(--bg);
  background: var(--amber);
  border-color: var(--amber);
  font-weight: 700;
  box-shadow: 0 0 20px var(--amber-glow);
}

/* ── Tab Panels ─────────────────────────────────────────────────────────── */
.tab-panel { display: none; padding-top: 28px; }
.tab-panel.active { display: block; animation: fadeUp 0.25s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Section Label ───────────────────────────────────────────────────────── */
.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* ── Data Table ─────────────────────────────────────────────────────────── */
.data-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-body);
  font-size: 14px;
}
thead th {
  background: var(--bg2);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
thead th.num { text-align: right; }
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr.my-team-row {
  background: var(--my-team);
  border-left: 2px solid var(--amber);
}
tbody tr.my-team-row:hover { background: rgba(245,166,35,0.12); }
tbody td {
  padding: 11px 14px;
  color: var(--text);
  white-space: nowrap;
}
tbody td.num {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 13px;
}
tbody td.team-name {
  font-weight: 600;
  color: var(--text-bright);
  font-size: 15px;
}
tbody td.rank-col {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text-dim);
  text-align: center;
  width: 44px;
}
tbody tr.my-team-row td.team-name { color: var(--amber); }
tbody tr.my-team-row td.rank-col  { color: var(--amber); }
.win  { color: var(--green) !important; }
.loss { color: var(--red) !important; }

/* record cell */
.record-cell {
  font-family: var(--font-mono);
  font-size: 13px;
}

/* ── Standings Tab ─────────────────────────────────────────────────────── */
.streak-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  font-weight: 500;
}
.streak-w { background: rgba(61, 214, 140, 0.12); color: var(--green); }
.streak-l { background: rgba(224, 92, 58, 0.12);  color: var(--red); }

/* playoff line */
.playoff-divider td {
  border-top: 2px dashed var(--amber-dim) !important;
}

/* ── Matchups Tab ─────────────────────────────────────────────────────── */
.matchups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
  gap: 14px;
}
.matchup-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.matchup-card.has-my-team {
  border-color: var(--amber-dim);
  box-shadow: 0 0 18px var(--amber-glow);
}
.matchup-header {
  background: var(--bg3);
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.matchup-header .leader-tag {
  color: var(--amber);
  font-weight: 500;
}
.matchup-teams {
  padding: 14px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.matchup-team-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.matchup-team-name {
  font-weight: 600;
  font-size: 16px;
  color: var(--text-bright);
  flex: 1;
}
.matchup-team-name.is-mine { color: var(--amber); }
.matchup-score {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--text-bright);
  min-width: 32px;
  text-align: right;
}
.matchup-score.winning { color: var(--green); }
.matchup-score.losing  { color: var(--red); }
.vs-divider {
  text-align: center;
  padding: 2px 0;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
}

/* category breakdown */
.cat-breakdown {
  padding: 12px 16px 14px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  border-top: 1px solid var(--border);
  margin-top: 12px;
}
.cat-cell {
  text-align: center;
}
.cat-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.cat-val {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  margin-top: 2px;
}
.cat-cell.win-cat  .cat-val { color: var(--green); }
.cat-cell.loss-cat .cat-val { color: var(--red); }

/* ── Team Stats Tab ─────────────────────────────────────────────────────── */
.stat-group-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 8px 14px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
}

/* ── Power Rankings Tab ────────────────────────────────────────────────── */
.pr-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.pr-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: border-color 0.15s;
}
.pr-card:hover { border-color: var(--border); background: var(--bg3); }
.pr-card.is-mine {
  background: var(--my-team);
  border-color: var(--my-border);
}
.pr-rank-num {
  font-family: var(--font-display);
  font-size: 38px;
  color: var(--text-dim);
  min-width: 44px;
  line-height: 1;
}
.pr-card.is-mine .pr-rank-num { color: var(--amber); }
.pr-rank-delta {
  font-family: var(--font-mono);
  font-size: 11px;
  min-width: 28px;
  text-align: center;
}
.delta-up   { color: var(--green); }
.delta-down { color: var(--red); }
.delta-same { color: var(--text-dim); }
.pr-info { flex: 1; }
.pr-team-name {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-bright);
}
.pr-card.is-mine .pr-team-name { color: var(--amber); }
.pr-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.pr-record {
  text-align: right;
}
.pr-pw-record {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--text-bright);
}
.pr-pw-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.pr-overall-record {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ── Loading / Error ─────────────────────────────────────────────────────── */
.state-msg {
  text-align: center;
  padding: 60px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}
.state-msg.error { color: var(--red); }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .matchups-grid { grid-template-columns: 1fr; }
  .cat-breakdown { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>

<body>
<div class="site-wrapper">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="league-eyebrow">ESPN Fantasy Baseball · H2H Categories</div>
      <div>
        <span class="league-title">THE LEAGUE</span>
        <span class="league-season" id="hdr-season">2026</span>
      </div>
    </div>
    <div class="header-right">
      <div class="my-team-badge" id="hdr-myteam">⚾ Jacob</div>
      <div class="last-updated" id="hdr-updated">Loading…</div>
    </div>
  </header>

  <!-- Tab Nav -->
  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" data-tab="standings"     role="tab">Standings</button>
    <button class="tab-btn"        data-tab="matchups"      role="tab">Matchups</button>
    <button class="tab-btn"        data-tab="team-stats"    role="tab">Team Stats</button>
    <button class="tab-btn"        data-tab="power-rankings" role="tab">Power Rankings</button>
  </nav>

  <!-- ── Standings ───────────────────────────────────────────────────────── -->
  <div id="tab-standings" class="tab-panel active">
    <div id="standings-content"><div class="state-msg">Loading standings…</div></div>
  </div>

  <!-- ── Matchups ────────────────────────────────────────────────────────── -->
  <div id="tab-matchups" class="tab-panel">
    <div id="matchups-content"><div class="state-msg">Loading matchups…</div></div>
  </div>

  <!-- ── Team Stats ──────────────────────────────────────────────────────── -->
  <div id="tab-team-stats" class="tab-panel">
    <div id="team-stats-content"><div class="state-msg">Loading team stats…</div></div>
  </div>

  <!-- ── Power Rankings ─────────────────────────────────────────────────── -->
  <div id="tab-power-rankings" class="tab-panel">
    <div id="power-rankings-content"><div class="state-msg">Loading power rankings…</div></div>
  </div>

</div><!-- /site-wrapper -->

<script>
// ── Tab switching ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
  });
});

// ── Data loading ──────────────────────────────────────────────────────────
async function load(file) {
  const r = await fetch(`data/${file}?t=${Date.now()}`);
  if (!r.ok) throw new Error(`HTTP ${r.status} loading ${file}`);
  return r.json();
}

function err(containerId, msg) {
  document.getElementById(containerId).innerHTML =
    `<div class="state-msg error">⚠ ${msg}<br><small>Make sure the GitHub Action has run and the data/ files exist.</small></div>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZoneName:'short' });
}

// ── Standings ─────────────────────────────────────────────────────────────
async function renderStandings() {
  try {
    const { standings, week, updated } = await load('standings.json');
    document.getElementById('hdr-updated').textContent = `Updated ${fmtDate(updated)}`;

    const PLAYOFF_SPOTS = 6;

    const rows = standings.map((t, i) => {
      const divider = i === PLAYOFF_SPOTS ? 'class="playoff-divider"' : '';
      const myRow   = t.isMyTeam ? 'class="my-team-row"' : '';

      const streakClass  = t.streakType === 'WIN' ? 'streak-w' : 'streak-l';
      const streakLetter = t.streakType === 'WIN' ? 'W' : 'L';
      const streak = t.streak
        ? `<span class="streak-badge ${streakClass}">${streakLetter}${t.streak}</span>`
        : '—';

      const wpct = t.wins + t.losses > 0
        ? (t.wins / (t.wins + t.losses)).toFixed(3).replace(/^0/, '')
        : '.000';

      return `
        <tr ${divider} ${myRow}>
          <td class="rank-col">${t.rank}</td>
          <td class="team-name">${t.name}</td>
          <td class="num record-cell">
            <span class="win">${t.wins}</span>–<span class="loss">${t.losses}</span>${t.ties ? `–${t.ties}` : ''}
          </td>
          <td class="num">${wpct}</td>
          <td class="num">${t.pointsFor}</td>
          <td class="num">${t.pointsAgainst}</td>
          <td class="num">${streak}</td>
        </tr>`;
    }).join('');

    document.getElementById('standings-content').innerHTML = `
      <div class="section-label">Week ${week} · League Standings</div>
      <div class="data-table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:44px">#</th>
              <th>Team</th>
              <th class="num">W–L</th>
              <th class="num">PCT</th>
              <th class="num">PF</th>
              <th class="num">PA</th>
              <th class="num">Streak</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="margin-top:10px; font-family:var(--font-mono); font-size:10px; color:var(--text-dim)">
        ── dashed line marks playoff cutoff
      </div>`;
  } catch(e) {
    err('standings-content', e.message);
  }
}

// ── Matchups ──────────────────────────────────────────────────────────────
async function renderMatchups() {
  try {
    const { matchups, week, updated } = await load('matchups.json');

    const HIT_CATS  = ['R','RBI','HR','SB','K','AVG','OPS'];
    const PITCH_CATS = ['IP','H','K','QS','ERA','WHIP','SV'];

    const cards = matchups.map(m => {
      const { home, away } = m;
      const hasMe = home.isMyTeam || away.isMyTeam;
      const homeWin = home.catWins > away.catWins;
      const awayWin = away.catWins > home.catWins;

      const homeName = `<span class="matchup-team-name ${home.isMyTeam?'is-mine':''}">${home.team}</span>`;
      const awayName = `<span class="matchup-team-name ${away.isMyTeam?'is-mine':''}">${away.team}</span>`;

      // Category cells (hitting)
      const cats = [...HIT_CATS, ...PITCH_CATS];
      const catCells = cats.map(cat => {
        const h = home.categories?.[cat] || {};
        const a = away.categories?.[cat] || {};
        const homeClass = h.result === 'WIN' ? 'win-cat' : h.result === 'LOSS' ? 'loss-cat' : '';
        const awayClass = a.result === 'WIN' ? 'win-cat' : a.result === 'LOSS' ? 'loss-cat' : '';
        return `
          <div class="cat-cell ${homeClass}">
            <div class="cat-label">${cat}</div>
            <div class="cat-val">${h.value !== undefined ? h.value : '—'}</div>
          </div>`;
      }).join('');

      const hasCats = Object.keys(home.categories || {}).length > 0;

      return `
        <div class="matchup-card ${hasMe ? 'has-my-team' : ''}">
          <div class="matchup-header">
            <span>Week ${week}</span>
            <span class="leader-tag">${m.winner !== 'UNDECIDED' ? '✓ Final' : `${m.leader} leading`}</span>
          </div>
          <div class="matchup-teams">
            <div class="matchup-team-row">
              ${homeName}
              <span class="matchup-score ${homeWin?'winning':awayWin?'losing':''}">${home.catWins}</span>
            </div>
            <div class="vs-divider">· · · VS · · ·</div>
            <div class="matchup-team-row">
              ${awayName}
              <span class="matchup-score ${awayWin?'winning':homeWin?'losing':''}">${away.catWins}</span>
            </div>
          </div>
          ${hasCats ? `<div class="cat-breakdown">${catCells}</div>` : ''}
        </div>`;
    }).join('');

    document.getElementById('matchups-content').innerHTML = `
      <div class="section-label">Week ${week} Matchups · Category Score</div>
      <div class="matchups-grid">${cards || '<div class="state-msg">No matchup data yet for this week.</div>'}</div>`;
  } catch(e) {
    err('matchups-content', e.message);
  }
}

// ── Team Stats ────────────────────────────────────────────────────────────
async function renderTeamStats() {
  try {
    const { teams, season } = await load('team_stats.json');

    const HIT_COLS  = ['R','RBI','HR','SB','K','AVG','OPS'];
    const PITCH_COLS = ['IP','H','K','QS','ERA','WHIP','SV','HLD'];

    function statTable(label, cols) {
      const headers = ['#','Team',...cols].map((c,i) =>
        `<th ${i>1?'class="num"':''}>${c}</th>`).join('');

      const rows = teams.map((t, idx) => {
        const myRow = t.isMyTeam ? 'class="my-team-row"' : '';
        const cells = cols.map(c => {
          const v = t.stats[c];
          return `<td class="num">${v !== undefined ? v : '—'}</td>`;
        }).join('');
        return `<tr ${myRow}>
          <td class="rank-col">${idx+1}</td>
          <td class="team-name">${t.name}</td>
          ${cells}
        </tr>`;
      }).join('');

      return `
        <div class="section-label" style="margin-top:28px">${label}</div>
        <div class="data-table-wrap">
          <table>
            <thead><tr>${headers}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    document.getElementById('team-stats-content').innerHTML =
      `<div class="section-label">${season} Season Cumulative Stats</div>` +
      statTable('Hitting', HIT_COLS) +
      statTable('Pitching', PITCH_COLS);
  } catch(e) {
    err('team-stats-content', e.message);
  }
}

// ── Power Rankings ────────────────────────────────────────────────────────
async function renderPowerRankings() {
  try {
    const { rankings, week } = await load('power_rankings.json');

    const cards = rankings.map(p => {
      const delta = p.rankDelta;
      let deltaHtml;
      if (delta > 0)       deltaHtml = `<span class="pr-rank-delta delta-up">▲${delta}</span>`;
      else if (delta < 0)  deltaHtml = `<span class="pr-rank-delta delta-down">▼${Math.abs(delta)}</span>`;
      else                 deltaHtml = `<span class="pr-rank-delta delta-same">—</span>`;

      return `
        <div class="pr-card ${p.isMyTeam ? 'is-mine' : ''}">
          <div class="pr-rank-num">${p.pwRank}</div>
          ${deltaHtml}
          <div class="pr-info">
            <div class="pr-team-name">${p.name}</div>
            <div class="pr-sub">Power W/L this week · Overall rank #${p.overallRank}</div>
          </div>
          <div class="pr-record">
            <div class="pr-pw-record">
              <span class="win">${p.pwWins}</span>–<span class="loss">${p.pwLosses}</span>
            </div>
            <div class="pr-pw-label">Power Record</div>
            <div class="pr-overall-record">${p.overallW}–${p.overallL} overall</div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('power-rankings-content').innerHTML = `
      <div class="section-label">Week ${week} Power Rankings · Record vs. Field</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--text-dim); margin-bottom:16px; line-height:1.6">
        Power rank = your score this week vs. every other team.<br>
        ▲/▼ shows movement from actual standings rank.
      </div>
      <div class="pr-list">${cards || '<div class="state-msg">No data yet.</div>'}</div>`;
  } catch(e) {
    err('power-rankings-content', e.message);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────
(async () => {
  // Load meta for header
  try {
    const meta = await load('meta.json');
    document.getElementById('hdr-season').textContent = meta.season;
    document.getElementById('hdr-myteam').textContent = `⚾ ${meta.myTeam}`;
    document.getElementById('hdr-updated').textContent = `Updated ${fmtDate(meta.updated)}`;
  } catch(_) {}

  // Render all tabs in parallel
  renderStandings();
  renderMatchups();
  renderTeamStats();
  renderPowerRankings();
})();
</script>
</body>
</html>
