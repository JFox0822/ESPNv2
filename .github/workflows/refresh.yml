name: ESPN Data Refresh

on:
  schedule:
    - cron: '0,30 * * * *'   # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install espn-api requests

      - name: Run python fetch_espn.py
        env:
          ESPN_LEAGUE_ID: ${{ secrets.ESPN_LEAGUE_ID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
        run: python fetch_espn.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: refresh ESPN data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git fetch origin main
          git merge -X ours origin/main --no-edit
          git push origin main
