name: Daily ESPN Data Refresh
 
on:
  schedule:
    - cron: '0 12 * * *'   # 8:00 AM EDT (UTC-4)
  workflow_dispatch:         # also allow manual trigger
 
jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Fetch ESPN data
        env:
          ESPN_LEAGUE_ID: "163020"
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
        run: python fetch_espn.py
 
      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh ESPN data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
 
