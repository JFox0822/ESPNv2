<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The League · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,600&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08090e;--bg1:#0d1018;--bg2:#111520;--bg3:#161c2c;--bg4:#1c2438;
  --border:#1f2940;--border2:#293554;
  --ink:#f0f4ff;--ink2:#8899bb;--ink3:#4a5a7a;
  --green:#10f37b;--glow:rgba(16,243,123,.12);
  --red:#ff4d6a;--gold:#f0b429;--blue:#4499ff;
  --purple:#9977ff;--orange:#ff8833;--teal:#00ddb4;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--fm:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--ink);font-family:var(--fb);font-size:14px;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(16,243,123,.05),transparent),
    radial-gradient(ellipse 40% 30% at 80% 80%,rgba(68,153,255,.04),transparent)}
button{cursor:pointer;border:none;background:none;font-family:var(--fb)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.shell{max-width:1400px;margin:0 auto;padding:0 20px 100px}

/* ── HEADER ── */
.hdr{padding:24px 0 0}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;padding-bottom:20px}
.brand-name{font-family:var(--fd);font-weight:900;font-size:clamp(32px,5vw,52px);letter-spacing:.06em;text-transform:uppercase;line-height:.9}
.brand-year{color:var(--green)}
.brand-meta{font-family:var(--fm);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink3);margin-top:6px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.team-picker{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:5px 5px 5px 14px}
.team-picker label{font-family:var(--fm);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);white-space:nowrap}
.tp-sel-wrap{position:relative}
.tp-sel-wrap::after{content:"▾";position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--green);pointer-events:none;font-size:11px}
.tp-sel{appearance:none;background:var(--bg3);color:var(--green);border:1px solid rgba(16,243,123,.3);border-radius:16px;padding:5px 28px 5px 12px;font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:.08em;cursor:pointer;outline:none}
.tp-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.status-upd{font-family:var(--fm);font-size:9px;color:var(--ink3);letter-spacing:.06em}

/* ── NAV ── */
.nav-strip{display:flex;align-items:center;gap:12px;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:32px;flex-wrap:wrap}
.nav-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);white-space:nowrap}
.nav-sel-wrap{position:relative;flex:1;max-width:440px;min-width:260px}
.nav-sel-wrap::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--green);pointer-events:none;font-size:14px}
.nav-sel{width:100%;appearance:none;background:var(--bg2);color:var(--ink);border:1px solid var(--green);border-radius:8px;padding:10px 38px 10px 14px;font-family:var(--fd);font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;outline:none;transition:box-shadow .2s}
.nav-sel:focus{box-shadow:0 0 0 3px var(--glow)}
.nav-sel option{background:var(--bg1);color:var(--ink);font-size:14px}
.nav-arrows{display:flex;gap:4px}
.nav-arr{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--ink2);font-size:16px;transition:all .15s}
.nav-arr:hover{background:var(--bg3);border-color:var(--green);color:var(--green)}

/* ── PANEL/SUB ── */
.panel{display:none}.panel.active{display:block;animation:fadeup .2s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sub-nav{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap}
.sub-btn{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);background:var(--bg1);border:1px solid var(--border);border-radius:4px;padding:7px 14px;cursor:pointer;transition:all .15s}
.sub-btn:hover{color:var(--ink);border-color:var(--border2)}
.sub-btn.active{color:var(--bg);background:var(--green);border-color:var(--green);font-weight:600}
.sub-panel{display:none}.sub-panel.active{display:block;animation:fadeup .15s ease}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:baseline;gap:14px;margin-bottom:20px}
.sh-title{font-family:var(--fd);font-size:clamp(22px,3vw,32px);font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.sh-sub{font-family:var(--fm);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3)}
.sh-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── TABLE ── */
.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
thead th{font-family:var(--fm);font-size:8px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
thead th.r{text-align:right}thead th.c{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr.mine{background:rgba(16,243,123,.04)}
tbody tr.mine td:first-child{border-left:2px solid var(--green)}
tbody td{padding:10px 14px;white-space:nowrap}
tbody td.r{text-align:right;font-family:var(--fm);font-size:12px}
tbody td.c{text-align:center;font-family:var(--fm);font-size:12px}
tbody td.rk{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--ink3);text-align:center;width:50px;line-height:1}
tbody tr.mine td.rk{color:var(--green)}
tbody tr.cut{border-top:2px dashed var(--border2)!important}
.wt{color:var(--green)!important}.lt{color:var(--red)!important}
.bt{font-weight:700;color:var(--ink)}.dt{color:var(--ink2)}
.tl{cursor:pointer}.tl:hover{color:var(--blue)!important}

/* ── BADGES ── */
.bdg{display:inline-block;font-family:var(--fm);font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;padding:2px 7px;vertical-align:middle;margin-left:4px}
.bdg-e{background:rgba(240,180,41,.15);color:var(--gold);border:1px solid rgba(240,180,41,.3)}
.bdg-s{background:rgba(16,243,123,.1);color:var(--green);border:1px solid rgba(16,243,123,.25)}

/* ── MATCHUPS ── */
.mu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:12px}
.mu-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.mu-card.mine{border-color:var(--green);box-shadow:0 0 20px rgba(16,243,123,.08)}
.mu-hd{background:var(--bg3);padding:8px 16px;display:flex;justify-content:space-between;font-family:var(--fm);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);border-bottom:1px solid var(--border)}
.mu-body{padding:14px 16px 10px}
.mu-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.mu-name{font-family:var(--fd);font-weight:800;font-size:17px;letter-spacing:.04em;text-transform:uppercase;flex:1;cursor:pointer;transition:color .15s}
.mu-name:hover{color:var(--blue)}.mu-name.mine{color:var(--green)}
.mu-score{font-family:var(--fd);font-size:38px;font-weight:900;min-width:44px;text-align:right;line-height:1}
.mu-score.win{color:var(--green)}.mu-score.lose{color:var(--red)}
.mu-vs{text-align:center;font-family:var(--fm);font-size:8px;color:var(--ink3);letter-spacing:.4em;padding:3px 0}
.mu-cats{border-top:1px solid var(--border);padding:10px 16px 12px}
.mu-cats-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.mu-cat-row{display:grid;grid-template-columns:52px 1fr 40px 1fr 52px;align-items:center;gap:4px;margin-bottom:3px}
.cv{font-family:var(--fm);font-size:11px;font-weight:600;text-align:center}
.cv.cw{color:var(--green)}.cv.cl{color:var(--red)}
.cn{font-family:var(--fm);font-size:8px;color:var(--ink3);text-align:center;text-transform:uppercase;letter-spacing:.06em}
.cbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.cbf{height:100%;border-radius:2px}

/* ── POWER RANKINGS ── */
.pr-list{display:flex;flex-direction:column;gap:8px}
.pr-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s}
.pr-card:hover{border-color:var(--border2)}.pr-card.mine{border-color:var(--green)}
.pr-inner{display:grid;grid-template-columns:60px 1fr auto;gap:0 16px;align-items:center;padding:14px 18px}
.pr-rank{font-family:var(--fd);font-size:52px;font-weight:900;line-height:1;color:var(--ink3);text-align:center}
.pr-card.mine .pr-rank{color:var(--green)}
.pr-name{font-family:var(--fd);font-weight:800;font-size:20px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:color .15s}
.pr-name:hover{color:var(--blue)}.pr-card.mine .pr-name{color:var(--green)}
.pr-meta{font-family:var(--fm);font-size:9px;color:var(--ink3);margin-top:3px}
.pr-cats{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.pr-cat{font-family:var(--fm);font-size:8px;font-weight:600;padding:3px 8px;border-radius:3px;border:1px solid;letter-spacing:.06em;text-transform:uppercase}
.cat-str{background:rgba(16,243,123,.12);color:var(--green);border-color:rgba(16,243,123,.25)}
.cat-mid{background:var(--bg3);color:var(--ink3);border-color:var(--border)}
.cat-wk{background:rgba(255,77,106,.1);color:var(--red);border-color:rgba(255,77,106,.2)}
.pr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:90px}
.comp-num{font-family:var(--fd);font-size:44px;font-weight:900;line-height:1}
.comp-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3)}
.pr-rec{font-family:var(--fm);font-size:10px;color:var(--ink2)}
.pr-btn{font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);background:rgba(68,153,255,.08);border:1px solid rgba(68,153,255,.2);border-radius:3px;padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.pr-btn:hover{background:var(--blue);color:var(--bg)}

/* ── ELO ── */
.elo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;margin-bottom:24px}
.elo-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color .15s}
.elo-card:hover{border-color:var(--border2)}.elo-card.mine{border-color:var(--green)}
.elo-name{font-family:var(--fd);font-size:18px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.elo-val{font-family:var(--fd);font-size:36px;font-weight:900;line-height:1}
.elo-sub{font-family:var(--fm);font-size:9px;color:var(--ink3);margin-top:4px}
.elo-bar{height:2px;background:var(--border);border-radius:1px;margin-top:10px;overflow:hidden}
.elo-fill{height:100%;border-radius:1px}

/* ── LUCK ── */
.luck-row{display:flex;align-items:center;gap:12px;padding:9px 14px;background:var(--bg1);border:1px solid var(--border);border-radius:6px;margin-bottom:4px}
.luck-row.mine{border-color:var(--green)}
.luck-name{font-family:var(--fd);font-weight:700;font-size:16px;letter-spacing:.04em;text-transform:uppercase;min-width:80px}
.luck-delta{font-family:var(--fm);font-size:12px;font-weight:600;min-width:58px;text-align:right}
.luck-track{flex:1;height:6px;background:var(--border);border-radius:3px;position:relative}
.luck-mid{position:absolute;left:50%;top:-3px;width:1px;height:12px;background:var(--ink3)}
.luck-fill{height:100%;border-radius:3px;position:absolute;top:0}
.luck-label{font-family:var(--fm);font-size:9px;min-width:78px;text-align:right}

/* ── HISTORY ── */
.hist-ctrl{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.hist-ctrl label{font-family:var(--fm);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3)}
.hsel{font-family:var(--fm);font-size:11px;background:var(--bg1);color:var(--ink);border:1px solid var(--border);border-radius:6px;padding:7px 12px;cursor:pointer}
.hinput{font-family:var(--fb);font-size:12px;background:var(--bg1);color:var(--ink);border:1px solid var(--border);border-radius:6px;padding:7px 12px;min-width:200px}
.hinput::placeholder{color:var(--ink3)}
.h2h-row{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--bg1);border:1px solid var(--border);border-radius:6px;margin-bottom:4px}
.h2h-row.mine{border-color:var(--green)}
.h2h-name{flex:1;font-family:var(--fd);font-weight:700;font-size:16px;letter-spacing:.04em;text-transform:uppercase}
.h2h-rec{font-family:var(--fm);font-size:11px;min-width:60px;text-align:center}
.h2h-bar{flex:2;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.h2h-fill{height:100%;background:var(--green);border-radius:2px}
.h2h-pct{font-family:var(--fm);font-size:9px;color:var(--ink3);min-width:36px;text-align:right}

/* ── RECORDS ── */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.rec-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.rec-hd{padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3)}
.rec-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.rec-row:last-child{border-bottom:none}
.rec-rnk{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--ink3);min-width:28px;text-align:center;line-height:1}
.rec-rnk.g{color:var(--gold)}.rec-rnk.s{color:#94a3b8}.rec-rnk.b{color:#cd7f32}
.rec-team{font-family:var(--fd);font-weight:700;font-size:14px;letter-spacing:.04em;text-transform:uppercase}
.rec-week{font-family:var(--fm);font-size:9px;color:var(--ink3);margin-top:1px}
.rec-val{font-family:var(--fd);font-size:28px;font-weight:900;margin-left:auto;line-height:1}

/* ── CAT KING ── */
.ck-cat{background:var(--bg1);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;overflow:hidden}
.ck-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .15s;gap:8px;flex-wrap:wrap}
.ck-hd:hover{background:var(--bg2)}
.ck-cat-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);min-width:80px}
.ck-king{font-family:var(--fd);font-weight:800;font-size:18px;letter-spacing:.04em;text-transform:uppercase;flex:1}
.ck-val{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--gold)}
.ck-wk{font-family:var(--fm);font-size:9px;color:var(--ink3)}
.ck-body{padding:8px 14px 12px;border-top:1px solid var(--border)}
.ck-lb-row{display:grid;grid-template-columns:24px 70px 1fr 52px;align-items:center;gap:6px;padding:3px 0}
.ck-pos{font-family:var(--fm);font-size:9px;color:var(--ink3)}
.ck-team{font-family:var(--fd);font-weight:700;font-size:13px;letter-spacing:.03em;text-transform:uppercase}
.ck-bar{height:14px;background:var(--border);border-radius:3px;overflow:hidden;position:relative}
.ck-fill{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.ck-v{font-family:var(--fm);font-size:10px;text-align:right}

/* ── LEGACY ── */
.leg-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:grid;grid-template-columns:64px 1fr auto;gap:0 16px;align-items:center;cursor:pointer;transition:all .2s;margin-bottom:6px}
.leg-card:hover{border-color:var(--border2);transform:translateX(2px)}
.leg-card.open{border-color:var(--green);background:rgba(16,243,123,.03)}
.leg-card.mine{border-left:3px solid var(--green)}
.leg-rk{font-family:var(--fd);font-size:56px;font-weight:900;line-height:1;text-align:center}
.lrk1{color:var(--gold)}.lrk2{color:#94a3b8}.lrk3{color:#cd7f32}.lrkn{color:var(--border2)}
.leg-name{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.leg-sub{font-family:var(--fm);font-size:9px;color:var(--ink3);margin-top:3px;line-height:1.6}
.leg-score{font-family:var(--fd);font-size:44px;font-weight:900;line-height:1;letter-spacing:-.02em}
.leg-score-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3)}
.leg-bars{display:flex;gap:3px;margin-top:8px}
.leg-bar-seg{height:4px;border-radius:2px;flex-shrink:0}
.leg-detail{background:var(--bg1);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:16px 20px;animation:fadeup .2s ease;margin-bottom:6px;border-left:3px solid var(--green)}

/* ── RESUME ── */
.resume{background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:10px;animation:fadeup .3s ease}
.res-hero{padding:28px 30px 24px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.res-hero::before{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(16,243,123,.06),transparent 70%)}
.res-hero-top{display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap;position:relative}
.res-abbr{width:70px;height:70px;border-radius:12px;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:26px;font-weight:900;color:var(--green);letter-spacing:.05em;flex-shrink:0}
.res-tname{font-family:var(--fd);font-size:clamp(28px,4vw,44px);font-weight:900;text-transform:uppercase;letter-spacing:.04em;line-height:1}
.res-tagline{font-style:italic;color:var(--green);font-size:13px;margin-top:6px}
.res-owner-line{font-family:var(--fm);font-size:9px;color:var(--ink3);margin-top:5px;letter-spacing:.06em}
.res-close{font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);border:1px solid var(--border);border-radius:4px;padding:5px 12px;cursor:pointer;margin-left:auto;align-self:flex-start;flex-shrink:0;transition:all .15s}
.res-close:hover{color:var(--red);border-color:var(--red)}
.res-strip{display:grid;grid-template-columns:repeat(6,1fr);margin-top:22px;border-top:1px solid var(--border);padding-top:18px}
.res-stat{border-right:1px solid var(--border);text-align:center;padding:0 8px}
.res-stat:last-child{border-right:none}
.res-sv{font-family:var(--fd);font-size:28px;font-weight:900;line-height:1}
.res-sl{font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-top:5px}
.res-body{padding:28px 30px}
.res-sec{font-family:var(--fm);font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--green);margin-bottom:14px;font-weight:600}
.res-div{border:none;border-top:1px solid var(--border);margin:22px 0}
.res-musing{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--ink2);line-height:1.65}
.res-musing:last-child{border-bottom:none}
.res-musing-dot{color:var(--green);font-size:10px;margin-top:4px;flex-shrink:0}

/* Roster section in resume */
.ros-sec{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:4px}
.ros-hd{font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ros-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ros-row:last-child{border-bottom:none}
.ros-pos{width:32px;height:28px;border-radius:5px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:8px;font-weight:600;color:var(--ink3);flex-shrink:0;text-align:center}
.ros-pos.sp{color:var(--blue);background:rgba(68,153,255,.1)}
.ros-pos.rp{color:var(--purple);background:rgba(153,119,255,.1)}
.ros-name{font-family:var(--fd);font-weight:700;font-size:14px;letter-spacing:.03em;color:var(--ink);flex:1}
.inj-q{font-family:var(--fm);font-size:8px;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(240,180,41,.12);color:var(--gold)}
.inj-out{font-family:var(--fm);font-size:8px;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(255,77,106,.1);color:var(--red)}
.inj-il{font-family:var(--fm);font-size:8px;padding:1px 6px;border-radius:3px;margin-left:4px;background:rgba(153,119,255,.1);color:var(--purple)}

.res-bot{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.res-sy{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.res-sy:last-child{border-bottom:none}
.res-sy-yr{font-family:var(--fm);font-size:9px;color:var(--ink3);min-width:36px}
.res-sy-rec{font-family:var(--fm);font-size:10px;color:var(--ink2);flex:1}
.res-sy-rk{font-family:var(--fd);font-size:20px;font-weight:900;min-width:36px;text-align:right}
.rk-c{color:var(--gold)}.rk-p{color:var(--green)}.rk-o{color:var(--ink3)}
.res-outlook{background:rgba(16,243,123,.05);border:1px solid rgba(16,243,123,.15);border-radius:6px;padding:16px}
.res-oh{font-family:var(--fd);font-weight:800;font-size:18px;letter-spacing:.03em;text-transform:uppercase;margin-bottom:6px}
.res-ob{font-size:12px;color:var(--ink2);line-height:1.7}
.res-peak{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-top:10px}
.res-pk-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.res-pk-val{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--gold)}
.res-pk-d{font-family:var(--fm);font-size:9px;color:var(--ink3);margin-top:3px}

/* ── CHAMPS ── */
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.champ-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;transition:all .2s}
.champ-card.champ{border-color:var(--gold)}
.champ-year{font-family:var(--fd);font-size:36px;font-weight:900;color:var(--ink3);line-height:1}
.champ-name{font-family:var(--fd);font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--gold);margin-top:4px}
.champ-runner{font-family:var(--fm);font-size:9px;color:var(--ink3);margin-top:6px}

/* ── MISC ── */
.state{text-align:center;padding:60px 20px;font-family:var(--fm);font-size:11px;color:var(--ink3);letter-spacing:.1em}
.state.err{color:var(--red)}
.info-box{background:rgba(153,119,255,.08);border:1px solid rgba(153,119,255,.2);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-family:var(--fm);font-size:10px;color:var(--purple)}
.blend-bar{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.blend-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);white-space:nowrap}
.blend-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:flex}
.blend-seg{height:100%}
.dropdown{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:var(--bg1);color:var(--ink);border:1px solid var(--border2);border-radius:6px;padding:9px 14px;min-width:220px;cursor:pointer}
.dropdown:focus{outline:none;border-color:var(--green)}

@media(max-width:768px){
  .mu-grid{grid-template-columns:1fr}
  .pr-right{display:none}
  .res-bot,.res-strip,.ros-sec,.res-bot{grid-template-columns:1fr}
  .leg-card{grid-template-columns:1fr auto}.leg-rk{display:none}
  .elo-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<div id="panel-standings" class="panel active"><div id="std-c"><div class="state">Loading…</div></div></div>

<div id="panel-power"     class="panel"><div id="pr-c"><div class="state">Loading…</div></div></div>
<div id="panel-stats"     class="panel"><div id="ts-c"><div class="state">Loading…</div></div></div>
<div id="panel-rosters"   class="panel"><div id="ros-c"><div class="state">Loading…</div></div></div>

<div id="panel-history" class="panel">

    <button class="sub-btn" data-sub="hs-h2h">All-Time H2H</button>
    <button class="sub-btn" data-sub="hs-mu">Weekly Results</button>
  </div>
  <div id="hs-st"  class="sub-panel active"></div>
  <div id="hs-h2h" class="sub-panel"></div>
  <div id="hs-mu"  class="sub-panel"></div>
</div>

<div id="panel-analytics" class="panel">
  <div class="sub-nav">
    <button class="sub-btn active" data-sub="an-elo">ELO Ratings</button>
    <button class="sub-btn" data-sub="an-luck">Luck Index</button>
    <button class="sub-btn" data-sub="an-sos">Strength of Schedule</button>
    <button class="sub-btn" data-sub="an-cat">Category W-L</button>
  </div>
  <div id="an-elo"  class="sub-panel active"></div>
  <div id="an-luck" class="sub-panel"></div>
  <div id="an-sos"  class="sub-panel"></div>
  <div id="an-cat"  class="sub-panel"></div>
</div>

<div id="panel-records" class="panel">
  <div class="sub-nav">
    <button class="sub-btn active" data-sub="rec-ck">Category Kings</button>
    <button class="sub-btn" data-sub="rec-best">Best Weeks Ever</button>
    <button class="sub-btn" data-sub="rec-lg">League Records</button>
  </div>
  <div id="rec-ck"   class="sub-panel active"></div>
  <div id="rec-best" class="sub-panel"></div>
  <div id="rec-lg"   class="sub-panel"></div>
</div>

<div id="panel-legacy"  class="panel"><div id="leg-c"></div></div>
<div id="panel-resumes" class="panel">
  <div id="res-selector" style="margin-bottom:24px">
    <div class="sh"><span class="sh-title">Team Resumes</span><div class="sh-line"></div></div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <label style="font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3)">Select Owner</label>
      <select class="dropdown" id="res-sel"><option value="">— Choose an owner —</option></select>
    </div>
  </div>
  <div id="res-detail"><div class="state" style="padding:30px 0">Select an owner above to view their full franchise resume.</div></div>
</div>
<div id="panel-champs" class="panel"><div id="champ-c"></div></div>
<div id="panel-hof"    class="panel"><div id="hof-c"></div></div>

</div><!-- /shell -->

ith a peak Elo of 1637. What separates Sponny from the pack is clutch playoff performance \u2014 converting opportunities when it matters. The all-play PCT (.505) reveals Sponny's regular seasons have been more middle-of-the-pack than the win column suggests, meaning schedule luck and hot streaks at the right time have been a superpower. Bobby Witt Jr.'s 2024 MVP campaign (20.8 Player Rater) powered the most recent title run. Owns Tim 13-2-1 all-time \u2014 the most lopsided active rivalry in the league.","Greene":"Two ESPN-era championships (2015, 2017) plus two runner-up finishes produce a strong 32-point Rings score. Greene's 2017 campaign was legendary: 14-3-2 record, but all-play says .513. That +.276 luck delta is the luckiest championship in league history, and it arguably defines the franchise \u2014 good enough to contend, fortunate enough to win. Peak Elo hit 1634 in 2019 behind Gerrit Cole's dominant season. But Greene has been stuck in a .440-.450 rut for four consecutive years since, and the current Elo of 1507 reflects a franchise coasting on its r\u00e9sum\u00e9. Needs a return to contention to avoid slipping further.","Mion":"Two championships \u2014 one pre-ESPN, one in 2013 \u2014 plus two runner-up finishes make Mion the most decorated franchise of the early era. The pre-ESPN title is discounted (6 pts vs 12) since it came in a smaller, different league, but it still counts. Mion's all-play mark of .543 is third-best all-time, and 9 winning seasons in 12 years shows genuine sustained excellence. Still holds the all-time single-week record for HR (28), RBI (77), R (62), and OPS (1.137) \u2014 all from the legendary 2019 Week 19. But the trajectory is alarming: rolling 3-year PCT has cratered from .650 in 2021 to .373 in 2025, and the current Elo of 1453 is the lowest among franchise-era originals. A franchise living on past glory that desperately needs a renaissance.","Boyce":"The most loaded roster in league history \u2014 29 all-star seasons, 10 MVP-tier players, headlined by back-to-back Aaron Judge seasons and Shohei Ohtani. Boyce's Acumen score (8.5) reflects an elite talent acquisition machine. Two championships \u2014 one ESPN-era (2016) and one pre-ESPN (discounted at 6 pts) \u2014 give Boyce an 18-point Rings score. Current Elo of 1575 and peak of 1650 (2021, when Boyce went 15-2-1) confirm top-tier competitive ability. But the gap between roster talent and titles is the franchise's defining tension. The .536 all-play PCT is solid but not dominant, suggesting the roster depth hasn't always translated to weekly category dominance. Six consecutive winning seasons and counting \u2014 the window is wide open for more hardware.","Eriole":"The 2025 champion \u2014 and in just their 5th season, Eriole has already built a stronger Legacy Score than teams with twice the tenure. The title plus a 2021 runner-up finish score 16 Rings points. What's remarkable is the Acumen score: 19 all-star seasons and 5 MVPs in only 5 years gives Eriole the highest per-year roster quality rate in the league (tied with Leo). Paul Skenes, Trea Turner, and elite pitching depth define the build. The all-play PCT (.471) suggests Eriole has overperformed their underlying stats \u2014 but championships don't care about all-play records. The trajectory is up.","Bert":"The best franchise to never win a championship. 12 seasons, 7 winning records, a .503 all-play mark, 23 all-star players, and 6 MVPs \u2014 including Justin Verlander's 2019 masterpiece (19.9 Player Rater). Bert's 2019 was the cruelest season: a league-best 13-4-2 record that the all-play data says was the luckiest season ever (+.254 delta, actual .737 vs all-play .483). The underlying stats said Bert was a .483 team that year. Zero rings and zero finals appearances earn a 0.0 in the most heavily weighted category, which is why a team with better Elo, consistency, and acumen than Greene still ranks below. Rings are the currency of legacy.","Slater":"Only 4 seasons in the league but already boasting the highest current Elo (1597) \u2014 though that comes with an asterisk. Slater's 2025 was the luckiest season in the league (+.226 delta: 14-5 actual vs .511 all-play), meaning the Elo is inflated by schedule fortune. No championships or finals appearances yet. The Acumen rate is elite (8 all-stars and 3 MVPs in 4 years), and Vladimir Guerrero Jr.'s 2024 anchored a strong roster. But Legacy Rankings reward what you've done over time, and 4 seasons without a ring limits the ceiling. A championship in the next 2 years would vault Slater into the top half.","Leo":"One season. Runner-up finish. And somehow a Legacy Score of 38.6 \u2014 higher than 3 teams with 10+ years of history. Leo's .560 all-play PCT in 2025 was the 4th-best single-season mark that year, proving the finals run was skill, not luck. In fact, Leo was the unluckiest team in 2025 (-.113 delta) \u2014 the 8-10-1 regular season record massively undersold a roster that included Tarik Skubal, Cal Raleigh, and the single best week of 2025 (W13: composite 17.42). 4 all-stars and 3 MVPs in one season is an absurd hit rate. The Legacy Score is front-loaded with Sustained and Acumen points \u2014 but zero rings and a tiny sample mean this ranking is provisional. Year 2 will tell us everything.","Jacob":"Three seasons in, Jacob is still building a r\u00e9sum\u00e9. The 2025 playoff appearance (11-8) was a step forward, powered by elite slugging \u2014 Elly De La Cruz, Kyle Schwarber, and the league's highest HR z-score. But the all-play mark of .481 and zero championships keep the Legacy Score modest. Jacob's calling card is boom-or-bust: capable of the league's best and worst weeks in back-to-back matchups. The Acumen score is middling (7 all-stars, 0 MVPs in 3 years), suggesting the roster has been competitive but not elite. Needs a ring or a dominant regular season to climb.","Tim":"12 seasons of loyalty with precious little to show for it. A .411 all-play PCT \u2014 meaning Tim // ═══ TEAM PICKER ═══
let MY_TEAM = localStorage.getItem('myTeam') || '';
function isMine(name) { return MY_TEAM && name && name.toLowerCase().includes(MY_TEAM.toLowerCase()); }
function isMineExact(name) { return MY_TEAM && name && name.toLowerCase() === MY_TEAM.toLowerCase(); }

// Populate team picker from RB data + ESPN teams
function populateTeamPicker(espnTeams) {
  const sel = document.getElementById('my-team-sel');
  const rbTeams = (RB.legacyRankings?.rankings||[]).map(t=>t.team);
  const all = espnTeams?.length ? espnTeams.map(t=>t.name) : rbTeams;
  sel.innerHTML = '<option value="">— pick yours —</option>' + all.map(t=>`<option value="${t}" ${MY_TEAM===t?'selected':''}>${t}</option>`).join('');
  sel.addEventListener('change', () => {
    MY_TEAM = sel.value;
    localStorage.setItem('myTeam', MY_TEAM);
    refreshAllMineClasses();
  });
}

function refreshAllMineClasses() {
  // Re-render current panel
  const cur = PANELS[document.getElementById('main-nav').selectedIndex];
  showPanel(cur);
}

// ═══ NAVIGATION ═══
const PANELS = ['standings','matchups','power','stats','rosters','history','analytics','records','legacy','resumes','champs','hof'];
const mainNav = document.getElementById('main-nav');

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const el = document.getElementById('panel-'+id);
  if (el) el.classList.add('active');
  const idx = PANELS.indexOf(id);
  if (idx >= 0 && mainNav.selectedIndex !== idx) mainNav.selectedIndex = idx;
}

mainNav.addEventListener('change', () => showPanel(PANELS[mainNav.selectedIndex]));
document.getElementById('nav-prev').addEventListener('click', () => { mainNav.selectedIndex = Math.max(0, mainNav.selectedIndex-1); showPanel(PANELS[mainNav.selectedIndex]); });
document.getElementById('nav-next').addEventListener('click', () => { mainNav.selectedIndex = Math.min(PANELS.length-1, mainNav.selectedIndex+1); showPanel(PANELS[mainNav.selectedIndex]); });

document.querySelectorAll('.sub-btn').forEach(b => {
  b.addEventListener('click', () => {
    const p = b.closest('.panel');
    p.querySelectorAll('.sub-btn').forEach(x=>x.classList.remove('active'));
    p.querySelectorAll('.sub-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.sub).classList.add('active');
  });
});

// ═══ HELPERS ═══
async function load(f) {
  const r = await fetch(`data/${f}?t=${Date.now()}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${f}`);
  return r.json();
}
function sh(title, sub='') {
  return `<div class="sh"><span class="sh-title">${title}</span>${sub?`<span class="sh-sub">${sub}</span>`:''}<div class="sh-line"></div></div>`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});
}
function pName(n) { return (n||'').split(',').reverse().join(' ').trim() || n; }
function goToRoster(id) { showPanel('rosters'); mainNav.selectedIndex=PANELS.indexOf('rosters'); setTimeout(()=>{activeRosterId=id;if(ROSTERS)drawRosters();},60); }

// ═══ STANDINGS ═══
async function renderStandings() {
  try {
    const {standings,week,updated} = await load('standings.json');
    document.getElementById('hdr-updated').textContent = `Updated ${fmtDate(updated)}`;
    const ldr = standings[0];
    const rows = standings.map((t,i) => {
      const tot = t.wins+t.losses;
      const pct = tot?(t.wins/tot).toFixed(3).replace(/^0/,''):'.000';
      const gb = i===0?'—':(((ldr.wins-t.wins)+(t.losses-ldr.losses))/2).toFixed(1);
      const mine = isMine(t.name);
      const stBadge = t.streak?`<span style="font-family:var(--fm);font-size:9px;padding:2px 8px;border-radius:3px;background:${t.streakType==='WIN'?'rgba(16,243,123,.1)':'rgba(255,77,106,.1)'};color:${t.streakType==='WIN'?'var(--green)':'var(--red)'}">${t.streakType==='WIN'?'W':'L'}${t.streak}</span>`:'—';
      return `<tr class="${mine?'mine':''} ${i===6?'cut':''}">
        <td class="rk">${t.rank}</td>
        <td><span class="${mine?'wt':''} bt tl" onclick="goToRoster(${t.id})">${t.name}</span></td>
        <td class="r"><span class="wt">${t.wins}</span>–<span class="lt">${t.losses}</span>${t.ties?`–${t.ties}`:''}</td>
        <td class="r dt">${pct}</td><td class="r dt">${gb}</td>
        <td class="r dt">${t.pointsFor}</td><td class="r dt">${t.pointsAgainst}</td>
        <td class="c">${stBadge}</td></tr>`;
    }).join('');
    document.getElementById('std-c').innerHTML = `${sh(`Week ${week} Standings`,'2026 Season')}
      <div class="tw"><table>
        <thead><tr><th class="c">#</th><th>Owner</th><th class="r">W–L</th><th class="r">PCT</th><th class="r">GB</th><th class="r">PF</th><th class="r">PA</th><th class="c">Streak</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="margin-top:10px;font-family:var(--fm);font-size:8px;color:var(--ink3)">── = playoff cutline (top 6)</div>`;
  } catch(e) { document.getElementById('std-c').innerHTML=`<div class="state err">⚠ ${e.message}</div>`; }
}

// ═══ MATCHUPS ═══
async function renderMatchups() {
  try {
    const {matchups,week} = await load('matchups.json');
    const HIT=['R','RBI','HR','SB','K','AVG','OPS'], PIT=['IP','H','K','QS','ERA','WHIP','SV'];
    const cards = matchups.map(m => {
      const {home,away} = m;
      const hasMe = isMine(home.team)||isMine(away.team);
      const hw=home.catWins>away.catWins, aw=away.catWins>home.catWins;
      const hasCats = Object.keys(home.categories||{}).length>0;
      function catRows(cats,label) {
        return `<div class="mu-cats-lbl">${label}</div>`+cats.map(cat=>{
          const h=home.categories?.[cat]||{}, a=away.categories?.[cat]||{};
          const hW=h.result==='WIN', aW=a.result==='WIN';
          return `<div class="mu-cat-row">

async function renderTeamStats() {
  try {
    const {teams,season} = await load('team_stats.json');
    const HIT=['R','RBI','HR','SB','K','AVG','OPS'], PIT=['IP','H','K','QS','ERA','WHIP','SV','HLD'];
    function ranks(cols,lb=[]) {
      const r={};
      cols.forEach(cat=>{
        const v=teams.map((t,i)=>({i,v:t.stats[cat]??null})).filter(x=>x.v!==null);
        v.sort((a,b)=>lb.includes(cat)?a.v-b.v:b.v-a.v);
        v.forEach(({i},ri)=>r[`${i}_${cat}`]=ri+1);
      });
      return r;
    }
    const hr=ranks(HIT), pr=ranks(PIT,['ERA','WHIP','H']);
    function rCol(r,n=12){return r<=3?'var(--green)':r>=n-2?'var(--red)':'var(--ink2)';}
    function tbl(label,cols,rnks) {
      const hdr=['#','Owner',...cols].map((c,i)=>`<th ${i>1?'class="r"':''}>${c}</th>`).join('');
      const rows=teams.map((t,i)=>{
        const mine=isMine(t.name);
        const cells=cols.map(cat=>{const v=t.stats[cat],r=rnks[`${i}_${cat}`];return`<td class="r" style="color:${r?rCol(r):'var(--ink2)'}">${v!==undefined?v:'—'}</td>`;}).join('');
        return`<tr class="${mine?'mine':''}"><td class="rk">${i+1}</td><td><span class="${mine?'wt':''} bt tl" onclick="goToRoster(${t.id})">${t.name}</span></td>${cells}</tr>`;
      }).join('');
      return`${sh(label,'')} <div class="tw"><table><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    document.getElementById('ts-c').innerHTML = `${sh(season+' Season Stats','Green = top 3, Red = bottom 3')}${tbl('Hitting',HIT,hr)}<div style="margin-top:28px">${tbl('Pitching',PIT,pr)}</div>`;
  } catch(e) { document.getElementById('ts-c').innerHTML=`<div class="state err">⚠ ${e.message}</div>`; }
}

let ROSTERS=null, activeRosterId=null;
function drawRosters() {
  if (!ROSTERS) return;
  const {teams,season,projBlend} = ROSTERS;
  const pb=projBlend||{projPct:0,actualPct:100};
  if (!activeRosterId) activeRosterId=(teams[0]||{}).teamId;
  const team=teams.find(t=>t.teamId===activeRosterId)||teams[0];
  if (!team) return;
  function injB(s){if(!s||s==='ACTIVE')return'';if(/QUESTION|DAY/.test(s))return'<span class="inj-q">DTD</span>';if(/^OUT/.test(s))return'<span class="inj-out">OUT</span>';if(/RESERVE|IL/.test(s))return'<span class="inj-il">IL</span>';return'';}
  function tierB(p){const t=p.tier;if(t==='ELITE')return'<span class="bdg bdg-e">⭐ Elite</span>';if(t==='SOLID')return'<span class="bdg bdg-s">Solid</span>';return'';}
  const active=team.players.filter(p=>p.slot&&!['BE','IL','IL10','IL60'].includes(p.slot));
  const bench=team.players.filter(p=>['BE'].includes(p.slot));
  const il=team.players.filter(p=>['IL','IL10','IL60'].includes(p.slot));
  function sec(label,players){
    if(!players.length)return'';
    const hit=players.filter(p=>!p.isPitcher), pit=players.filter(p=>p.isPitcher);
    const HS=['AVG','OPS','R','RBI','HR','SB'], PS=['ERA','WHIP','IP','K','QS','SV'];
    let html=`<div style="margin-top:22px">${sh(label,'')}</div>`;
    if(hit.length){const hdr=['Slot','Player','Pos',...HS].map((c,i)=>`<th ${i>2?'class="r"':''}>${c}</th>`).join('');html+=`<div class="tw"><table><thead><tr>${hdr}</tr></thead><tbody>${hit.map(p=>{const cells=HS.map(c=>`<td class="r dt">${p.stats[c]!==undefined?p.stats[c]:'—'}</td>`).join('');return`<tr><td style="text-align:center"><div style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:28px;border-radius:5px;background:var(--bg3);font-family:var(--fm);font-size:9px;color:var(--ink3)">${p.slot}</div></td><td><b>${pName(p.name)}</b>${tierB(p)}${injB(p.injStatus)}</td><td class="dt" style="font-family:var(--fm);font-size:10px;text-align:center">${p.position}</td>${cells}</tr>`;}).join('')}</tbody></table></div>`;}
    if(pit.length){const hdr=['Slot','Player','Pos',...PS].map((c,i)=>`<th ${i>2?'class="r"':''}>${c}</th>`).join('');html+=`<div class="tw" style="margin-top:8px"><table><thead><tr>${hdr}</tr></thead><tbody>${pit.map(p=>{const cells=PS.map(c=>`<td class="r dt">${p.stats[c]!==undefined?p.stats[c]:'—'}</td>`).join('');return`<tr><td style="text-align:center"><div style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:28px;border-radius:5px;background:var(--bg3);font-family:var(--fm);font-size:9px;color:var(--ink3)">${p.slot}</div></td><td><b>${pName(p.name)}</b>${tierB(p)}${injB(p.injStatus)}</td><td class="dt" style="font-family:var(--fm);font-size:10px;text-align:center">${p.position}</td>${cells}</tr>`;}).join('')}</tbody></table></div>`;}
    return html;
  }
  const opts=teams.map(t=>`<option value="${t.teamId}" ${t.teamId===activeRosterId?'selected':''}>${t.name}</option>`).join('');
  document.getElementById('ros-c').innerHTML=`${sh(season+' Rosters','')}
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><label style="font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3)">Owner</label><select class="dropdown" id="ros-sel">${opts}</select></div>
    ${sec('Active Roster',active)}${sec('Bench',bench)}${sec('Injured List',il)}`;
  document.getElementById('ros-sel').addEventListener('change',e=>{activeRosterId=parseInt(e.target.value);drawRosters();});
}

function renderRBStandings() {

function renderRBH2H() {
  const records=RB.h2hAllTime||[];
  const teams=[...new Set(records.flatMap(r=>[r.team1,r.team2]))];
  const lu={};
  records.forEach(r=>{lu[`${r.team1}__${r.team2}`]={w:r.w,l:r.l,t:r.t||0};lu[`${r.team2}__${r.team1}`]={w:r.l,l:r.w,t:r.t||0};});
  const totals=teams.map(team=>{let w=0,l=0,t=0;teams.filter(x=>x!==team).forEach(o=>{const rec=lu[`${team}__${o}`]||{w:0,l:0,t:0};w+=rec.w;l+=rec.l;t+=rec.t;});return{team,w,l,t};}).sort((a,b)=>b.w-a.w);
  const rows=totals.map(({team,w,l,t})=>{const tot=w+l+t,pct=tot?((w/tot)*100).toFixed(1):'0.0',bw=tot?Math.round(w/tot*100):0,mine=isMine(team);return`<div class="h2h-row ${mine?'mine':''}"><div class="h2h-name ${mine?'wt':''}">${team}</div><div class="h2h-rec"><span class="wt">${w}</span>–<span class="lt">${l}</span>${t?`–${t}`:''}</div><div class="h2h-bar"><div class="h2h-fill" style="width:${bw}%"></div></div><div class="h2h-pct">${pct}%</div></div>`;}).join('');
  document.getElementById('hs-h2h').innerHTML=`${sh('All-Time H2H Records','2013–2025 All Seasons')}${rows}`;
}

function renderHMu(mu) {
  const {matchups}=mu;
  const seasons=[...new Set(matchups.map(m=>m.season))].sort((a,b)=>b-a);
  let cur=seasons[0],q='';
  function draw(){
    const fil=matchups.filter(m=>m.season===cur&&(!q||m.home.toLowerCase().includes(q)||m.away.toLowerCase().includes(q)));
    const rows=fil.map(m=>{const hw=m.winner===m.home,aw=m.winner===m.away;return`<tr><td class="r dt">${m.week}</td><td class="${hw?'wt':''} bt">${m.home}</td><td class="c"><span class="${hw?'wt':''}">${m.homeCatW}</span>–<span class="${aw?'wt':''}">${m.awayCatW}</span></td><td class="${aw?'wt':''} bt">${m.away}</td></tr>`;}).join('');
    const opts=seasons.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
    document.getElementById('hs-mu').innerHTML=`<div class="hist-ctrl"><label>Season</label><select class="hsel" id="hmu">${opts}</select><input class="hinput" id="hmuq" type="text" placeholder="Filter by owner…" value="${q}"/></div><div class="tw"><table><thead><tr><th class="r">Wk</th><th>Home</th><th class="c">Score</th><th>Away</th></tr></thead><tbody>${rows||'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--ink3)">No results</td></tr>'}</tbody></table></div>`;
    document.getElementById('hmu').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
    document.getElementById('hmuq').addEventListener('input',e=>{q=e.target.value.toLowerCase();draw();});
  }
  draw();
}

function renderELO(){
  const elo=Object.entries(RB.currentElo||{}).sort((a,b)=>b[1]-a[1]);
  const max=elo[0]?.[1]||1600,min=elo[elo.length-1]?.[1]||1300;
  const cards=elo.map(([team,rating])=>{
    const pct=((rating-min)/(max-min)*100).toFixed(0);
    const col=rating>=1560?'var(--green)':rating>=1490?'var(--blue)':rating>=1430?'var(--ink2)':'var(--red)';
    const lk=RB.luckAllTime?.find(x=>x.team===team);
    const mine=isMineExact(team);
    return`<div class="elo-card ${mine?'mine':''}"><div class="elo-name ${mine?'wt':''}">${team}</div><div class="elo-val" style="color:${col}">${rating.toFixed(0)}</div><div class="elo-sub">All-Play: ${lk?`${(lk.allPlayPCT*100).toFixed(1)}%`:'—'}</div><div class="elo-bar"><div class="elo-fill" style="width:${pct}%;background:${col}"></div></div></div>`;
  }).join('');
  const active=['TC','Sponny','Greene','Boyce','Mion','Jacob','Bert','Slater','Tim','Schoon','Eriole','Leo'];
  const hist=RB.elo||[];
  const peakRows=active.map(team=>{
    const te=hist.filter(x=>x.team===team);if(!te.length)return'';
    const peak=te.reduce((a,b)=>a.elo>b.elo?a:b);
    const cur=RB.currentElo?.[team]||0, col=cur>=1500?'var(--green)':cur>=1440?'var(--ink2)':'var(--red)', chg=cur-peak.elo, mine=isMineExact(team);
    return`<tr class="${mine?'mine':''}"><td class="${mine?'wt':''} bt">${team}</td><td class="r" style="color:${col};font-family:var(--fm)">${cur.toFixed(0)}</td><td class="r dt" style="font-family:var(--fm)">${peak.elo.toFixed(0)} (${peak.season})</td><td class="r" style="color:${chg>=0?'var(--green)':'var(--red)'};font-family:var(--fm)">${chg>0?'+':''}${chg.toFixed(0)}</td></tr>`;
  }).filter(Boolean).join('');
  document.getElementById('an-elo').innerHTML=`${sh('ELO Power Ratings','Regressed 33% each offseason · 2013–2025')}<div class="elo-grid">${cards}</div>${sh('Career Peak vs Current','')} <div class="tw"><table><thead><tr><th>Owner</th><th class="r">Current</th><th class="r">Peak (Year)</th><th class="r">Δ Since Peak</th></tr></thead><tbody>${peakRows}</tbody></table></div>`;
}

function renderLuck(){
  const luck=[...RB.luckAllTime||[]].filter(x=>!x.team.includes('defunct')).sort((a,b)=>b.luckDelta-a.luckDelta);
  const maxD=Math.max(...luck.map(x=>Math.abs(x.luckDelta)));

  }).join('');

  // By-season table for selected team
  const selTeam = MY_TEAM || 'TC';

  const teamSel=`<div class="hist-ctrl" style="margin-top:24px"><label>Team Detail</label><select class="hsel" id="luck-sel">${(RB.luckAllTime||[]).filter(x=>!x.team.includes('defunct')).map(x=>`<option value="${x.team}" ${x.team===selTeam?'selected':''}>${x.team}</option>`).join('')}</select></div>`;
  document.getElementById('an-luck').innerHTML=`${sh('All-Time Luck Index','Actual Win% vs All-Play Win%')}<div style="font-family:var(--fm);font-size:8px;color:var(--ink3);margin-bottom:16px;line-height:1.8">Positive = lucky (schedule easier than deserved). Negative = unlucky. Center = perfectly fair.</div>${rows}${teamSel}<div class="tw" id="luck-tbl"><table><thead><tr><th>Season</th><th class="r">Actual W–L</th><th class="r">All-Play W–L</th><th class="r">Luck Δ</th></tr></thead><tbody>${jRows}</tbody></table></div>`;
  document.getElementById('luck-sel').addEventListener('change',e=>{

function buildResume(key){
  const lr=RB.legacyRankings?.rankings?.find(x=>x.team===key);
  const fr=RB.franchiseResumes?.find(x=>x.team===key)||{};
  const nar=RB.teamNarratives?.[key]||{};
  const elo=RB.currentElo?.[key];
  const lkAll=RB.luckAllTime?.find(x=>x.team===key);
  const lkBySeason=(RB.luck||[]).filter(x=>x.team===key);
  const stBySeason=Object.entries(RB.standings||{}).map(([yr,teams])=>{
    const t=teams.find(x=>x.team===key);return t?{season:parseInt(yr),...t}:null;
  }).filter(Boolean).sort((a,b)=>a.season-b.season);
  const cwlt=RB.categoryWLT?.[key]||{};
  const champs=fr.champs||lr?.detail?.champs||0;
  const wpct=fr.pct?`${(fr.pct*100).toFixed(1)}%`:'—';

  const taglines={
    TC:'The undisputed GOAT. Three championships. One legacy.',
    Sponny:'Two rings and never finished rebuilding.',
    Greene:'Back-to-back-adjacent champ. The luckiest champion ever recorded.',
    Mion:'The early dynasty. The long decline. The questions.',
    Boyce:'The best roster never to close the deal.',
    Bert:'12 seasons. 7 winning records. Zero rings. The forever bridesmaid.',
    Eriole:'2025 champion. Five seasons, one title, endless upside.',
    Leo:'One season. Championship finals. The most dangerous rookie in league history.',
    Jacob:'Power hitting. Boom or bust. The ceiling is elite.',
    Slater:'Highest ELO in the league. The résumé is thin. The future is bright.',
    Tim:'Loyalty personified. The league needs a Tim.',
    Schoon:'Ten seasons. Zero winning records. Historic futility.',
  };
  const tagline=taglines[key]||'Every season writes a new chapter.';
  const musings=(nar.musings||[]).map(m=>`<div class="res-musing"><span class="res-musing-dot">◆</span><span>${m}</span></div>`).join('');

  // Current roster from ROSTERS data (works for ALL teams)
  let rosterSection='';
  if(ROSTERS){
    // Try to match by owner handle vs ESPN team name
    const rTeam=ROSTERS.teams.find(t=>{
      const n=(t.name||'').toLowerCase();
      const o=(t.owners||[]).join(' ').toLowerCase();
      const k=key.toLowerCase();
      return n.includes(k)||o.includes(k);
    });
    if(rTeam){
      const active=rTeam.players.filter(p=>p.slot&&!['BE','IL','IL10','IL60'].includes(p.slot));
      const hitters=active.filter(p=>!p.isPitcher).slice(0,9);
      const pitchers=active.filter(p=>p.isPitcher).slice(0,9);
      function injB(s){if(!s||s==='ACTIVE')return'';if(/QUESTION|DAY/.test(s))return'<span class="inj-q">DTD</span>';if(/^OUT/.test(s))return'<span class="inj-out">OUT</span>';if(/RESERVE|IL/.test(s))return'<span class="inj-il">IL</span>';return'';}
      function posClass(pos){if(['SP'].includes(pos))return'sp';if(['RP'].includes(pos))return'rp';return'';}
      function pRow(p){return`<div class="ros-row"><div class="ros-pos ${posClass(p.position)}">${p.position}</div><div class="ros-name">${pName(p.name)}${injB(p.injStatus)}</div><div style="font-family:var(--fm);font-size:9px;color:var(--ink3)">${p.slot}</div></div>`;}
      rosterSection=`<hr class="res-div"/><div class="res-sec">2026 Active Roster</div><div class="ros-sec"><div><div class="ros-hd">Hitters — ${active.filter(p=>!p.isPitcher).length} active</div>${hitters.map(pRow).join('')}${active.filter(p=>!p.isPitcher).length>9?`<div style="font-family:var(--fm);font-size:9px;color:var(--ink3);padding-top:6px">+${active.filter(p=>!p.isPitcher).length-9} more</div>`:''}</div><div><div class="ros-hd">Pitchers — ${active.filter(p=>p.isPitcher).length} active</div>${pitchers.map(pRow).join('')}${active.filter(p=>p.isPitcher).length>9?`<div style="font-family:var(--fm);font-size:9px;color:var(--ink3);padding-top:6px">+${active.filter(p=>p.isPitcher).length-9} more</div>`:''}</div></div>`;
    }
  }

  // ── Statcast-style percentile chart ──
  function buildStatcastChart(teamKey, season) {
    const pd = RB.percentileData || {};
    const teamPd = pd[teamKey] || {};
    // Pick season: prefer passed season, else most recent, else allTime
    const seasons = Object.keys(teamPd).filter(s=>s!=='allTime').sort((a,b)=>b-a);
    const activeSeason = season || seasons[0] || 'allTime';
    const data = teamPd[activeSeason] || teamPd['allTime'] || [];
    if (!data.length) return { html: '', seasonKey: activeSeason, seasons };

    function tierOf(p) { return p>=90?'elite':p>=70?'great':p>=40?'avg':p>=20?'below':'poor'; }
    const tierGrad = {
      elite: 'linear-gradient(90deg,#c0392b,#e74c3c)',
      great: 'linear-gradient(90deg,#d35400,#e67e22)',
      avg:   'linear-gradient(90deg,#4a5568,#718096)',
      below: 'linear-gradient(90deg,#2c5282,#3182ce)',
      poor:  'linear-gradient(90deg,#1a365d,#2a4365)',
    };
    const tierColor = { elite:'#e74c3c', great:'#e67e22', avg:'#a0aec0', below:'#4299e1', poor:'#4a5568' };
    const tierBg = { elite:'rgba(231,76,60,.12)', great:'rgba(230,126,34,.1)', avg:'rgba(113,128,150,.08)', below:'rgba(49,130,206,.08)', poor:'rgba(42,67,101,.12)' };

    const rows = data.map(({cat, avg, percentile}) => {
      const tier = tierOf(percentile);
      const rawFmt = avg === undefined ? '' : avg < 1 ? avg.toFixed(3) : avg % 1 === 0 ? avg.toFixed(0) : avg.toFixed(1);
      return `<div style="display:grid;grid-template-columns:56px 1fr 48px 52px;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:right">${cat}</div>
        <div style="height:20px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative">
          <div style="position:absolute;left:0;top:0;height:100%;width:${percentile}%;background:${tierGrad[tier]};border-radius:3px;transition:width .5s ease"></div>
        </div>
        <div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px;font-weight:900;border:2px solid ${tierColor[tier]};background:${tierBg[tier]};color:${tierColor[tier]};flex-shrink:0">${percentile}</div>
        <div style="font-family:var(--fm);font-size:9px;color:var(--ink3);text-align:right">${rawFmt}</div>
      </div>`;
    }).join('');

    const seasonOpts = [...seasons,'allTime'].map(s=>`<option value="${s}" ${s===activeSeason?'selected':''}>${s==='allTime'?'All-Time Avg':s}</option>`).join('');
    const selectorId = `res-pct-sel-${teamKey.replace(/\s/g,'')}`;

    const legend = [['elite','#e74c3c','Elite (90+)'],['great','#e67e22','Great (70–89)'],['avg','#a0aec0','Avg (40–69)'],['below','#4299e1','Below (20–39)'],['poor','#4a5568','Poor (<20)']].map(([,c,l])=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:${c}"></div><span style="font-family:var(--fm);font-size:8px;color:var(--ink3)">${l}</span></div>`).join('');

    const html = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;justify-content:space-between">
        <div style="display:flex;gap:12px;flex-wrap:wrap">${legend}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <label style="font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)">Season</label>
          <select id="${selectorId}" class="hsel" style="font-size:10px;padding:4px 8px" onchange="(function(s){const nb=buildStatcastChart('${teamKey}',s);document.getElementById('${selectorId}').closest('.statcast-wrap').innerHTML=nb.html;addStatcastListeners('${teamKey}');})(this.value)">${seasonOpts}</select>
        </div>
      </div>
      <div style="background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:16px 20px">
        <div style="font-family:var(--fm);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px">
          CATEGORY PERCENTILES ${activeSeason === 'allTime' ? '— All-Time Avg' : '('+activeSeason+')'} — era-adjusted vs all team-seasons
        </div>
        ${rows}
      </div>`;
    return { html, seasonKey: activeSeason, seasons };
  }

  function addStatcastListeners(teamKey) {
    const sid = `res-pct-sel-${teamKey.replace(/\s/g,'')}`;
    const el = document.getElementById(sid);
    if (el) {
      el.onchange = function() {
        const nb = buildStatcastChart(teamKey, this.value);
        this.closest('.statcast-wrap').innerHTML = nb.html;
        addStatcastListeners(teamKey);
      };
    }
  }

  const statcastResult = buildStatcastChart(key, null);
  const statcastBlock = statcastResult.html
    ? `<div class="statcast-wrap">${statcastResult.html}</div>`
    : '';

  const histRows=stBySeason.map(s=>{
    const isChamp=RB.championships?.find(x=>(x.champion===key)&&x.year===s.season);
    const isRU=RB.championships?.find(x=>(x.runnerUp===key)&&x.year===s.season);
    const lk=lkBySeason.find(x=>x.season===s.season);
    const lkStr=lk?` · ${lk.luckDelta>0?'+':''}${(lk.luckDelta*100).toFixed(1)}% luck`:'';
    const rkCls=isChamp?'rk-c':isRU?'rk-p':s.rank<=6?'rk-p':'rk-o';
    const icon=isChamp?'🏆':isRU?'🥈':s.rank<=6?'🏟':'';
    return`<div class="res-sy"><span class="res-sy-yr">${s.season}</span><span class="res-sy-rec"><span class="wt">${s.w}</span>–<span class="lt">${s.l}</span>${s.t?`–${s.t}`:''} · ${((s.pct??0)*100).toFixed(0)}%${lkStr}</span><span class="res-sy-rk ${rkCls}">#${s.rank} ${icon}</span></div>`;
  }).join('');

  const oHead=champs>=2?'Dynasty. No further explanation needed.':champs===1?'Champions know how to close.':fr.pct>0.55?'Elite win rate. Still hunting that title.':'The work continues.';
  const oBody=nar.musings?.[nar.musings.length-1]||`${fr.yrsInLg||0} seasons tracked, ${fr.w||0} all-time wins.`;

  return`<div class="resume">
    <div class="res-hero">
      <div class="res-hero-top">
        <div class="res-abbr">${key.substring(0,2).toUpperCase()}</div>
        <div style="flex:1">
          <div class="res-tname">${key}</div>
          <div class="res-tagline">${tagline}</div>
          <div class="res-owner-line">Legacy Rank #${lr?.rank||'—'} · ${fr.yrsInLg||0} seasons · Score: ${lr?.total?.toFixed(0)||'—'}</div>
        </div>
        <button class="res-close" onclick="document.getElementById('res-detail').innerHTML='<div class=\\"state\\" style=\\"padding:30px 0\\">Select an owner above.</div>'">✕ Close</button>
      </div>
      <div class="res-strip">
        <div class="res-stat"><div class="res-sv" style="color:var(--green)">${fr.w||0}</div><div class="res-sl">All-Time W</div></div>
        <div class="res-stat"><div class="res-sv">${fr.l||0}</div><div class="res-sl">All-Time L</div></div>
        <div class="res-stat"><div class="res-sv" style="color:var(--green)">${wpct}</div><div class="res-sl">Win %</div></div>
        <div class="res-stat"><div class="res-sv" style="color:var(--gold)">${champs}</div><div class="res-sl">Titles</div></div>
        <div class="res-stat"><div class="res-sv" style="color:var(--blue)">${elo?elo.toFixed(0):'—'}</div><div class="res-sl">ELO</div></div>
        <div class="res-stat"><div class="res-sv" style="color:${lkAll?.luckDelta>0?'var(--green)':'var(--red)'}">${lkAll?(lkAll.luckDelta>0?'+':'')+((lkAll.luckDelta*100).toFixed(1))+'%':'—'}</div><div class="res-sl">Career Luck</div></div>
      </div>
    </div>
    <div class="res-body">
      ${musings?`<div class="res-sec">Franchise Musings</div>${musings}<hr class="res-div"/>`:''}
      ${statcastBlock?`<div class="res-sec">Category Percentiles</div>${statcastBlock}<hr class="res-div"/>`:''}
      ${rosterSection}${rosterSection?'<hr class="res-div"/>':''}
      <div class="res-bot">
        <div>
          <div class="res-sec">Season by Season</div>
          ${histRows||'<div style="font-family:var(--fm);font-size:10px;color:var(--ink3)">No season data available.</div>'}
          ${nar.whosYourDaddy||nar.worstRival||nar.peakElo?`<div style="margin-top:14px;font-family:var(--fm);font-size:9px;color:var(--ink3);line-height:2.2">
            ${nar.whosYourDaddy?`<div>😈 <b style="color:var(--green)">Owns:</b> ${nar.whosYourDaddy.opp} (${nar.whosYourDaddy.record})</div>`:''}
            ${nar.worstRival?`<div>😤 <b style="color:var(--red)">Nemesis:</b> ${nar.worstRival.opp} (${nar.worstRival.record})</div>`:''}
            ${nar.peakElo?`<div>📈 <b style="color:var(--blue)">Peak ELO:</b> ${nar.peakElo.elo} (${nar.peakElo.season})</div>`:''}
          </div>`:''}
        </div>
        <div>
          <div class="res-sec">2026 Outlook</div>
          <div class="res-outlook"><div class="res-oh">${oHead}</div><div class="res-ob">${oBody}</div></div>
          ${nar.bestSeason?`<div class="res-peak"><div class="res-pk-lbl">Best Season</div><div class="res-pk-val">${nar.bestSeason.year} — #${nar.bestSeason.rank||'?'}</div><div class="res-pk-d">${nar.bestSeason.w}–${nar.bestSeason.l} · ${((nar.bestSeason.pct??0)*100).toFixed(0)}%</div></div>`:''}
          ${lr?.detail?`<div class="res-peak" style="margin-top:8px"><div class="res-pk-lbl">Score Breakdown</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px;font-family:var(--fm);font-size:9px;color:var(--ink3)">${['rings','sustained','dominance','consistency','acumen'].map(k=>`<div>${k}: <b style="color:var(--ink)">${(lr[k]||0).toFixed(1)}</b></div>`).join('')}</div></div>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

// ═══ CHAMPIONSHIPS ═══
function renderChampions(){
  const champs=(RB.championships||[]).slice().reverse();
  const counts={};champs.forEach(c=>{counts[c.champion]=(counts[c.champion]||0)+1;});
  const ranked=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const cards=champs.map(c=>`<div class="champ-card champ"><div class="champ-year">${c.year}</div><div class="champ-name">🏆 ${c.champion}</div><div class="champ-runner">Runner-up: ${c.runnerUp}</div></div>`).join('');
  const cRows=ranked.map(([team,n],i)=>{const mine=isMineExact(team);return`<tr class="${mine?'mine':''}"><td class="rk" style="color:${i===0?'var(--gold)':i===1?'#94a3b8':'#cd7f32'}">${i+1}</td><td class="${mine?'wt':''} bt">${team}</td><td class="r" style="font-family:var(--fd);font-size:24px;font-weight:900;color:var(--gold)">${n}</td><td style="font-size:18px;letter-spacing:2px">${'🏆'.repeat(n)}</td></tr>`;}).join('');
  document.getElementById('champ-c').innerHTML=`${sh('Championship History','2013–2025')}<div class="champ-grid" style="margin-bottom:28px">${cards}</div>${sh('All-Time Title Count','')}<div class="tw"><table><thead><tr><th class="c">#</th><th>Owner</th><th class="r">Titles</th><th></th></tr></thead><tbody>${cRows}</tbody></table></div>`;
}

// ═══ HALL OF FAME ═══
function renderHOF(){
  const seasons=(RB.playerRater?.seasons||[]).slice(0,50);
  const summary=(RB.playerRater?.teamSummary||[]).sort((a,b)=>b.allStar-a.allStar);
  const prRows=seasons.map((p,i)=>`<tr><td class="rk" style="color:${i===0?'var(--gold)':i===1?'#94a3b8':i===2?'#cd7f32':'var(--ink3)'}">${i+1}</td><td class="bt">${p.player}</td><td style="color:var(--green);font-family:var(--fd);font-size:15px;font-weight:700">${p.team}</td><td class="r dt">${p.year}</td><td class="r" style="font-family:var(--fd);font-size:18px;font-weight:900;color:var(--gold)">${p.score.toFixed(2)}</td></tr>`).join('');
  const sumRows=summary.map(t=>{const mine=isMineExact(t.team);return`<tr class="${mine?'mine':''}"><td class="${mine?'wt':''} bt">${t.team}</td><td class="r dt">${t.allStar}</td><td class="r dt">${t.mvp}</td><td class="r dt">${t.num1}</td><td class="r dt">${t.bestSeason}</td><td class="r" style="font-family:var(--fd);font-size:16px;color:var(--gold)">${t.bestScore.toFixed(2)}</td></tr>`;}).join('');
  document.getElementById('hof-c').innerHTML=`${sh('Hall of Fame','Top Single-Season Player Rater Scores')}<div class="tw" style="margin-bottom:28px"><table><thead><tr><th class="c">#</th><th>Player</th><th>Owner</th><th class="r">Year</th><th class="r">Rating</th></tr></thead><tbody>${prRows}</tbody></table></div>${sh('Team Acumen','All-Star & MVP seasons per franchise')}<div class="tw"><table><thead><tr><th>Owner</th><th class="r">All-Stars</th><th class="r">MVPs</th><th class="r">#1 Overall</th><th class="r">Best Season</th><th class="r">Best Score</th></tr></thead><tbody>${sumRows}</tbody></table></div>`;
}

// ═══ BOOT ═══
(async()=>{
  // Render all RB panels immediately
  renderAnalytics();renderRecords();renderLegacy();renderResumeSelector();renderChampions();renderHOF();
  renderRBStandings();renderRBH2H();

  // Load ESPN live data
  try {
    const meta=await load('meta.json');
    document.getElementById('hdr-year').textContent=meta.season;
    document.getElementById('hdr-updated').textContent=`Updated ${fmtDate(meta.updated)}`;
    if(meta.teams?.length) populateTeamPicker(meta.teams);
    else populateTeamPicker(null);
  } catch(_){ populateTeamPicker(null); }

  await Promise.all([renderStandings(),renderMatchups(),renderPowerRankings(),renderTeamStats(),renderRosters()]);
  loadHistory();
})();
</script>
</body>
</html>
