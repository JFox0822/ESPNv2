<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The League – Fantasy Baseball Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#090c14;--bg2:#0f1420;--bg3:#161c2d;--border:#1e2840;
  --amber:#f5a623;--amber-dim:#c4851a;--amber-glow:rgba(245,166,35,.15);
  --red:#e05c3a;--green:#3dd68c;--blue:#4e9af1;--purple:#9b6dff;--gold:#ffd700;
  --text:#d1d9f0;--text-dim:#6b7a99;--text-bright:#f0f4ff;
  --my-team:rgba(245,166,35,.08);--my-border:rgba(245,166,35,.4);
  --font-d:'Bebas Neue',sans-serif;
  --font-b:'Barlow Condensed',sans-serif;
  --font-m:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 16px 80px}

/* Header */
header{padding:36px 0 24px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;justify-content:space-between}
.eyebrow{font-family:var(--font-m);font-size:10px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-bottom:6px}
.title{font-family:var(--font-d);font-size:clamp(42px,6vw,72px);color:var(--text-bright);line-height:1}
.title-year{color:var(--amber)}
.my-badge{display:inline-block;font-family:var(--font-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);background:var(--amber-glow);border:1px solid var(--my-border);border-radius:4px;padding:4px 10px;margin-bottom:8px}
.updated{font-family:var(--font-m);font-size:10px;color:var(--text-dim)}
.blend-pill{display:inline-block;font-family:var(--font-m);font-size:9px;padding:2px 8px;border-radius:3px;background:rgba(155,109,255,.12);color:var(--purple);border:1px solid rgba(155,109,255,.25);margin-left:8px;vertical-align:middle}

/* Tabs */
.tab-nav{display:flex;gap:4px;padding:20px 0 0;flex-wrap:wrap}
.tab-btn{font-family:var(--font-b);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid var(--border);border-radius:6px;padding:9px 20px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.tab-btn::before{content:'';position:absolute;inset:0;background:var(--amber-glow);opacity:0;transition:opacity .18s}
.tab-btn:hover{color:var(--amber);border-color:var(--amber-dim)}
.tab-btn:hover::before{opacity:1}
.tab-btn.active{color:var(--bg);background:var(--amber);border-color:var(--amber);font-weight:700;box-shadow:0 0 20px var(--amber-glow)}
.tab-panel{display:none;padding-top:28px}
.tab-panel.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Sub-tabs */
.sub-nav{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.sub-btn{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid var(--border);border-radius:4px;padding:6px 14px;cursor:pointer;transition:all .15s}
.sub-btn:hover{color:var(--text);border-color:var(--text-dim)}
.sub-btn.active{color:var(--amber);border-color:var(--amber);background:var(--amber-glow)}
.sub-panel{display:none}.sub-panel.active{display:block;animation:fadeUp .2s ease}

/* Section label */
.slabel{font-family:var(--font-m);font-size:10px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-bottom:14px}

/* Tables */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px}
table{width:100%;border-collapse:collapse;font-family:var(--font-b);font-size:14px}
thead th{background:var(--bg2);color:var(--text-dim);font-family:var(--font-m);font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
thead th.r{text-align:right}thead th.c{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr.mine{background:var(--my-team);border-left:2px solid var(--amber)}
tbody tr.mine:hover{background:rgba(245,166,35,.12)}
tbody td{padding:11px 14px;color:var(--text);white-space:nowrap}
tbody td.r{text-align:right;font-family:var(--font-m);font-size:13px}
tbody td.c{text-align:center;font-family:var(--font-m);font-size:13px}
tbody td.tname{font-weight:600;color:var(--text-bright);font-size:15px}
tbody td.rk{font-family:var(--font-d);font-size:22px;color:var(--text-dim);text-align:center;width:44px}
tbody tr.mine td.tname{color:var(--amber)}
tbody tr.mine td.rk{color:var(--amber)}
.win{color:var(--green)!important}.loss{color:var(--red)!important}
.playoff-line td{border-top:2px dashed var(--amber-dim)!important}
.str-w{display:inline-block;font-family:var(--font-m);font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(61,214,140,.12);color:var(--green)}
.str-l{display:inline-block;font-family:var(--font-m);font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(224,92,58,.12);color:var(--red)}

/* Matchups */
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:14px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.mc.mine{border-color:var(--amber-dim);box-shadow:0 0 18px var(--amber-glow)}
.mh{background:var(--bg3);padding:8px 16px;font-family:var(--font-m);font-size:10px;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.mh .lead{color:var(--amber)}
.mteams{padding:14px 16px 0;display:flex;flex-direction:column;gap:8px}
.mrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.mname{font-weight:600;font-size:16px;color:var(--text-bright);flex:1}
.mname.me{color:var(--amber)}
.mscore{font-family:var(--font-d);font-size:28px;color:var(--text-bright);min-width:32px;text-align:right}
.mscore.w{color:var(--green)}.mscore.l{color:var(--red)}
.vs{text-align:center;padding:2px 0;font-family:var(--font-m);font-size:10px;color:var(--text-dim);letter-spacing:.2em}
.cbd{padding:12px 16px 14px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;border-top:1px solid var(--border);margin-top:12px}
.cc{text-align:center}
.cc-l{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.cc-v{font-family:var(--font-m);font-size:11px;color:var(--text);margin-top:2px}
.cc.wc .cc-v{color:var(--green)}.cc.lc .cc-v{color:var(--red)}

/* Power Rankings */
.pr-list{display:flex;flex-direction:column;gap:10px}
.pr-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;transition:background .15s}
.pr-card:hover{background:var(--bg3)}
.pr-card.mine{background:var(--my-team);border-color:var(--my-border)}
.pr-num{font-family:var(--font-d);font-size:38px;color:var(--text-dim);min-width:44px;line-height:1}
.pr-card.mine .pr-num{color:var(--amber)}
.pr-delta{font-family:var(--font-m);font-size:11px;min-width:28px;text-align:center;margin-top:4px}
.du{color:var(--green)}.dd{color:var(--red)}.ds{color:var(--text-dim)}
.pr-body{flex:1;min-width:0}
.pr-name{font-size:17px;font-weight:600;color:var(--text-bright)}
.pr-card.mine .pr-name{color:var(--amber)}
.pr-sub{font-family:var(--font-m);font-size:11px;color:var(--text-dim);margin-top:2px}
.pr-bars{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;margin:10px 0 8px}
.bar-row{margin-bottom:5px}
.bar-top{display:flex;justify-content:space-between;margin-bottom:2px}
.bar-label{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase}
.bar-val{font-family:var(--font-m);font-size:9px}
.bar-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.cat-pills{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.cp{font-family:var(--font-m);font-size:9px;padding:2px 5px;border-radius:3px}
.r1{background:rgba(61,214,140,.25);color:var(--green)}
.r2{background:rgba(61,214,140,.15);color:var(--green)}
.r3{background:rgba(61,214,140,.08);color:#7de8b5}
.rm{background:rgba(255,255,255,.04);color:var(--text-dim)}
.rb{background:rgba(224,92,58,.08);color:#e08060}
.r10{background:rgba(224,92,58,.15);color:var(--red)}
.r11{background:rgba(224,92,58,.22);color:var(--red)}
.r12{background:rgba(224,92,58,.3);color:var(--red)}
.pr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;min-width:110px}
.composite-val{font-family:var(--font-d);font-size:36px;color:var(--amber);line-height:1}
.composite-lbl{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.h2h-val{font-family:var(--font-d);font-size:20px;color:var(--text-bright)}
.h2h-lbl{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase}
.depth-note{font-family:var(--font-m);font-size:9px;color:var(--text-dim)}
.proj-note{font-family:var(--font-m);font-size:10px;color:var(--purple);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Rosters */
.team-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tbtn{font-family:var(--font-m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid var(--border);border-radius:4px;padding:6px 12px;cursor:pointer;transition:all .15s}
.tbtn:hover{color:var(--text);border-color:var(--text-dim)}
.tbtn.active{color:var(--amber);border-color:var(--amber);background:var(--amber-glow)}
.tbtn.mine{border-color:var(--amber-dim)}
.inj{display:inline-block;font-family:var(--font-m);font-size:9px;padding:1px 5px;border-radius:2px;margin-left:4px}
.inj-ok{background:rgba(61,214,140,.1);color:var(--green)}
.inj-q{background:rgba(245,166,35,.15);color:var(--amber)}
.inj-out{background:rgba(224,92,58,.15);color:var(--red)}
.inj-il{background:rgba(155,109,255,.15);color:var(--purple)}

/* History */
.hist-sel{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.hist-sel label{font-family:var(--font-m);font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.hist-sel select,.hist-search{font-family:var(--font-m);font-size:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:5px 10px;cursor:pointer}
.hist-search{min-width:180px;cursor:text}
.h2h-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-radius:4px;margin-bottom:2px}
.h2h-name{flex:1;font-weight:600;color:var(--text-bright);font-size:13px}
.h2h-rec{font-family:var(--font-m);font-size:12px;min-width:60px;text-align:center}
.h2h-bar{flex:2;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.h2h-fill{height:100%;background:var(--amber);border-radius:3px}
.h2h-pct{font-family:var(--font-m);font-size:11px;color:var(--text-dim);min-width:36px;text-align:right}

/* ── FRANCHISE / LEGACY TAB ────────────────────────────────────────────────── */
.legacy-list{display:flex;flex-direction:column;gap:10px}
.legacy-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s}
.legacy-card:hover{border-color:var(--amber-dim);background:var(--bg3)}
.legacy-card.active-resume{border-color:var(--amber);background:var(--my-team)}
.legacy-rank{font-family:var(--font-d);font-size:48px;line-height:1;min-width:56px;text-align:center}
.legacy-rank.top1{color:var(--gold)}
.legacy-rank.top2{color:#c0c0c0}
.legacy-rank.top3{color:#cd7f32}
.legacy-rank.other{color:var(--text-dim)}
.legacy-info{flex:1}
.legacy-name{font-size:18px;font-weight:700;color:var(--text-bright)}
.legacy-sub{font-family:var(--font-m);font-size:11px;color:var(--text-dim);margin-top:3px}
.legacy-trophies{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.trophy-icon{font-size:16px;cursor:default}
.legacy-score-block{text-align:right}
.legacy-score-val{font-family:var(--font-d);font-size:40px;color:var(--amber);line-height:1}
.legacy-score-lbl{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase}
.legacy-breakdown{display:flex;gap:12px;margin-top:4px;justify-content:flex-end;flex-wrap:wrap}
.lb-item{font-family:var(--font-m);font-size:10px;color:var(--text-dim);text-align:right}
.lb-val{color:var(--text-bright);font-weight:600}

/* Resume panel */
.resume-panel{background:var(--bg2);border:1px solid var(--amber-dim);border-radius:12px;padding:24px;margin-top:24px;animation:fadeUp .3s ease}
.resume-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.resume-name{font-family:var(--font-d);font-size:48px;color:var(--text-bright);line-height:1}
.resume-score{text-align:right}
.resume-score-val{font-family:var(--font-d);font-size:56px;color:var(--amber);line-height:1}
.resume-score-lbl{font-family:var(--font-m);font-size:10px;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase}
.resume-sections{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.resume-section{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px}
.rs-title{font-family:var(--font-m);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
.rs-full{grid-column:1/-1}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.stat-box{background:rgba(255,255,255,.03);border-radius:6px;padding:10px 12px;text-align:center}
.stat-box-val{font-family:var(--font-d);font-size:28px;color:var(--text-bright);line-height:1}
.stat-box-lbl{font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.trophy-row{display:flex;flex-wrap:wrap;gap:8px}
.trophy-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:6px 10px}
.trophy-badge .t-icon{font-size:18px}
.trophy-badge .t-text{font-family:var(--font-m);font-size:10px}
.trophy-badge .t-label{color:var(--text-bright);display:block}
.trophy-badge .t-detail{color:var(--text-dim);font-size:9px;display:block}
.season-row{display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.season-row:last-child{border-bottom:none}
.sy{font-family:var(--font-m);font-size:11px;color:var(--text-dim);min-width:36px}
.srec{font-family:var(--font-m);font-size:12px;flex:1}
.srank{font-family:var(--font-d);font-size:20px;min-width:32px;text-align:right}
.srank.champ{color:var(--gold)}.srank.runu{color:#c0c0c0}.srank.playoff{color:var(--green)}.srank.other{color:var(--text-dim)}
.close-resume{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid var(--border);border-radius:4px;padding:6px 12px;cursor:pointer;transition:all .15s}
.close-resume:hover{color:var(--red);border-color:var(--red)}

/* State */
.state{text-align:center;padding:60px 20px;font-family:var(--font-m);font-size:12px;color:var(--text-dim);letter-spacing:.1em}
.state.err{color:var(--red)}

@media(max-width:700px){
  .mg{grid-template-columns:1fr}
  .cbd{grid-template-columns:repeat(4,1fr)}
  .pr-bars{grid-template-columns:1fr}
  .pr-card{flex-wrap:wrap}
  .resume-sections{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div>
    <div class="eyebrow">ESPN Fantasy Baseball · H2H Categories · Since 2013</div>
    <div class="title">THE LEAGUE <span class="title-year" id="hdr-year">2026</span></div>
  </div>
  <div style="text-align:right">
    <div class="my-badge" id="hdr-team">⚾ Jacob</div>
    <div class="updated" id="hdr-updated">Loading…</div>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="standings">Standings</button>
  <button class="tab-btn" data-tab="matchups">Matchups</button>
  <button class="tab-btn" data-tab="power">Power Rankings</button>
  <button class="tab-btn" data-tab="stats">Team Stats</button>
  <button class="tab-btn" data-tab="rosters">Rosters</button>
  <button class="tab-btn" data-tab="history">History</button>
  <button class="tab-btn" data-tab="franchise">Franchise</button>
</nav>

<!-- Standings -->
<div id="tab-standings" class="tab-panel active">
  <div id="std-content"><div class="state">Loading…</div></div>
</div>

<!-- Matchups -->
<div id="tab-matchups" class="tab-panel">
  <div id="mu-content"><div class="state">Loading…</div></div>
</div>

<!-- Power Rankings -->
<div id="tab-power" class="tab-panel">
  <div id="pr-content"><div class="state">Loading…</div></div>
</div>

<!-- Team Stats -->
<div id="tab-stats" class="tab-panel">
  <div id="ts-content"><div class="state">Loading…</div></div>
</div>

<!-- Rosters -->
<div id="tab-rosters" class="tab-panel">
  <div id="ros-content"><div class="state">Loading…</div></div>
</div>

<!-- History -->
<div id="tab-history" class="tab-panel">
  <div class="sub-nav">
    <button class="sub-btn active" data-sub="hs-standings">Season Standings</button>
    <button class="sub-btn" data-sub="hs-h2h">All-Time H2H</button>
    <button class="sub-btn" data-sub="hs-matchups">Weekly Results</button>
    <button class="sub-btn" data-sub="hs-cats">Category Records</button>
  </div>
  <div id="hs-standings" class="sub-panel active"><div class="state">Loading…</div></div>
  <div id="hs-h2h" class="sub-panel"><div class="state">Loading…</div></div>
  <div id="hs-matchups" class="sub-panel"><div class="state">Loading…</div></div>
  <div id="hs-cats" class="sub-panel"><div class="state">Loading…</div></div>
</div>

<!-- Franchise -->
<div id="tab-franchise" class="tab-panel">
  <div class="sub-nav">
    <button class="sub-btn active" data-sub="fr-legacy">Legacy Leaderboard</button>
    <button class="sub-btn" data-sub="fr-resume">Team Resumes</button>
  </div>
  <div id="fr-legacy" class="sub-panel active"><div class="state">Loading…</div></div>
  <div id="fr-resume" class="sub-panel"><div class="state">Loading…</div></div>
</div>

</div>
<script>
// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
  });
});
document.querySelectorAll('.sub-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    const parent=b.closest('.tab-panel');
    parent.querySelectorAll('.sub-btn').forEach(x=>x.classList.remove('active'));
    parent.querySelectorAll('.sub-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.sub).classList.add('active');
  });
});

// ── Helpers ───────────────────────────────────────────────────────────────────
async function load(f){
  const r=await fetch(`data/${f}?t=${Date.now()}`);
  if(!r.ok)throw new Error(`HTTP ${r.status} loading ${f}`);
  return r.json();
}
function errBox(id,msg){
  document.getElementById(id).innerHTML=`<div class="state err">⚠ ${msg}<br><small>Run the GitHub Action to generate data files.</small></div>`;
}
function fmt(iso){
  if(!iso)return'—';
  return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});
}
function pillClass(r,n=12){
  if(r===1)return'r1';if(r===2)return'r2';if(r===3)return'r3';
  if(r===n)return'r12';if(r===n-1)return'r11';if(r===n-2)return'r10';
  if(r>n*.6)return'rb';return'rm';
}
function bar(label,val,color){
  return`<div class="bar-row">
    <div class="bar-top"><span class="bar-label">${label}</span><span class="bar-val" style="color:${color}">${val.toFixed(1)}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(val,0)}%;background:${color}"></div></div>
  </div>`;
}

// ── Standings ─────────────────────────────────────────────────────────────────
async function renderStandings(){
  try{
    const{standings,week,updated}=await load('standings.json');
    document.getElementById('hdr-updated').textContent=`Updated ${fmt(updated)}`;
    const CUTOFF=6;
    const rows=standings.map((t,i)=>{
      const my=t.isMyTeam?'class="mine"':'';
      const div=i===CUTOFF?'class="playoff-line"':'';
      const sc=t.streakType==='WIN'?'str-w':'str-l';
      const sl=t.streakType==='WIN'?'W':'L';
      const streak=t.streak?`<span class="${sc}">${sl}${t.streak}</span>`:'—';
      const tot=t.wins+t.losses;
      const pct=tot?(t.wins/tot).toFixed(3).replace(/^0/,''):'.000';
      return`<tr ${div} ${my}>
        <td class="rk">${t.rank}</td>
        <td class="tname">${t.name}</td>
        <td class="r"><span class="win">${t.wins}</span>–<span class="loss">${t.losses}</span>${t.ties?`–${t.ties}`:''}</td>
        <td class="r">${pct}</td>
        <td class="r">${t.pointsFor}</td>
        <td class="r">${t.pointsAgainst}</td>
        <td class="c">${streak}</td>
      </tr>`;
    }).join('');
    document.getElementById('std-content').innerHTML=`
      <div class="slabel">Week ${week} · League Standings</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th style="width:44px">#</th><th>Team</th><th class="r">W–L</th><th class="r">PCT</th><th class="r">PF</th><th class="r">PA</th><th class="c">Streak</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="margin-top:10px;font-family:var(--font-m);font-size:10px;color:var(--text-dim)">── dashed line = playoff cutoff (top ${CUTOFF})</div>`;
  }catch(e){errBox('std-content',e.message);}
}

// ── Matchups ──────────────────────────────────────────────────────────────────
async function renderMatchups(){
  try{
    const{matchups,week}=await load('matchups.json');

      const hw=home.catWins>away.catWins;const aw=away.catWins>home.catWins;
      const catRow=cats=>cats.map(c=>{
        const h=home.categories?.[c]||{};

        return`<div class="cc ${hc}"><div class="cc-l">${c}</div><div class="cc-v">${h.value!==undefined?h.value:'—'}</div></div>`;
      }).join('');

      return`<div class="mc ${hasMe?'mine':''}">

        <div class="mteams">
          <div class="mrow"><span class="mname ${home.isMyTeam?'me':''}">${home.team}</span><span class="mscore ${hw?'w':aw?'l':''}">${home.catWins}</span></div>
          <div class="vs">· · · VS · · ·</div>
          <div class="mrow"><span class="mname ${away.isMyTeam?'me':''}">${away.team}</span><span class="mscore ${aw?'w':hw?'l':''}">${away.catWins}</span></div>

// ── Power Rankings ─────────────────────────────────────────────────────────────
async function renderPowerRankings(){
  try{
    const{rankings,week,cats,projBlend,weights}=await load('power_rankings.json');
    const w=weights||{};
    const pb=projBlend||{};
    const pPct=pb.projPct||0; const aPct=pb.actualPct||100;

    const cards=rankings.map(p=>{
      const d=p.rankDelta;
      const dEl=d>0?`<span class="pr-delta du">▲${d}</span>`:d<0?`<span class="pr-delta dd">▼${Math.abs(d)}</span>`:`<span class="pr-delta ds">—</span>`;
      const pills=(cats||[]).map(c=>{
        const r=p.catRanks?.[c];
        return r?`<span class="cp ${pillClass(r,rankings.length)}">${c}&#8239;#${r}</span>`:'';
      }).join('');
      const h2h=`<span class="win">${p.h2hWins}</span>–<span class="loss">${p.h2hLosses}</span>`;
      return`<div class="pr-card ${p.isMyTeam?'mine':''}">
        <div class="pr-num">${p.pwRank}</div>
        ${dEl}
        <div class="pr-body">
          <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
            <div class="pr-name">${p.name}</div>
            <div style="font-family:var(--font-m);font-size:11px;color:var(--text-dim)">#${p.overallRank} standings · ${p.overallW}–${p.overallL}</div>
          </div>
          <div class="pr-bars">
            ${bar(`Starter Hitting (${(w.starterHit*100|0)}%)`,p.starterHitScore||0,'#3dd68c')}
            ${bar(`Starter Pitching (${(w.starterPit*100|0)}%)`,p.starterPitScore||0,'#4e9af1')}
            ${bar(`Bench Hit Depth (${(w.benchHit*100|0)}%)`,p.benchHitScore||0,'rgba(61,214,140,.5)')}
            ${bar(`Bench Pitch Depth (${(w.benchPit*100|0)}%)`,p.benchPitScore||0,'rgba(78,154,241,.5)')}
          </div>
          <div class="cat-pills">${pills}</div>
        </div>
        <div class="pr-right">
          <div><div class="composite-val">${(p.composite||0).toFixed(1)}</div><div class="composite-lbl">Composite</div></div>
          <div><div class="h2h-val">${h2h}</div><div class="h2h-lbl">14-Cat H2H</div></div>
          <div class="depth-note">${p.hitDepth||0}H / ${p.pitchDepth||0}P rostered</div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('pr-content').innerHTML=`
      <div class="slabel">Week ${week} Power Rankings · Composite Score</div>
      <div class="proj-note">
        <span class="blend-pill">${pPct}% Projected / ${aPct}% Actual</span>
        ${pPct>0?`Using projection blend — fades to 100% actuals by week 12`:`100% actual stats`}
      </div>
      <div style="font-family:var(--font-m);font-size:11px;color:var(--text-dim);margin-bottom:16px;line-height:1.8">
        <b style="color:var(--text)">Composite</b> = weighted blend of 5 components. Bars show each component score (0–100).<br>
        <b style="color:var(--green)">Starter Hitting/Pitching</b> = z-score vs all league players at that position.<br>
        <b style="color:rgba(61,214,140,.6)">Bench Depth</b> = bench quality relative to league benches.<br>
        <b style="color:var(--text)">14-Cat H2H</b> = simulated W-L vs every team across all 14 categories.<br>
        <b style="color:var(--text)">▲/▼</b> = movement vs actual standings rank.
      </div>
      <div class="pr-list">${cards||'<div class="state">No data yet.</div>'}</div>`;
  }catch(e){errBox('pr-content',e.message);}
}

// ── Rosters ────────────────────────────────────────────────────────────────────
async function renderRosters(){
  try{
    const{teams,season,projBlend}=await load('rosters.json');
    if(!teams?.length){errBox('ros-content','No roster data.');return;}
    let activeId=(teams.find(t=>t.isMyTeam)||teams[0]).teamId;
    const pb=projBlend||{};

    function injBadge(s){
      if(!s||s==='ACTIVE')return'<span class="inj inj-ok">Active</span>';
      if(s==='QUESTIONABLE'||s==='DAY_TO_DAY')return'<span class="inj inj-q">DTD</span>';
      if(s==='OUT')return'<span class="inj inj-out">OUT</span>';
      if(s==='INJURY_RESERVE'||s==='IL')return'<span class="inj inj-il">IL</span>';
      return`<span class="inj inj-q">${s}</span>`;
    }

    function playerRow(p,stats){
      const cells=stats.map(s=>`<td class="r">${p.stats[s]!==undefined?p.stats[s]:'—'}</td>`).join('');
      return`<tr><td style="width:28px;font-family:var(--font-m);font-size:11px;color:var(--text-dim);text-align:center">${p.slot}</td>
        <td class="tname" style="font-size:14px">${p.name}${injBadge(p.injStatus)}</td>
        <td style="font-family:var(--font-m);font-size:11px;color:var(--text-dim);text-align:center">${p.position}</td>
        ${cells}</tr>`;
    }

    function renderTeam(team){
      const active=team.players.filter(p=>!p.onBench&&!p.onIL);
      const bench=team.players.filter(p=>p.onBench);
      const il=team.players.filter(p=>p.onIL);
      const HS=['AVG','OPS','R','RBI','HR','SB'];
      const PS=['ERA','WHIP','IP','K','QS','SV'];
      function section(label,players){
        if(!players.length)return'';
        const hitters=players.filter(p=>!p.isPitcher);
        const pitchers=players.filter(p=>p.isPitcher);
        let out=`<div class="slabel" style="margin-top:20px">${label}</div>`;
        if(hitters.length){
          const hdr=['Slot','Player','Pos',...HS].map((c,i)=>`<th ${i>2?'class="r"':''}>${c}</th>`).join('');
          out+=`<div class="tbl-wrap"><table><thead><tr>${hdr}</tr></thead><tbody>${hitters.map(p=>playerRow(p,HS)).join('')}</tbody></table></div>`;
        }
        if(pitchers.length){
          const hdr=['Slot','Player','Pos',...PS].map((c,i)=>`<th ${i>2?'class="r"':''}>${c}</th>`).join('');
          out+=`<div class="tbl-wrap" style="margin-top:8px"><table><thead><tr>${hdr}</tr></thead><tbody>${pitchers.map(p=>playerRow(p,PS)).join('')}</tbody></table></div>`;
        }
        return out;
      }
      return section('Active Roster',active)+section('Bench',bench)+section('Injured List',il);
    }

    function draw(){
      const team=teams.find(t=>t.teamId===activeId);
      const btns=teams.map(t=>`<button class="tbtn ${t.isMyTeam?'mine':''} ${t.teamId===activeId?'active':''}" data-tid="${t.teamId}">${t.abbrev}</button>`).join('');
      document.getElementById('ros-content').innerHTML=`
        <div class="slabel">${season} Rosters</div>
        ${pb.projPct>0?`<div class="proj-note"><span class="blend-pill">${pb.projPct}% Projected / ${pb.actualPct}% Actual</span> Stats use projection blend</div>`:''}
        <div class="team-btns">${btns}</div>
        <div id="ros-detail">${renderTeam(team)}</div>`;
      document.querySelectorAll('.tbtn').forEach(b=>{
        b.addEventListener('click',()=>{activeId=parseInt(b.dataset.tid);draw();});
      });
    }
    draw();
  }catch(e){errBox('ros-content',e.message);}
}

let H={};
async function loadHistory(){
  try{
    const[st,h2h,mu,cats]=await Promise.all([

function renderHStandings(){
  try{
    const{seasons}=H.st;
    if(!seasons?.length){errBox('hs-standings','No data.');return;}
    let cur=seasons[seasons.length-1].season;
    function draw(){
      const s=seasons.find(x=>x.season===cur);
      const rows=s.teams.map(t=>`<tr>
        <td class="rk">${t.rank}</td><td class="tname">${t.name}</td>
        <td class="r"><span class="win">${t.wins}</span>–<span class="loss">${t.losses}</span></td>
        <td class="r">${t.pointsFor}</td>
        <td class="c">${t.champion?'🏆':t.runnerUp?'🥈':t.madePlayoffs?'🏟️':'—'}</td>
      </tr>`).join('');
      const opts=seasons.map(s=>`<option value="${s.season}" ${s.season===cur?'selected':''}>${s.season}</option>`).join('');
      document.getElementById('hs-standings').innerHTML=`
        <div class="hist-sel"><label>Season</label><select id="hss-sel">${opts}</select></div>
        <div class="tbl-wrap"><table>
          <thead><tr><th style="width:44px">#</th><th>Team</th><th class="r">W–L</th><th class="r">PF</th><th class="c">Result</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;
      document.getElementById('hss-sel').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
    }
    draw();
  }catch(e){errBox('hs-standings',e.message);}
}

function renderHH2H(){
  try{
    const{records,teams}=H.h2h;
    if(!records?.length){errBox('hs-h2h','No H2H data.');return;}
    const totW={};teams.forEach(t=>{totW[t]=0;});
    records.forEach(r=>{totW[r.teamA]=(totW[r.teamA]||0)+r.aWins;});
    const sorted=[...teams].sort((a,b)=>(totW[b]||0)-(totW[a]||0));
    const lu={};
    records.forEach(r=>{
      lu[`${r.teamA}__${r.teamB}`]={w:r.aWins,l:r.aLosses};
      lu[`${r.teamB}__${r.teamA}`]={w:r.aLosses,l:r.aWins};
    });
    const rows=sorted.map(team=>{
      let tw=0,tl=0;
      sorted.filter(t=>t!==team).forEach(opp=>{
        const rec=lu[`${team}__${opp}`]||{w:0,l:0};
        tw+=rec.w;tl+=rec.l;
      });
      const tot=tw+tl;
      const pct=tot?((tw/tot)*100).toFixed(1):0;
      const bw=tot?Math.round(tw/tot*100):0;
      return`<div class="h2h-row">
        <div class="h2h-name">${team}</div>
        <div class="h2h-rec"><span class="win">${tw}</span>–<span class="loss">${tl}</span></div>
        <div class="h2h-bar"><div class="h2h-fill" style="width:${bw}%"></div></div>
        <div class="h2h-pct">${pct}%</div>
      </div>`;
    }).join('');
    document.getElementById('hs-h2h').innerHTML=`
      <div class="slabel">All-Time Head-to-Head Records</div>
      <div style="font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-bottom:14px">Available seasons. Sorted by total wins.</div>
      ${rows}`;
  }catch(e){errBox('hs-h2h',e.message);}
}

function renderHMatchups(){
  try{
    const{matchups}=H.mu;
    if(!matchups?.length){errBox('hs-matchups','No matchup data.');return;}
    const seasons=[...new Set(matchups.map(m=>m.season))].sort((a,b)=>b-a);
    let cur=seasons[0],q='';
    function draw(){
      const fil=matchups.filter(m=>m.season===cur&&(!q||m.home.toLowerCase().includes(q)||m.away.toLowerCase().includes(q)));
      const rows=fil.map(m=>{
        const hw=m.winner===m.home;const aw=m.winner===m.away;
        return`<tr>
          <td class="r" style="color:var(--text-dim)">${m.week}</td>
          <td class="tname" style="${hw?'color:var(--green)':''}">${m.home}</td>
          <td class="c"><span class="${hw?'win':''}">${m.homeCatW}</span>–<span class="${aw?'win':''}">${m.awayCatW}</span></td>
          <td class="tname" style="${aw?'color:var(--green)':''}">${m.away}</td>
        </tr>`;
      }).join('');
      const opts=seasons.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
      document.getElementById('hs-matchups').innerHTML=`
        <div class="hist-sel">
          <label>Season</label><select id="hmu-sel">${opts}</select>
          <input class="hist-search" id="hmu-q" type="text" placeholder="Filter by team…" value="${q}"/>
        </div>
        <div class="tbl-wrap"><table>
          <thead><tr><th class="r">Wk</th><th>Home</th><th class="c">Score</th><th>Away</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-dim)">No results</td></tr>'}</tbody>
        </table></div>`;
      document.getElementById('hmu-sel').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
      document.getElementById('hmu-q').addEventListener('input',e=>{q=e.target.value.toLowerCase();draw();});
    }
    draw();
  }catch(e){errBox('hs-matchups',e.message);}
}

function renderHCats(){
  try{
    const{seasons,cats}=H.cats;
    if(!seasons?.length){errBox('hs-cats','No cat data.');return;}
    const all=[...seasons].map(s=>s.season).sort((a,b)=>b-a);
    let cur=all[0];
    function draw(){
      const sd=seasons.find(s=>s.season===cur);
      const teams=[...sd.teams].sort((a,b)=>{
        const aw=Object.values(a.catRecord||{}).reduce((s,v)=>s+(v.W||0),0);
        const bw=Object.values(b.catRecord||{}).reduce((s,v)=>s+(v.W||0),0);
        return bw-aw;
      });
      const hdr=['Team',...cats].map((c,i)=>`<th ${i?'class="c"':''}>${c}</th>`).join('');
      const rows=teams.map(t=>{
        const cells=cats.map(cat=>{
          const r=t.catRecord?.[cat];
          if(!r)return'<td class="c" style="color:var(--text-dim)">—</td>';
          const tot=(r.W||0)+(r.L||0);
          const pct=tot?Math.round((r.W||0)/tot*100):0;
          const col=pct>=55?'var(--green)':pct<=45?'var(--red)':'var(--text)';
          return`<td class="c"><span style="color:${col};font-family:var(--font-m);font-size:11px">${r.W||0}–${r.L||0}</span></td>`;
        }).join('');
        return`<tr><td class="tname">${t.name}</td>${cells}</tr>`;
      }).join('');
      const opts=all.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
      document.getElementById('hs-cats').innerHTML=`
        <div class="hist-sel"><label>Season</label><select id="hcat-sel">${opts}</select></div>
        <div style="font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-bottom:12px"><span style="color:var(--green)">Green</span> = 55%+ win rate · <span style="color:var(--red)">Red</span> = 45% and below</div>
        <div class="tbl-wrap"><table><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
      document.getElementById('hcat-sel').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
    }
    draw();
  }catch(e){errBox('hs-cats',e.message);}
}

function renderLegacyLeaderboard(){

    const tot=t.allTimeW+t.allTimeL;
    const wpct=tot?((t.allTimeW/tot)*100).toFixed(1):'0.0';
    return`<div class="legacy-card" data-ok="${t.ownerKey}" onclick="showResume('${t.ownerKey}')">
      <div class="legacy-rank ${rankClass(t.legacyRank)}">${t.legacyRank}</div>
      <div class="legacy-info">
        <div class="legacy-name">${t.name}</div>
        <div class="legacy-sub">${t.allTimeW}–${t.allTimeL} all-time (${wpct}%) · ${t.seasonsTracked} seasons tracked</div>
        <div class="legacy-trophies" style="margin-top:6px">${icons}</div>
      </div>
      <div class="legacy-score-block">
        <div class="legacy-score-val">${t.legacyScore.toFixed(0)}</div>
        <div class="legacy-score-lbl">Legacy Score</div>
        <div class="legacy-breakdown">
          ${c.championships?`<div class="lb-item"><span class="lb-val">🏆${c.championships}</span> title${c.championships>1?'s':''}</div>`:''}
          ${c.runnerUps?`<div class="lb-item"><span class="lb-val">🥈${c.runnerUps}</span> runner-up</div>`:''}
          <div class="lb-item"><span class="lb-val">${c.playoffApps}</span> playoffs</div>
          <div class="lb-item"><span class="lb-val">${c.winningSeasons}</span> winning seasons</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('fr-legacy').innerHTML=`
    <div class="slabel">All-Time Franchise Legacy Rankings</div>
    <div style="font-family:var(--font-m);font-size:11px;color:var(--text-dim);margin-bottom:16px;line-height:1.8">
      <b style="color:var(--text)">Legacy Score</b> = Championship (150) + Runner-Up (75) + Playoff App (20) + Winning Season (12) + Consistency Bonus (max 50) + Roster Balance Bonus (max 40)<br>
      Click any card to view full franchise resume.
    </div>
    <div class="legacy-list">${rows||'<div class="state">No legacy data.</div>'}</div>
    <div id="legacy-resume-slot"></div>`;
}

function renderResumePicker(){
  const btns=legacyData.map(t=>`<button class="tbtn" data-ok="${t.ownerKey}" onclick="showResume('${t.ownerKey}',true)">${t.name.split(' ').pop()}</button>`).join('');
  document.getElementById('fr-resume').innerHTML=`
    <div class="slabel">Team Resumes</div>
    <div class="team-btns" style="margin-bottom:20px">${btns}</div>
    <div id="resume-detail"><div class="state" style="padding:40px 0">Select a team above to view their full franchise resume.</div></div>`;
}

function showResume(ownerKey, fromResumeTab=false){
  const t=legacyData.find(x=>x.ownerKey===ownerKey);
  if(!t)return;

  // Highlight selected card in leaderboard
  document.querySelectorAll('.legacy-card').forEach(c=>{
    c.classList.toggle('active-resume',c.dataset.ok===ownerKey);
  });

  const c=t.components||{};
  const tot=t.allTimeW+t.allTimeL;
  const wpct=tot?((t.allTimeW/tot)*100).toFixed(1):'0.0';

  // Season history rows
  const histRows=(t.seasonHistory||[]).map(s=>{
    const fr=s.finalRank;
    const rc=s.champion?'champ':s.runnerUp?'runu':s.madePlayoffs?'playoff':'other';
    const icon=s.champion?'🏆':s.runnerUp?'🥈':s.madePlayoffs?'🏟️':'';
    return`<div class="season-row">
      <span class="sy">${s.season}</span>
      <span class="srec"><span class="win">${s.wins}</span>–<span class="loss">${s.losses}</span> · ${(s.winPct*100).toFixed(1)}%</span>
      <span class="srank ${rc}">${fr?`#${fr}`:icon||'—'}${icon&&fr?' '+icon:icon}</span>
    </div>`;
  }).join('');

  // Trophy case
  const trophies=(t.trophyCase||[]).map(tr=>`
    <div class="trophy-badge">
      <span class="t-icon">${tr.icon}</span>
      <span class="t-text">
        <span class="t-label">${tr.label}</span>
        <span class="t-detail">${tr.detail}</span>
      </span>
    </div>`).join('');

  // H2H records
  const h2hRows=(t.h2hRecords||[]).slice(0,12).map(r=>{
    const tot=r.wins+r.losses;
    const pct=tot?((r.wins/tot)*100).toFixed(0):0;
    const bw=tot?Math.round(r.wins/tot*100):0;
    return`<div class="h2h-row" style="padding:6px 10px">
      <div class="h2h-name" style="font-size:12px">${r.opponent}</div>
      <div class="h2h-rec" style="font-size:11px"><span class="win">${r.wins}</span>–<span class="loss">${r.losses}</span></div>
      <div class="h2h-bar"><div class="h2h-fill" style="width:${bw}%"></div></div>
      <div class="h2h-pct">${pct}%</div>
    </div>`;
  }).join('');

  const html=`<div class="resume-panel">
    <div class="resume-header">
      <div>
        <div class="resume-name">${t.name}</div>
        <div style="font-family:var(--font-m);font-size:11px;color:var(--text-dim);margin-top:4px">${t.allTimeW}–${t.allTimeL} all-time · ${t.seasonsTracked} seasons tracked</div>
        ${t.allNames&&t.allNames.length>1?`<div style="font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-top:2px">Also known as: ${t.allNames.filter(n=>n!==t.name).join(', ')}</div>`:''}
      </div>
      <div class="resume-score">
        <div class="resume-score-val">${t.legacyScore.toFixed(0)}</div>
        <div class="resume-score-lbl">Legacy Score · Rank #${t.legacyRank}</div>
      </div>
    </div>

    <div class="resume-sections">

      <!-- Key Stats -->
      <div class="resume-section">
        <div class="rs-title">Franchise Stats</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="stat-box-val" style="color:var(--gold)">${c.championships||0}</div><div class="stat-box-lbl">Championships</div></div>
          <div class="stat-box"><div class="stat-box-val">${c.runnerUps||0}</div><div class="stat-box-lbl">Runner-Ups</div></div>
          <div class="stat-box"><div class="stat-box-val" style="color:var(--green)">${c.playoffApps||0}</div><div class="stat-box-lbl">Playoff Apps</div></div>
          <div class="stat-box"><div class="stat-box-val">${c.winningSeasons||0}</div><div class="stat-box-lbl">Winning Seasons</div></div>
          <div class="stat-box"><div class="stat-box-val">${wpct}%</div><div class="stat-box-lbl">All-Time Win%</div></div>
          <div class="stat-box"><div class="stat-box-val">${t.longestWinStreak||0}</div><div class="stat-box-lbl">Longest W Streak</div></div>
        </div>
      </div>

      <!-- Trophy Case -->
      <div class="resume-section">
        <div class="rs-title">Trophy Case</div>
        ${trophies?`<div class="trophy-row">${trophies}</div>`:`<div style="font-family:var(--font-m);font-size:11px;color:var(--text-dim)">No trophies yet — keep competing!</div>`}
      </div>

      <!-- Season History -->
      <div class="resume-section">
        <div class="rs-title">Season by Season</div>
        ${histRows||'<div style="font-family:var(--font-m);font-size:11px;color:var(--text-dim)">No season data.</div>'}
      </div>

      <!-- H2H Records -->
      <div class="resume-section">
        <div class="rs-title">Head-to-Head Records</div>
        ${h2hRows||'<div style="font-family:var(--font-m);font-size:11px;color:var(--text-dim)">No H2H data yet.</div>'}
      </div>

      <!-- Best/Worst -->
      <div class="resume-section rs-full">
        <div class="rs-title">Career Highlights</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
          ${t.bestSeason?`<div class="stat-box"><div class="stat-box-val" style="color:var(--green);font-size:20px">${t.bestSeason.season}</div><div class="stat-box-lbl">Best Season (Rank #${t.bestSeason.finalRank})</div></div>`:''}
          ${t.worstSeason?`<div class="stat-box"><div class="stat-box-val" style="color:var(--red);font-size:20px">${t.worstSeason.season}</div><div class="stat-box-lbl">Worst Season (Rank #${t.worstSeason.finalRank})</div></div>`:''}
          <div class="stat-box"><div class="stat-box-val" style="font-size:20px">${c.consistencyBonus?.toFixed(0)||0}</div><div class="stat-box-lbl">Consistency Bonus</div></div>
          <div class="stat-box"><div class="stat-box-val" style="font-size:20px">${c.catBalanceBonus?.toFixed(0)||0}</div><div class="stat-box-lbl">Roster Balance Bonus</div></div>
        </div>
      </div>

    </div><!-- /resume-sections -->
  </div>`;

  // Render in the right place depending on which sub-tab triggered it
  if(fromResumeTab){
    document.getElementById('resume-detail').innerHTML=html;
    // Switch to resume sub-tab
    document.querySelectorAll('[data-sub="fr-resume"]').forEach(b=>{b.click();});
  } else {
    document.getElementById('legacy-resume-slot').innerHTML=html;
    // Scroll to it
    setTimeout(()=>document.getElementById('legacy-resume-slot').scrollIntoView({behavior:'smooth',block:'start'}),100);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async()=>{
  try{
    const meta=await load('meta.json');
    document.getElementById('hdr-year').textContent=meta.season;
    document.getElementById('hdr-team').textContent=`⚾ ${meta.myTeam}`;
    document.getElementById('hdr-updated').textContent=`Updated ${fmt(meta.updated)}`;
  }catch(_){}

  renderStandings();
  renderMatchups();
  renderPowerRankings();
  renderTeamStats();
  renderRosters();
  loadHistory();
  loadFranchise();
})();
</script>
</body>
</html>
