<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The League · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070b14;--bg1:#0d1321;--bg2:#111b2e;--bg3:#162038;
  --border:#1c2d45;--border2:#243858;
  --green:#00d68f;--green-dk:#00a66e;--green-bg:rgba(0,214,143,.08);
  --red:#ff4757;--red-bg:rgba(255,71,87,.08);
  --blue:#4d9fff;--blue-bg:rgba(77,159,255,.08);
  --gold:#fbbf24;--gold-bg:rgba(251,191,36,.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);
  --orange:#fb923c;--teal:#2dd4bf;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4b6280;--white:#f8fafc;
  --sh:0 1px 3px rgba(0,0,0,.4),0 4px 20px rgba(0,0,0,.3);
  --sh2:0 8px 32px rgba(0,0,0,.5);
  --r:10px;--rsm:6px;
  --fd:'Bebas Neue',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;min-height:100vh;line-height:1.5}
button{font-family:var(--fb);cursor:pointer;border:none;background:none}
select,input{font-family:var(--fb)}
a{color:inherit;text-decoration:none}
.wrap{max-width:1300px;margin:0 auto;padding:0 20px 80px}

/* ── HEADER ── */
.site-hdr{padding:20px 0 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-bottom:14px}
.brand{display:flex;align-items:baseline;gap:8px}
.brand-name{font-family:var(--fd);font-size:clamp(26px,4vw,40px);color:var(--white);letter-spacing:.04em;line-height:1}
.brand-year{font-family:var(--fd);font-size:clamp(26px,4vw,40px);color:var(--green);letter-spacing:.04em;line-height:1}
.brand-sub{font-family:var(--fm);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-top:3px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.my-pill{display:inline-flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:5px 13px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.my-pill span{font-family:var(--fm);font-size:10px;letter-spacing:.1em;color:var(--text)}
.hdr-meta{font-family:var(--fm);font-size:9px;color:var(--text3);letter-spacing:.06em}
.tab-nav{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin-bottom:28px}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:12px 18px;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}

/* ── PANELS ── */
.panel{display:none}.panel.active{display:block;animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SUB-NAV ── */
.sub-nav{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.sub-btn{font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);background:var(--bg1);border:1px solid var(--border);border-radius:var(--rsm);padding:7px 14px;transition:all .15s}
.sub-btn:hover{color:var(--text);border-color:var(--border2)}
.sub-btn.active{color:var(--green);border-color:rgba(0,214,143,.4);background:rgba(0,214,143,.05)}
.sub-panel{display:none}.sub-panel.active{display:block;animation:up .15s ease}

/* ── SECTION LABEL ── */
.sl{font-family:var(--fm);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── CARD ── */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
.cp{padding:20px}

/* ── TABLE ── */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
thead th{font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
thead th.r{text-align:right}thead th.c{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
tbody tr.mine{background:rgba(0,214,143,.04);border-left:2px solid var(--green)}
tbody tr.mine:hover{background:rgba(0,214,143,.07)}
tbody tr.cut td:first-child{border-top:1px dashed var(--border2)!important}
tbody td{padding:10px 14px;color:var(--text);white-space:nowrap}
tbody td.r{text-align:right;font-family:var(--fm);font-size:12px}
tbody td.c{text-align:center;font-family:var(--fm);font-size:12px}
tbody td.b{font-weight:700;color:var(--white)}
tbody td.d{color:var(--text2)}
tbody td.rk{font-family:var(--fd);font-size:22px;color:var(--text3);text-align:center;width:48px}
tbody tr.mine td.rk{color:var(--green)}
tbody tr.mine td.b{color:var(--green)}
.w{color:var(--green)!important}.l{color:var(--red)!important}
.tl{cursor:pointer}.tl:hover{color:var(--blue)!important;text-decoration:underline}

/* ── BADGES ── */
.bdg{display:inline-block;font-family:var(--fm);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:4px;padding:2px 7px;vertical-align:middle;margin-left:4px}
.bdg-e{background:rgba(251,191,36,.15);color:var(--gold);border:1px solid rgba(251,191,36,.3)}
.bdg-s{background:rgba(0,214,143,.1);color:var(--green);border:1px solid rgba(0,214,143,.25)}
.bdg-w{background:var(--green-bg);color:var(--green)}
.bdg-l{background:var(--red-bg);color:var(--red)}
.bdg-p{background:var(--purple-bg);color:var(--purple)}

/* ── STAT BAR ── */
.sb-wrap{margin-bottom:5px}
.sb-top{display:flex;justify-content:space-between;margin-bottom:3px}
.sb-lbl{font-family:var(--fm);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.sb-val{font-family:var(--fm);font-size:9px;font-weight:600}
.sb-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.sb-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* ── CAT PILL ── */
.cp1{background:rgba(0,214,143,.2);color:var(--green);border:1px solid rgba(0,214,143,.4);display:inline-block;font-family:var(--fm);font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;margin:1px}
.cp2{background:rgba(0,214,143,.12);color:var(--green);border:1px solid rgba(0,214,143,.25);display:inline-block;font-family:var(--fm);font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;margin:1px}
.cp3{background:rgba(0,214,143,.06);color:var(--green-dk);border:1px solid rgba(0,214,143,.15);display:inline-block;font-family:var(--fm);font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;margin:1px}
.cpm{background:var(--bg3);color:var(--text3);border:1px solid var(--border);display:inline-block;font-family:var(--fm);font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;margin:1px}
.cpb{background:rgba(255,71,87,.06);color:var(--orange);border:1px solid rgba(255,71,87,.15);display:inline-block;font-family:var(--fm);font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;margin:1px}
.cp10{background:rgba(255,71,87,.12);color:var(--red);border:1px solid rgba(255,71,87,.3);display:inline-block;font-family:var(--fm);font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;margin:1px}
.cp12{background:rgba(255,71,87,.2);color:var(--red);border:1px solid rgba(255,71,87,.4);display:inline-block;font-family:var(--fm);font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;margin:1px}

/* ── MATCHUPS ── */
.mu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:14px}
.mu-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.mu-card.mine{border-color:rgba(0,214,143,.4);box-shadow:0 0 0 1px rgba(0,214,143,.15),var(--sh)}
.mu-hd{background:var(--bg3);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase}
.mu-hd-l{color:var(--text3)}.mu-hd-r{color:var(--gold);font-weight:600}
.mu-body{padding:14px 16px 10px}
.mu-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.mu-name{font-weight:700;font-size:15px;color:var(--white);flex:1;cursor:pointer}
.mu-name:hover{color:var(--blue)}.mu-name.me{color:var(--green)}
.mu-score{font-family:var(--fd);font-size:32px;min-width:38px;text-align:right;line-height:1;color:var(--white)}
.mu-score.win{color:var(--green)}.mu-score.lose{color:var(--red)}
.mu-vs{text-align:center;font-family:var(--fm);font-size:9px;color:var(--text3);letter-spacing:.3em;padding:2px 0}
.mu-cats{border-top:1px solid var(--border);padding:8px 16px 12px;display:grid;gap:2px}
.mu-cats-label{font-family:var(--fm);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);padding:6px 0 2px}
.cat-row{display:grid;grid-template-columns:56px 1fr 44px 1fr 56px;align-items:center;gap:4px;padding:2px 0}
.cat-val{font-family:var(--fm);font-size:11px;font-weight:600;text-align:center}
.cat-val.cw{color:var(--green)}.cat-val.cl{color:var(--red)}
.cat-name{font-family:var(--fm);font-size:9px;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.06em}
.cat-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px}

/* ── POWER RANKINGS ── */
.pr-list{display:flex;flex-direction:column;gap:10px}
.pr-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:grid;grid-template-columns:56px 22px 1fr auto;gap:0 12px;align-items:start;box-shadow:var(--sh);transition:border-color .15s}
.pr-card:hover{border-color:var(--border2)}
.pr-card.mine{border-color:rgba(0,214,143,.35);background:rgba(0,214,143,.03)}
.pr-num{font-family:var(--fd);font-size:44px;color:var(--text3);line-height:1;text-align:center}
.pr-card.mine .pr-num{color:var(--green)}
.pr-delta{font-family:var(--fm);font-size:10px;text-align:center;padding-top:8px}
.du{color:var(--green)}.dd{color:var(--red)}.ds{color:var(--text3)}
.pr-body{min-width:0}
.pr-name{font-weight:700;font-size:16px;color:var(--white);cursor:pointer}
.pr-name:hover{color:var(--blue)}.pr-card.mine .pr-name{color:var(--green)}
.pr-meta{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:3px}
.pr-bars{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;margin:10px 0 8px}
.pr-pills{display:flex;flex-wrap:wrap;gap:2px;margin-top:6px}
.pr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.comp-num{font-family:var(--fd);font-size:42px;color:var(--white);line-height:1}
.comp-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.h2h-num{font-family:var(--fd);font-size:20px;color:var(--text)}
.h2h-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.view-btn{font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);background:var(--blue-bg);border:1px solid rgba(77,159,255,.3);border-radius:4px;padding:4px 10px;transition:all .15s;white-space:nowrap}
.view-btn:hover{background:var(--blue);color:#fff}

/* ── ROSTERS ── */
.team-sel-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.team-sel-row label{font-family:var(--fm);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.dropdown{font-family:var(--fb);font-size:14px;font-weight:600;background:var(--bg1);color:var(--white);border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 14px;min-width:240px;cursor:pointer;box-shadow:var(--sh)}
.dropdown:focus{outline:none;border-color:var(--green)}
.pos-chip{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;background:var(--bg3);font-family:var(--fm);font-size:9px;font-weight:700;color:var(--text3);flex-shrink:0}
.inj-q{display:inline-block;font-family:var(--fm);font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:5px;background:var(--gold-bg);color:var(--gold)}
.inj-out{display:inline-block;font-family:var(--fm);font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:5px;background:var(--red-bg);color:var(--red)}
.inj-il{display:inline-block;font-family:var(--fm);font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:5px;background:var(--purple-bg);color:var(--purple)}

/* ── HISTORY ── */
.hist-ctrl{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.hist-ctrl label{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.hist-sel{font-family:var(--fm);font-size:11px;background:var(--bg1);color:var(--text);border:1px solid var(--border);border-radius:var(--rsm);padding:6px 10px;cursor:pointer}
.hist-input{font-family:var(--fb);font-size:12px;background:var(--bg1);color:var(--text);border:1px solid var(--border);border-radius:var(--rsm);padding:6px 10px;min-width:200px}
.hist-input::placeholder{color:var(--text3)}

/* ── ELO ── */
.elo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.elo-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rsm);padding:14px 16px}
.elo-team{font-weight:700;color:var(--white);font-size:13px;margin-bottom:4px}
.elo-rating{font-family:var(--fd);font-size:32px;line-height:1}
.elo-sub{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:3px}
.elo-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.elo-bar-fill{height:100%;border-radius:2px;background:var(--blue)}

/* ── LUCK ── */
.luck-bar-wrap{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:3px}
.luck-name{flex:1;font-weight:600;color:var(--white);font-size:13px;min-width:80px}
.luck-delta{font-family:var(--fm);font-size:11px;font-weight:700;min-width:52px;text-align:center}
.luck-track{flex:2;height:6px;background:var(--border);border-radius:3px;position:relative}
.luck-center{position:absolute;left:50%;top:-2px;width:1px;height:10px;background:var(--text3)}
.luck-fill{height:100%;border-radius:3px;position:absolute;top:0}
.luck-rec{font-family:var(--fm);font-size:10px;color:var(--text3);min-width:80px;text-align:right}

/* ── RECORDS ── */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.rec-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.rec-hd{background:var(--bg3);padding:8px 14px;font-family:var(--fm);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.rec-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.rec-row:last-child{border-bottom:none}
.rec-rank{font-family:var(--fd);font-size:22px;color:var(--text3);min-width:28px;text-align:center}
.rec-rank.r1{color:var(--gold)}.rec-rank.r2{color:#94a3b8}.rec-rank.r3{color:#cd7f32}
.rec-info{flex:1}
.rec-team{font-weight:700;font-size:13px;color:var(--white)}
.rec-week{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:1px}
.rec-val{font-family:var(--fd);font-size:26px;color:var(--green);text-align:right}

/* ── OUTLIER ── */
.outlier-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:10px;box-shadow:var(--sh)}
.outlier-hd{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.outlier-rank{font-family:var(--fd);font-size:36px;line-height:1}
.outlier-team{font-weight:700;font-size:18px;color:var(--white)}
.outlier-week{font-family:var(--fm);font-size:10px;color:var(--text3)}
.outlier-comp{font-family:var(--fd);font-size:28px;text-align:right}
.outlier-stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.outlier-stat{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:var(--fm);font-size:10px}
.outlier-stat .sv{font-weight:700;color:var(--white)}.outlier-stat .sk{color:var(--text3);font-size:8px;letter-spacing:.08em;text-transform:uppercase;display:block;margin-top:1px}

/* ── FRANCHISE ── */
.legacy-list{display:flex;flex-direction:column;gap:8px}
.lcard{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:grid;grid-template-columns:64px 1fr auto;gap:0 16px;align-items:center;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.lcard:hover{border-color:var(--border2);background:var(--bg2)}
.lcard.open{border-color:rgba(0,214,143,.4);background:rgba(0,214,143,.03)}
.lrk{font-family:var(--fd);font-size:52px;line-height:1;text-align:center}
.lrk1{color:var(--gold)}.lrk2{color:#94a3b8}.lrk3{color:#cd7f32}.lrkn{color:var(--border2)}
.lname{font-weight:700;font-size:16px;color:var(--white)}
.lsub{font-family:var(--fm);font-size:10px;color:var(--text3);margin-top:3px}
.ltrophies{margin-top:5px;font-size:15px;letter-spacing:2px}
.lscore{font-family:var(--fd);font-size:40px;color:var(--white);line-height:1}
.lscore-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.lscore-detail{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:4px}

/* ── RESUME ── */
.resume{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:10px;box-shadow:var(--sh2);animation:up .3s ease}
.res-hero{padding:26px 30px 22px;background:var(--bg2);border-bottom:1px solid var(--border)}
.res-hero-top{display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap}
.res-abbr{width:66px;height:66px;border-radius:12px;background:linear-gradient(135deg,#162038,#1e3a5f);border:2px solid rgba(0,214,143,.3);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:24px;color:var(--green);flex-shrink:0}
.res-title{flex:1}
.res-tname{font-family:var(--fd);font-size:clamp(24px,3.5vw,38px);color:var(--white);line-height:1;letter-spacing:.02em}
.res-tagline{font-style:italic;color:var(--green);font-size:13px;font-weight:500;margin-top:6px}
.res-owner-line{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:5px;letter-spacing:.06em}
.res-close{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:5px 12px;transition:all .15s}
.res-close:hover{color:var(--red);border-color:var(--red)}
.res-strip{display:grid;grid-template-columns:repeat(6,1fr);margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
.res-stat{border-right:1px solid var(--border);text-align:center;padding:0 8px}
.res-stat:last-child{border-right:none}
.res-sv{font-family:var(--fd);font-size:26px;line-height:1}
.res-sv.g{color:var(--green)}.res-sv.gd{color:var(--gold)}.res-sv.w{color:var(--white)}.res-sv.b{color:var(--blue)}
.res-sl{font-family:var(--fm);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-top:4px}
.res-body{padding:26px 30px}
.res-sec{font-family:var(--fm);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--green);margin-bottom:12px;font-weight:600}
.res-div{border:none;border-top:1px solid var(--border);margin:20px 0}
.res-p{color:var(--text2);font-size:13px;line-height:1.75;margin-bottom:12px}
/* Musings */
.res-musings{margin-bottom:4px}
.res-musing{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.6}
.res-musing:last-child{border-bottom:none}
.res-musing-dot{color:var(--green);font-size:16px;flex-shrink:0;line-height:1.4}
/* Cores */
.res-cores{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:4px}
.res-core-hd{font-family:var(--fm);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;font-weight:600}
.res-player{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.res-player:last-child{border-bottom:none}
.res-pos{width:30px;height:30px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:9px;font-weight:700;color:var(--text3);flex-shrink:0}
.res-pname{font-weight:600;color:var(--white);font-size:13px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.res-pcats{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:.04em}
.res-more{font-family:var(--fm);font-size:9px;color:var(--text3);padding-top:8px}
/* Bottom grid */
.res-bot{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:4px}
.res-sy{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.res-sy:last-child{border-bottom:none}
.res-sy-yr{font-family:var(--fm);font-size:10px;color:var(--text3);min-width:36px}
.res-sy-rec{font-family:var(--fm);font-size:11px;color:var(--text2);flex:1}
.res-sy-rk{font-family:var(--fd);font-size:20px;min-width:36px;text-align:right}
.rk-c{color:var(--gold)}.rk-r{color:#94a3b8}.rk-p{color:var(--green)}.rk-o{color:var(--text3)}
.res-outlook{background:rgba(0,214,143,.05);border:1px solid rgba(0,214,143,.15);border-radius:var(--rsm);padding:16px}
.res-oh{font-weight:700;color:var(--white);font-size:14px;margin-bottom:6px}
.res-ob{font-size:12px;color:var(--text2);line-height:1.65}
.res-peak{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:12px;margin-top:10px}
.res-pk-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.res-pk-yr{font-family:var(--fd);font-size:24px;color:var(--gold);line-height:1}
.res-pk-d{font-family:var(--fm);font-size:10px;color:var(--text3);margin-top:3px}
/* ELO + Luck stats in resume */
.res-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
.res-stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;text-align:center}
.res-stat-box-val{font-family:var(--fd);font-size:28px;line-height:1}
.res-stat-box-lbl{font-family:var(--fm);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-top:4px}

/* ── STATE ── */
.state{text-align:center;padding:60px 20px;font-family:var(--fm);font-size:11px;color:var(--text3);letter-spacing:.1em}
.state.err{color:var(--red)}

/* ── BLEND BAR ── */
.blend-bar{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh)}
.blend-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.blend-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:flex}
.blend-seg{height:100%}
.blend-text{font-family:var(--fm);font-size:9px;white-space:nowrap}

/* ── H2H ── */
.h2h-row{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:3px}
.h2h-name{flex:1;font-weight:600;color:var(--white);font-size:13px}
.h2h-rec{font-family:var(--fm);font-size:11px;min-width:64px;text-align:center}
.h2h-bar{flex:2;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.h2h-fill{height:100%;background:var(--green);border-radius:3px}
.h2h-pct{font-family:var(--fm);font-size:10px;color:var(--text3);min-width:38px;text-align:right}

@media(max-width:768px){
  .mu-grid,.pr-bars,.res-cores,.res-bot,.res-strip,.res-stats-row{grid-template-columns:1fr}
  .pr-card{grid-template-columns:44px 20px 1fr}.pr-right{display:none}
  .lcard{grid-template-columns:1fr auto}.lrk{display:none}
}
</style>
</head>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════════════════════════
let ROSTERS=null, RB=null; // RB = RecordBook data
window._prData=null;
let activeRosterId=null;

// ══════════════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
  });
});
document.querySelectorAll('.sub-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    const p=b.closest('.panel');
    p.querySelectorAll('.sub-btn').forEach(x=>x.classList.remove('active'));
    p.querySelectorAll('.sub-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.sub).classList.add('active');
  });
});
function goToRoster(id){
  document.querySelector('[data-tab="rosters"]').click();
  setTimeout(()=>{activeRosterId=id;if(ROSTERS)drawRosters();},60);
}

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
async function load(f){const r=await fetch(`data/${f}?t=${Date.now()}`);if(!r.ok)throw new Error(`HTTP ${r.status}: ${f}`);return r.json();}
function err(id,msg){document.getElementById(id).innerHTML=`<div class="state err">⚠ ${msg}</div>`;}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});}
function cpCls(r,n=12){if(r===1)return'cp1';if(r===2)return'cp2';if(r===3)return'cp3';if(r===n)return'cp12';if(r>=n-2)return'cp10';if(r>n*.58)return'cpb';return'cpm';}
function sbar(lbl,val,color){
  return`<div class="sb-wrap"><div class="sb-top"><span class="sb-lbl">${lbl}</span><span class="sb-val" style="color:${color}">${(val||0).toFixed(1)}</span></div><div class="sb-track"><div class="sb-fill" style="width:${Math.max(val||0,0)}%;background:${color}"></div></div></div>`;
}
function pName(n){return(n||'').split(',').reverse().join(' ').trim();}

// ══════════════════════════════════════════════════════════════
// STANDINGS
// ══════════════════════════════════════════════════════════════
async function renderStandings(){
  try{
    const{standings,week,updated}=await load('standings.json');
    document.getElementById('hdr-updated').textContent=`Updated ${fmtDate(updated)}`;
    const ldr=standings[0];
    const rows=standings.map((t,i)=>{
      const tot=t.wins+t.losses;
      const pct=tot?(t.wins/tot).toFixed(3).replace(/^0/,''):'.000';
      const gb=i===0?'—':(((ldr.wins-t.wins)+(t.losses-ldr.losses))/2).toFixed(1);
      const st=t.streak?`<span class="bdg ${t.streakType==='WIN'?'bdg-w':'bdg-l'}">${t.streakType==='WIN'?'W':'L'}${t.streak}</span>`:'—';
      // Pull ELO from RecordBook if available
      const elo=RB?.currentElo?.['Jacob']&&t.isMyTeam?RB.currentElo['Jacob']:null;
      return`<tr class="${t.isMyTeam?'mine':''} ${i===6?'cut':''}">
        <td class="rk">${t.rank}</td>
        <td><span class="${t.isMyTeam?'w':''} b tl" onclick="goToRoster(${t.id})">${t.name}</span></td>
        <td class="r"><span class="w">${t.wins}</span>–<span class="l">${t.losses}</span>${t.ties?`–${t.ties}`:''}</td>
        <td class="r d">${pct}</td>
        <td class="r d">${gb}</td>
        <td class="r d">${t.pointsFor}</td>
        <td class="r d">${t.pointsAgainst}</td>
        <td class="c">${st}</td>
      </tr>`;
    }).join('');
    document.getElementById('std-c').innerHTML=`
      <div class="sl">Week ${week} · League Standings</div>
      <div class="tw"><table>
        <thead><tr><th class="c" style="width:48px">#</th><th>Team</th><th class="r">W–L</th><th class="r">PCT</th><th class="r">GB</th><th class="r">PF</th><th class="r">PA</th><th class="c">Streak</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="margin-top:10px;font-family:var(--fm);font-size:9px;color:var(--text3)">── dashed line = playoff cutoff (top 6) &nbsp;·&nbsp; Click team to view roster</div>`;
  }catch(e){err('std-c',e.message)}
}

// ══════════════════════════════════════════════════════════════
// MATCHUPS
// ══════════════════════════════════════════════════════════════
async function renderMatchups(){
  try{
    const{matchups,week}=await load('matchups.json');
    const HIT=['R','RBI','HR','SB','K','AVG','OPS'],PIT=['IP','H','K','QS','ERA','WHIP','SV'];
    const cards=matchups.map(m=>{
      const{home,away}=m;const hasMe=home.isMyTeam||away.isMyTeam;
      const hw=home.catWins>away.catWins,aw=away.catWins>home.catWins;
      const hasCats=Object.keys(home.categories||{}).length>0;
      function catRows(cats){
        return cats.map(cat=>{
          const h=home.categories?.[cat]||{},a=away.categories?.[cat]||{};
          const hW=h.result==='WIN',aW=a.result==='WIN';
          return`<div class="cat-row">
            <div class="cat-val ${hW?'cw':aW?'cl':''}">${h.value!==undefined?h.value:'—'}</div>
            <div class="cat-bar"><div class="cat-bar-fill" style="width:${hW?100:aW?0:50}%;background:${hW?'var(--green)':aW?'var(--red)':'var(--text3)'}"></div></div>
            <div class="cat-name">${cat}</div>
            <div class="cat-bar"><div class="cat-bar-fill" style="width:${aW?100:hW?0:50}%;background:${aW?'var(--green)':hW?'var(--red)':'var(--text3)'}"></div></div>
            <div class="cat-val ${aW?'cw':hW?'cl':''}">${a.value!==undefined?a.value:'—'}</div>
          </div>`;
        }).join('');
      }
      return`<div class="mu-card ${hasMe?'mine':''}">
        <div class="mu-hd"><span class="mu-hd-l">Week ${week}</span><span class="mu-hd-r">${m.winner!=='UNDECIDED'?'✓ Final':`${m.leader} leading`}</span></div>
        <div class="mu-body">
          <div class="mu-row"><span class="mu-name ${home.isMyTeam?'me':''}" onclick="goToRoster(${home.teamId})">${home.team}</span><span class="mu-score ${hw?'win':aw?'lose':''}">${home.catWins}</span></div>
          <div class="mu-vs">· vs ·</div>
          <div class="mu-row"><span class="mu-name ${away.isMyTeam?'me':''}" onclick="goToRoster(${away.teamId})">${away.team}</span><span class="mu-score ${aw?'win':hw?'lose':''}">${away.catWins}</span></div>
        </div>
        ${hasCats?`<div class="mu-cats"><div class="mu-cats-label">Hitting</div>${catRows(HIT)}<div class="mu-cats-label" style="margin-top:4px">Pitching</div>${catRows(PIT)}</div>`:''}
      </div>`;
    }).join('');
    document.getElementById('mu-c').innerHTML=`
      <div class="sl">Week ${week} Matchups</div>
      <div class="mu-grid">${cards||'<div class="state">No matchup data yet.</div>'}</div>`;
  }catch(e){err('mu-c',e.message)}
}

// ══════════════════════════════════════════════════════════════
// POWER RANKINGS
// ══════════════════════════════════════════════════════════════
async function renderPowerRankings(){
  try{
    const{rankings,week,cats,projBlend,weights}=await load('power_rankings.json');
    window._prData=rankings;
    const w=weights||{},pb=projBlend||{projPct:0,actualPct:100};
    const allSame=rankings.length>1&&rankings.every(p=>p.composite===rankings[0].composite);
    const cards=rankings.map(p=>{
      const d=p.rankDelta||0;
      const dEl=d>0?`<span class="pr-delta du">▲${d}</span>`:d<0?`<span class="pr-delta dd">▼${Math.abs(d)}</span>`:`<span class="pr-delta ds">—</span>`;
      const pills=(cats||[]).map(c=>{const r=p.catRanks?.[c];return r?`<span class="${cpCls(r,rankings.length)}">${c} #${r}</span>`:''}).join('');
      // ELO for this team from RecordBook
      const rbTeam=p.isMyTeam?'Jacob':null;
      const elo=rbTeam&&RB?RB.currentElo[rbTeam]:'';
      return`<div class="pr-card ${p.isMyTeam?'mine':''}">
        <div class="pr-num">${p.pwRank}</div>${dEl}
        <div class="pr-body">
          <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
            <span class="pr-name tl" onclick="goToRoster(${p.id})">${p.name}</span>
            <span class="pr-meta">#${p.overallRank} standings · ${p.overallW}–${p.overallL}${elo?` · ELO: ${elo}`:''}</span>
          </div>
          <div class="pr-bars">
            ${sbar(`Starter Hitting (${(w.starterHit*100|0)}%)`,p.starterHitScore||0,'#00d68f')}
            ${sbar(`Starter Pitching (${(w.starterPit*100|0)}%)`,p.starterPitScore||0,'#4d9fff')}
            ${sbar(`Bench Hit (${(w.benchHit*100|0)}%)`,p.benchHitScore||0,'rgba(0,214,143,.45)')}
            ${sbar(`Bench Pitch (${(w.benchPit*100|0)}%)`,p.benchPitScore||0,'rgba(77,159,255,.45)')}
          </div>
          ${pills?`<div class="pr-pills">${pills}</div>`:`<div style="font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:4px">Category ranks active after Opening Day (Mar 27)</div>`}
        </div>
        <div class="pr-right">
          <div><div class="comp-num">${(p.composite||0).toFixed(1)}</div><div class="comp-lbl">Composite</div></div>
          <div><div class="h2h-num"><span class="w">${p.h2hWins}</span>–<span class="l">${p.h2hLosses}</span></div><div class="h2h-lbl">14-Cat H2H</div></div>
          <div style="font-family:var(--fm);font-size:9px;color:var(--text3);text-align:right">${p.hitDepth||0}H / ${p.pitchDepth||0}P</div>
          <button class="view-btn" onclick="goToRoster(${p.id})">Roster →</button>
        </div>
      </div>`;
    }).join('');
    document.getElementById('pr-c').innerHTML=`
      <div class="sl">Week ${week} Power Rankings</div>
      <div class="blend-bar">
        <span class="blend-lbl">Stat Blend</span>
        <div class="blend-track">
          <div class="blend-seg" style="width:${pb.projPct||0}%;background:var(--purple)"></div>
          <div class="blend-seg" style="width:${pb.actualPct||100}%;background:var(--blue)"></div>
        </div>
        <span class="blend-text"><span style="color:var(--purple)">${pb.projPct||0}% Proj</span> · <span style="color:var(--blue)">${pb.actualPct||100}% Actual</span></span>
      </div>
      ${allSame?`<div style="background:var(--purple-bg);border:1px solid rgba(167,139,250,.2);border-radius:var(--rsm);padding:10px 14px;margin-bottom:12px;font-family:var(--fm);font-size:10px;color:var(--purple)">⚗ Scores equal — ESPN projection data not yet active. Cat rank scores live now. Full differentiation after Opening Day (Mar 27).</div>`:''}
      <div class="pr-list">${cards||'<div class="state">No data.</div>'}</div>`;
  }catch(e){err('pr-c',e.message)}
}

// ══════════════════════════════════════════════════════════════
// TEAM STATS
// ══════════════════════════════════════════════════════════════
async function renderTeamStats(){
  try{
    const{teams,season}=await load('team_stats.json');
    const HIT=['R','RBI','HR','SB','K','AVG','OPS'],PIT=['IP','H','K','QS','ERA','WHIP','SV','HLD'];
    function buildRanks(cols,lb=[]){
      const ranks={};
      cols.forEach(cat=>{
        const vals=teams.map((t,i)=>({i,v:t.stats[cat]??null})).filter(x=>x.v!==null);
        vals.sort((a,b)=>lb.includes(cat)?a.v-b.v:b.v-a.v);
        vals.forEach(({i},ri)=>{ranks[`${i}_${cat}`]=ri+1;});
      });
      return ranks;
    }
    const hr=buildRanks(HIT),pr=buildRanks(PIT,['ERA','WHIP','H']);
    function rankCol(r,n=12){if(r<=3)return'var(--green)';if(r>=n-2)return'var(--red)';return'var(--text2)';}
    function tbl(label,cols,ranks){
      const hdr=['#','Team',...cols].map((c,i)=>`<th ${i>1?'class="r"':''}>${c}</th>`).join('');
      const rows=teams.map((t,i)=>{
        const cells=cols.map(cat=>{
          const v=t.stats[cat];const r=ranks[`${i}_${cat}`];
          return`<td class="r" style="color:${r?rankCol(r):'var(--text2)'}">${v!==undefined?v:'—'}</td>`;
        }).join('');
        return`<tr class="${t.isMyTeam?'mine':''}"><td class="rk">${i+1}</td><td><span class="${t.isMyTeam?'w':''} tl" onclick="goToRoster(${t.id})">${t.name}</span></td>${cells}</tr>`;
      }).join('');
      return`<div class="sl" style="margin-top:24px">${label}</div><div class="tw"><table><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    document.getElementById('ts-c').innerHTML=`<div class="sl">${season} Season Stats · Color = league rank</div>`+tbl('Hitting',HIT,hr)+tbl('Pitching',PIT,pr);
  }catch(e){err('ts-c',e.message)}
}

function drawRosters(){
  if(!ROSTERS)return;
  const{teams,season,projBlend}=ROSTERS;
  const pb=projBlend||{projPct:0,actualPct:100};
  if(!activeRosterId)activeRosterId=(teams.find(t=>t.isMyTeam)||teams[0])?.teamId;
  const team=teams.find(t=>t.teamId===activeRosterId)||teams[0];
  function injB(s){
    if(!s||s==='ACTIVE')return'';
    if(/QUESTION|DAY/.test(s))return'<span class="inj-q">DTD</span>';
    if(/^OUT/.test(s))return'<span class="inj-out">OUT</span>';
    if(/RESERVE|^IL/.test(s))return'<span class="inj-il">IL</span>';
    return`<span class="inj-q">${s}</span>`;
  }
  function tierB(p){
    const s=p.isPitcher?(p.pitchScore||0):(p.hitScore||0);
    const t=p.tier||(s>0.8?'ELITE':s>0.2?'SOLID':'');
    if(t==='ELITE')return'<span class="bdg bdg-e">⭐ Elite</span>';
    if(t==='SOLID')return'<span class="bdg bdg-s">Solid</span>';
    return'';
  }
  const active=team.players.filter(p=>p.slot&&!['BE','IL'].includes(p.slot));
  const bench=team.players.filter(p=>p.slot==='BE');
  const il=team.players.filter(p=>p.slot==='IL');
  function pRow(p,sts){
    const cells=sts.map(s=>`<td class="r d">${p.stats[s]!==undefined?p.stats[s]:'—'}</td>`).join('');
    return`<tr><td style="width:38px;text-align:center"><div class="pos-chip">${p.slot}</div></td><td><span style="font-weight:600;color:var(--white)">${p.name}</span>${tierB(p)}${injB(p.injStatus)}</td><td class="d" style="font-family:var(--fm);font-size:10px;text-align:center">${p.position}</td>${cells}</tr>`;
  }
  function sec(label,players){
    if(!players.length)return'';
    const hitters=players.filter(p=>!p.isPitcher),pitchers=players.filter(p=>p.isPitcher);
    const HS=['AVG','OPS','R','RBI','HR','SB'],PS=['ERA','WHIP','IP','K','QS','SV'];
    let h=`<div class="sl" style="margin-top:22px">${label}</div>`;
    if(hitters.length){const hdr=['Slot','Player','Pos',...HS].map((c,i)=>`<th ${i>2?'class="r"':''}>${c}</th>`).join('');h+=`<div class="tw"><table><thead><tr>${hdr}</tr></thead><tbody>${hitters.map(p=>pRow(p,HS)).join('')}</tbody></table></div>`;}
    if(pitchers.length){const hdr=['Slot','Player','Pos',...PS].map((c,i)=>`<th ${i>2?'class="r"':''}>${c}</th>`).join('');h+=`<div class="tw" style="margin-top:8px"><table><thead><tr>${hdr}</tr></thead><tbody>${pitchers.map(p=>pRow(p,PS)).join('')}</tbody></table></div>`;}
    return h;
  }
  const opts=teams.map(t=>`<option value="${t.teamId}" ${t.teamId===activeRosterId?'selected':''}>${t.name}${t.isMyTeam?' ★':''}</option>`).join('');
  document.getElementById('ros-c').innerHTML=`
    <div class="sl">${season} Rosters</div>
    ${pb.projPct>0?`<div class="bdg bdg-p" style="margin-bottom:12px;display:inline-block">⚗ ${pb.projPct}% Projected / ${pb.actualPct}% Actual</div>`:''}
    <div class="team-sel-row"><label>Team</label><select class="dropdown" id="ros-sel">${opts}</select></div>
    ${sec('Active Roster',active)}${sec('Bench',bench)}${sec('Injured List',il)}`;
  document.getElementById('ros-sel').addEventListener('change',e=>{activeRosterId=parseInt(e.target.value);drawRosters();});
}
async function renderRosters(){try{ROSTERS=await load('rosters.json');drawRosters();}catch(e){err('ros-c',e.message)}}

function renderHSt(){
  try{
    const{seasons}=HX.st;
    if(!seasons?.length){

      if(RB?.standings){

function renderRBStandings(){
  if(!RB?.standings)return;
  const seasons=Object.keys(RB.standings).sort((a,b)=>b-a);
  let cur=parseInt(seasons[0]);
  function draw(){
    const s=RB.standings[cur]||[];
    const rows=s.map(t=>`<tr><td class="rk">${t.rank}</td><td class="b">${t.team}</td><td class="r"><span class="w">${t.w}</span>–<span class="l">${t.l}</span>${t.t?`–${t.t}`:''}</td><td class="r d">${(t.pct*100).toFixed(1)}%</td></tr>`).join('');
    const opts=seasons.map(s=>`<option value="${s}" ${parseInt(s)===cur?'selected':''}>${s}</option>`).join('');
    document.getElementById('hs-st').innerHTML=`<div class="hist-ctrl"><label>Season</label><select class="hist-sel" id="hss">${opts}</select></div><div class="tw"><table><thead><tr><th class="c" style="width:48px">#</th><th>Owner</th><th class="r">W–L</th><th class="r">PCT</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    document.getElementById('hss').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
  }draw();
}
function renderHH2H(){
  try{
    // Prefer RecordBook H2H (richer)
    if(RB?.h2hAllTime?.length){renderRBH2H();return;}
    const{records,teams}=HX.h2h;
    if(!records?.length){err('hs-h2h','No H2H data.');return;}
    const tw={};teams.forEach(t=>{tw[t]=0;});records.forEach(r=>{tw[r.teamA]=(tw[r.teamA]||0)+r.aWins;});
    const sorted=[...teams].sort((a,b)=>(tw[b]||0)-(tw[a]||0));
    const lu={};records.forEach(r=>{lu[`${r.teamA}__${r.teamB}`]={w:r.aWins,l:r.aLosses};lu[`${r.teamB}__${r.teamA}`]={w:r.aLosses,l:r.aWins};});
    const rows=sorted.map(team=>{let w=0,l=0;sorted.filter(t=>t!==team).forEach(o=>{const rec=lu[`${team}__${o}`]||{w:0,l:0};w+=rec.w;l+=rec.l;});const tot=w+l;const pct=tot?((w/tot)*100).toFixed(1):'0.0';const bw=tot?Math.round(w/tot*100):0;return`<div class="h2h-row"><div class="h2h-name">${team}</div><div class="h2h-rec"><span class="w">${w}</span>–<span class="l">${l}</span></div><div class="h2h-bar"><div class="h2h-fill" style="width:${bw}%"></div></div><div class="h2h-pct">${pct}%</div></div>`;}).join('');
    document.getElementById('hs-h2h').innerHTML=`<div class="sl">All-Time H2H Records</div>${rows}`;
  }catch(e){err('hs-h2h',e.message)}
}
function renderRBH2H(){
  // Use RecordBook all-time H2H
  const records=RB.h2hAllTime;
  const teams=[...new Set(records.flatMap(r=>[r.team1,r.team2]))];
  const lu={};records.forEach(r=>{lu[`${r.team1}__${r.team2}`]={w:r.w,l:r.l,t:r.t};lu[`${r.team2}__${r.team1}`]={w:r.l,l:r.w,t:r.t};});
  const totals=teams.map(team=>{let w=0,l=0,t=0;teams.filter(x=>x!==team).forEach(o=>{const rec=lu[`${team}__${o}`]||{w:0,l:0,t:0};w+=rec.w;l+=rec.l;t+=rec.t;});return{team,w,l,t};}).sort((a,b)=>b.w-a.w);
  const rows=totals.map(({team,w,l,t})=>{const tot=w+l+t;const pct=tot?((w/tot)*100).toFixed(1):'0.0';const bw=tot?Math.round(w/tot*100):0;return`<div class="h2h-row"><div class="h2h-name">${team}</div><div class="h2h-rec"><span class="w">${w}</span>–<span class="l">${l}</span>${t?`–${t}`:''}</div><div class="h2h-bar"><div class="h2h-fill" style="width:${bw}%"></div></div><div class="h2h-pct">${pct}%</div></div>`;}).join('');
  document.getElementById('hs-h2h').innerHTML=`<div class="sl">All-Time Head-to-Head Records (2013–2025)</div><div style="font-family:var(--fm);font-size:9px;color:var(--text3);margin-bottom:12px">Sorted by total wins · All seasons</div>${rows}`;
}
function renderHMu(){
  try{
    const{matchups}=HX.mu;if(!matchups?.length){err('hs-mu','No data.');return;}
    const seasons=[...new Set(matchups.map(m=>m.season))].sort((a,b)=>b-a);let cur=seasons[0],q='';
    function draw(){
      const fil=matchups.filter(m=>m.season===cur&&(!q||m.home.toLowerCase().includes(q)||m.away.toLowerCase().includes(q)));
      const rows=fil.map(m=>{const hw=m.winner===m.home,aw=m.winner===m.away;return`<tr><td class="r d">${m.week}</td><td class="${hw?'w':''} b">${m.home}</td><td class="c"><span class="${hw?'w':''}">${m.homeCatW}</span>–<span class="${aw?'w':''}">${m.awayCatW}</span></td><td class="${aw?'w':''} b">${m.away}</td></tr>`;}).join('');
      const opts=seasons.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
      document.getElementById('hs-mu').innerHTML=`<div class="hist-ctrl"><label>Season</label><select class="hist-sel" id="hmu">${opts}</select><input class="hist-input" id="hmuq" type="text" placeholder="Filter by team…" value="${q}"/></div><div class="tw"><table><thead><tr><th class="r">Wk</th><th>Home</th><th class="c">Score</th><th>Away</th></tr></thead><tbody>${rows||'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text3)">No results</td></tr>'}</tbody></table></div>`;
      document.getElementById('hmu').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
      document.getElementById('hmuq').addEventListener('input',e=>{q=e.target.value.toLowerCase();draw();});
    }draw();
  }catch(e){err('hs-mu',e.message)}
}
function renderHCat(){
  try{
    const{seasons,cats}=HX.cats;if(!seasons?.length){err('hs-cat','No data.');return;}
    const all=seasons.map(s=>s.season).sort((a,b)=>b-a);let cur=all[0];
    function draw(){
      const sd=seasons.find(s=>s.season===cur);
      const teams=[...sd.teams].sort((a,b)=>Object.values(b.catRecord||{}).reduce((s,v)=>s+(v.W||0),0)-Object.values(a.catRecord||{}).reduce((s,v)=>s+(v.W||0),0));
      const hdr=['Team',...cats].map((c,i)=>`<th ${i?'class="c"':''}>${c}</th>`).join('');
      const rows=teams.map(t=>{const cells=cats.map(cat=>{const r=t.catRecord?.[cat];if(!r)return`<td class="c d">—</td>`;const tot=(r.W||0)+(r.L||0);const pct=tot?Math.round((r.W||0)/tot*100):0;const col=pct>=55?'var(--green)':pct<=45?'var(--red)':'var(--text2)';return`<td class="c"><span style="color:${col};font-family:var(--fm);font-size:10px;font-weight:600">${r.W||0}–${r.L||0}</span></td>`;}).join('');return`<tr><td class="b">${t.name}</td>${cells}</tr>`;}).join('');
      const opts=all.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
      document.getElementById('hs-cat').innerHTML=`<div class="hist-ctrl"><label>Season</label><select class="hist-sel" id="hcat">${opts}</select></div><div style="font-family:var(--fm);font-size:9px;color:var(--text3);margin-bottom:12px"><span style="color:var(--green)">Green</span> = 55%+ · <span style="color:var(--red)">Red</span> = 45%−</div><div class="tw"><table><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
      document.getElementById('hcat').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
    }draw();
  }catch(e){err('hs-cat',e.message)}
}

function renderAnalytics(){

function renderELO(){
  // Current ELO ratings sorted
  const elo=Object.entries(RB.currentElo).filter(([k])=>!k.includes('defunct')).sort((a,b)=>b[1]-a[1]);
  const max=elo[0][1],min=elo[elo.length-1][1];
  const cards=elo.map(([team,rating])=>{
    const pct=((rating-min)/(max-min)*100).toFixed(0);
    const col=rating>=1550?'var(--green)':rating>=1480?'var(--blue)':rating>=1400?'var(--text2)':'var(--red)';
    const lk=RB.luckAllTime?.find(x=>x.team===team);
    return`<div class="elo-card ${team==='Jacob'?'mine':''}">
      <div class="elo-team">${team}</div>
      <div class="elo-rating" style="color:${col}">${rating.toFixed(0)}</div>
      <div class="elo-sub">All-Play: ${lk?`${(lk.allPlayPCT*100).toFixed(1)}% (${lk.allPlayW}-${lk.allPlayL})`:'—'}</div>
      <div class="elo-bar"><div class="elo-bar-fill" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
  }).join('');

  // ELO history by season for the top teams
  const eloHist=RB.elo||[];
  const seasons=[...new Set(eloHist.map(x=>x.season))].sort();
  const activeTeams=['TC','Sponny','Greene','Boyce','Mion','Jacob','Bert','Slater','Tim','Schoon','Eriole','Leo'];
  // Peak ELO table
  const peakRows=activeTeams.map(team=>{
    const teamElo=eloHist.filter(x=>x.team===team);
    if(!teamElo.length)return'';
    const peak=teamElo.reduce((a,b)=>a.elo>b.elo?a:b);
    const cur=RB.currentElo[team]||'—';
    const chg=typeof cur==='number'?(cur-peak.elo).toFixed(0):'—';
    const col=typeof cur==='number'&&cur>=1500?'var(--green)':cur>=1450?'var(--text2)':'var(--red)';
    return`<tr class="${team==='Jacob'?'mine':''}">
      <td class="b">${team}</td>
      <td class="r" style="color:${col};font-family:var(--fm)">${typeof cur==='number'?cur.toFixed(0):'—'}</td>
      <td class="r d" style="font-family:var(--fm)">${peak.elo.toFixed(0)} (${peak.season})</td>
      <td class="r" style="color:${typeof chg==='string'||chg>=0?'var(--green)':'var(--red)'};font-family:var(--fm)">${typeof chg!=='string'&&chg>0?'+':''}${chg}</td>
    </tr>`;
  }).filter(Boolean).join('');

  document.getElementById('an-elo').innerHTML=`
    <div class="sl">ELO Ratings — Current 2026</div>
    <div style="font-family:var(--fm);font-size:9px;color:var(--text3);margin-bottom:16px">All teams start at 1500. Win = gain points. Loss = lose points. Magnitude scales with upset probability. Updated through 2025.</div>
    <div class="elo-grid">${cards}</div>
    <div class="sl" style="margin-top:24px">ELO History — Peak vs Current</div>
    <div class="tw"><table>
      <thead><tr><th>Owner</th><th class="r">Current ELO</th><th class="r">Peak ELO (Season)</th><th class="r">Change</th></tr></thead>
      <tbody>${peakRows}</tbody>
    </table></div>`;
}

function renderLuck(){
  if(!RB?.luckAllTime)return;
  const luck=[...RB.luckAllTime].sort((a,b)=>b.luckDelta-a.luckDelta);
  const maxD=Math.max(...luck.map(x=>Math.abs(x.luckDelta)));
  const rows=luck.map(x=>{
    const d=x.luckDelta;
    const pct=((d/maxD)*50+50);// 0-100 scale, 50=neutral
    const col=d>0.03?'var(--green)':d<-0.03?'var(--red)':'var(--text2)';
    const label=d>0.05?'Very Lucky':d>0.02?'Lucky':d<-0.05?'Very Unlucky':d<-0.02?'Unlucky':'Neutral';
    return`<div class="luck-bar-wrap ${x.team==='Jacob'?'mine':''}">
      <div class="luck-name">${x.team}</div>
      <div class="luck-delta" style="color:${col}">${d>0?'+':''}${(d*100).toFixed(1)}%</div>
      <div class="luck-track">
        <div class="luck-center"></div>
        <div class="luck-fill" style="left:50%;width:${Math.abs(d/maxD*50)}%;background:${col};${d<0?'transform:translateX(-100%)':''}"></div>
      </div>
      <div class="luck-rec" style="color:${col};font-family:var(--fm);font-size:10px">${label}</div>
    </div>`;
  }).join('');

  // By season luck for selected team
  const luckBySeason=(RB.luck||[]).filter(x=>x.team==='Jacob');
  const jRows=luckBySeason.map(x=>{
    const d=x.luckDelta;const col=d>0?'var(--green)':d<0?'var(--red)':'var(--text2)';
    return`<tr><td class="b">${x.season}</td><td class="r d">${x.actualW}–${x.actualL} (${(x.actualPCT*100).toFixed(0)}%)</td><td class="r d">${x.allPlayW}–${x.allPlayL} (${(x.allPlayPCT*100).toFixed(0)}%)</td><td class="r" style="color:${col};font-family:var(--fm)">${d>0?'+':''}${(d*100).toFixed(1)}%</td></tr>`;
  }).join('');

  document.getElementById('an-luck').innerHTML=`
    <div class="sl">All-Time Luck Index</div>
    <div style="font-family:var(--fm);font-size:9px;color:var(--text3);margin-bottom:16px">Luck Delta = Actual Win% minus All-Play Win%. Positive = luckier than skill. Negative = better than record shows. All-Play: how you'd do if you played every team every week.</div>
    ${rows}
    ${jRows?`
    <div class="sl" style="margin-top:24px">Jacob — Season by Season Luck</div>
    <div class="tw"><table>
      <thead><tr><th>Season</th><th class="r">Actual W–L</th><th class="r">All-Play W–L</th><th class="r">Luck Delta</th></tr></thead>
      <tbody>${jRows}</tbody>
    </table></div>`:''}`;
}

function renderSOS(){
  if(!RB?.sos)return;
  // All-time SOS
  const sosSorted=[...RB.sosAllTime].filter(x=>!x.team.includes('defunct')).sort((a,b)=>b.avgOppPCT-a.avgOppPCT);
  const sosRows=sosSorted.map(x=>`<tr class="${x.team==='Jacob'?'mine':''}"><td class="b">${x.team}</td><td class="r" style="font-family:var(--fm)">${(x.avgOppPCT*100).toFixed(1)}%</td><td class="r d" style="font-family:var(--fm)">${x.seasons}</td></tr>`).join('');

  // By season
  const seasons=[...new Set(RB.sos.map(x=>x.season))].sort((a,b)=>b-a);
  let curSOS=seasons[0];
  function drawSOS(){
    const sd=[...RB.sos.filter(x=>x.season===curSOS)].sort((a,b)=>b.avgOppPCT-a.avgOppPCT);
    const sRows=sd.map(x=>`<tr class="${x.team==='Jacob'?'mine':''}"><td class="b">${x.team}</td><td class="r" style="font-family:var(--fm)">${(x.avgOppPCT*100).toFixed(1)}%</td></tr>`).join('');
    const opts=seasons.map(s=>`<option value="${s}" ${s===curSOS?'selected':''}>${s}</option>`).join('');
    document.getElementById('an-sos').innerHTML=`

function renderCatDom(){
  if(!RB?.categoryWLT)return;
  const cats=['R','HR','RBI','K','SB','AVG','OPS','Kpitch','QS','ERA','WHIP','SVHD'];
  const teams=Object.keys(RB.categoryWLT).filter(t=>!t.includes('defunct'));
  const rows=teams.map(team=>{
    const cwlt=RB.categoryWLT[team];
    const total_w=cats.reduce((s,c)=>s+(cwlt[c]?.w||0),0);
    const cells=cats.map(cat=>{
      const r=cwlt[cat];if(!r)return`<td class="c d">—</td>`;
      const pct=r.n?((r.w/r.n)*100).toFixed(0):0;
      const col=pct>=55?'var(--green)':pct<=45?'var(--red)':'var(--text2)';
      return`<td class="c"><span style="color:${col};font-family:var(--fm);font-size:10px;font-weight:600">${r.w}–${r.l}</span></td>`;
    }).join('');
    return{team,total_w,html:`<tr class="${team==='Jacob'?'mine':''}"><td class="b">${team}</td>${cells}<td class="r" style="font-family:var(--fm);font-weight:700;color:var(--green)">${total_w}</td></tr>`};
  }).sort((a,b)=>b.total_w-a.total_w);
  const hdr=['Owner',...cats,'Total W'].map((c,i)=>`<th ${i?'class="c"':''}>${c}</th>`).join('');
  document.getElementById('an-cat').innerHTML=`
    <div class="sl">All-Time Category W-L Records</div>
    <div style="font-family:var(--fm);font-size:9px;color:var(--text3);margin-bottom:12px"><span style="color:var(--green)">Green</span> = 55%+ win rate · <span style="color:var(--red)">Red</span> = 45%− · ~48% of all matchups covered (2015–2025)</div>
    <div class="tw"><table><thead><tr>${hdr}</tr></thead><tbody>${rows.map(x=>x.html).join('')}</tbody></table></div>`;
}

function renderRecords(){
  if(!RB){err('rec-c','RecordBook data not loaded.');return;}
  // League records by category (top 3 per cat)
  const cats=['Most Runs','Most HR','Most RBI','Most SB','Ks','Lowest ERA','Lowest WHIP','Most QS','Most IP','Most K Pitching'];
  const allRecs=[...(RB.leagueRecords?.bests||[]),...(RB.offensiveRecords||[]),...(RB.pitchingRecords||[])];

  function recCard(title,items){
    if(!items.length)return'';
    const rows=items.slice(0,5).map((x,i)=>`<div class="rec-row">
      <div class="rec-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
      <div class="rec-info">
        <div class="rec-team">${x.team}</div>
        <div class="rec-week">${x.yearWeek||''}</div>
      </div>
      <div class="rec-val" style="color:${i===0?'var(--gold)':i<3?'var(--green)':'var(--text2)'}">${x.val}</div>
    </div>`).join('');
    return`<div class="rec-card"><div class="rec-hd">${title}</div>${rows}</div>`;
  }

  // Group records by category
  const grouped={};
  allRecs.forEach(r=>{if(!grouped[r.cat])grouped[r.cat]=[];grouped[r.cat].push(r);});
  // Sort each group
  Object.values(grouped).forEach(g=>g.sort((a,b)=>a.rank-b.rank));

  const recCards=Object.entries(grouped).slice(0,18).map(([cat,items])=>recCard(cat,items)).join('');

  // Outlier weeks - best performances
  const best=(RB.outlierWeeks?.best||[]).slice(0,5);
  const worst=(RB.outlierWeeks?.worst||[]).slice(0,5);
  function outlierCard(x,i){
    const stats=['R','HR','RBI','SB','AVG','Kpitch','QS','ERA','WHIP'].map(k=>x[k]!==undefined?`<div class="outlier-stat"><span class="sv">${x[k]}</span><span class="sk">${k}</span></div>`:'').filter(Boolean).join('');
    const col=i===0?'var(--gold)':i<3?'var(--green)':'var(--text2)';
    return`<div class="outlier-card"><div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px"><div><div style="display:flex;align-items:baseline;gap:10px"><div class="outlier-rank" style="color:${col}">${i+1}</div><div><div class="outlier-team">${x.team}</div><div class="outlier-week">${x.yearWeek}</div></div></div></div><div class="outlier-comp" style="color:${col}">${x.composite}</div></div><div class="outlier-stats">${stats}</div></div>`;
  }

  // Category Kings (current season)
  const ck=RB.categoryKing?.categories||{};
  const kingRows=Object.entries(ck).map(([cat,data])=>{
    const lb=(data.leaderboard||[]).slice(0,3);
    const leaders=lb.map((x,i)=>`<span style="color:${i===0?'var(--gold)':i===1?'#94a3b8':'#cd7f32'}">${x.team} (${x.val})</span>`).join(' · ');
    return`<tr><td class="b">${cat}</td><td><span style="color:var(--gold);font-weight:700">${data.king}</span> — ${data.kingVal} (${data.kingWeek})</td><td>${leaders}</td></tr>`;
  }).join('');

  document.getElementById('rec-c').innerHTML=`
    <div class="sl">2025 Category Kings</div>
    <div class="tw" style="margin-bottom:24px"><table>
      <thead><tr><th>Category</th><th>Season King</th><th>Top 3</th></tr></thead>
      <tbody>${kingRows}</tbody>
    </table></div>

    <div class="sl">All-Time Best Single Week Performances</div>
    <div style="margin-bottom:20px">${best.map((x,i)=>outlierCard(x,i)).join('')}</div>

    <div class="sl">All-Time League Records</div>
    <div class="rec-grid" style="margin-bottom:24px">${recCards}</div>`;
}

function buildResume(teamKey){
  const lr=RB.legacyRankings?.rankings?.find(x=>x.team===teamKey);
  const fr=RB.franchiseResumes?.find(x=>x.team===teamKey)||{};
  const nar=RB.teamNarratives?.[teamKey]||{};
  const elo=RB.currentElo?.[teamKey];
  const lkAll=RB.luckAllTime?.find(x=>x.team===teamKey);
  const lkBySeason=(RB.luck||[]).filter(x=>x.team===teamKey);
  const stBySeason=Object.entries(RB.standings||{}).map(([yr,teams])=>{
    const t=teams.find(x=>x.team===teamKey);return t?{season:parseInt(yr),...t}:null;
  }).filter(Boolean).sort((a,b)=>a.season-b.season);
  const cwlt=RB.categoryWLT?.[teamKey]||{};
  const cats=['R','HR','RBI','SB','AVG','OPS','Kpitch','QS','ERA','WHIP','SVHD'];
  const champs=fr.champs||lr?.detail?.champs||0;
  const wpct=fr.pct?`${(fr.pct*100).toFixed(1)}%`:'—';

  // Tagline from narratives or generated
  const tagline=champs>=2?'Built for October. Proven it more than once.':
    champs===1?'One ring. The hunger for another never left.':
    (fr.pct||0)>0.58?'Consistently elite. Still chasing the title.':
    teamKey==='Jacob'?'2025 calling card: elite power. The best slugging lineup in the league.':
    'Every season writes a new chapter.';

  // Musings from RecordBook
  const musings=(nar.musings||[]).map(m=>`<div class="res-musing"><span class="res-musing-dot">◆</span><span>${m}</span></div>`).join('');

  // Current roster players (if this is the user's team)
  let coreSection='';
  if(teamKey==='Jacob'&&ROSTERS){
    const myTeam=ROSTERS.teams.find(t=>t.isMyTeam);
    if(myTeam){
      const active=myTeam.players.filter(p=>p.slot&&!['BE','IL'].includes(p.slot));
      function tierOf(p){const s=p.isPitcher?(p.pitchScore||0):(p.hitScore||0);return p.tier||(s>0.8?'ELITE':s>0.2?'SOLID':'');}
      function sortP(arr){return[...arr].sort((a,b)=>{const ta={ELITE:0,SOLID:1,'':2}[tierOf(a)]??2,tb={ELITE:0,SOLID:1,'':2}[tierOf(b)]??2;return ta!==tb?ta-tb:(b.isPitcher?b.pitchScore||0:b.hitScore||0)-(a.isPitcher?a.pitchScore||0:a.hitScore||0);});}
      const hitters=sortP(active.filter(p=>!p.isPitcher));
      const pitchers=sortP(active.filter(p=>p.isPitcher));
      const MAX=5;
      function buildCore(arr){const el=arr.filter(p=>tierOf(p)==='ELITE');const rest=arr.filter(p=>tierOf(p)!=='ELITE');return{core:[...el,...rest.slice(0,Math.max(0,MAX-el.length))],more:arr.length-Math.min(arr.length,el.length+Math.max(0,MAX-el.length))};}
      const {core:cH,more:mH}=buildCore(hitters);
      const {core:cP,more:mP}=buildCore(pitchers);
      function pRow(p,isHit){
        const cats2=isHit?['R','HR','RBI','SB','AVG','OPS']:['IP','QS','ERA','WHIP','K','SV'];
        const catStr=cats2.filter(c=>p.stats[c]!==undefined).join(' · ')||(isHit?'R · HR · RBI · SB · AVG · OPS':'IP · QS · ERA · WHIP · K · SV');
        const tier=tierOf(p);
        const star=tier==='ELITE'?`<span style="color:var(--gold);font-size:13px">⭐</span>`:tier==='SOLID'?`<span class="bdg bdg-s">Solid</span>`:'';
        return`<div class="res-player"><div class="res-pos">${p.position}</div><div><div class="res-pname">${pName(p.name)}${star}</div><div class="res-pcats">${catStr}</div></div></div>`;
      }
      coreSection=`
        <hr class="res-div"/>
        <div class="res-cores">
          <div>
            <div class="res-core-hd">2026 Hitting Core — ${hitters.length} Active Bats</div>
            ${cH.map(p=>pRow(p,true)).join('')}
            ${mH>0?`<div class="res-more">+ ${mH} more</div>`:''}
          </div>
          <div>
            <div class="res-core-hd">2026 Pitching Core — ${pitchers.length} Active Arms</div>
            ${cP.map(p=>pRow(p,false)).join('')}
            ${mP>0?`<div class="res-more">+ ${mP} more</div>`:''}
          </div>
        </div>`;
    }
  }

  // Season history table from RB standings
  const histRows=stBySeason.map(s=>{
    const isChamp=RB.championships?.find(x=>x.team===teamKey&&x.year===s.season);
    const lk=lkBySeason.find(x=>x.season===s.season);
    const lkStr=lk?` · Luck: ${lk.luckDelta>0?'+':''}${(lk.luckDelta*100).toFixed(1)}%`:'';
    const rkCls=isChamp?'rk-c':s.rank<=3?'rk-p':'rk-o';
    const icon=isChamp?'🏆':s.rank<=2?'🥈':s.rank<=6?'🏟':'';
    return`<div class="res-sy">
      <span class="res-sy-yr">${s.season}</span>
      <span class="res-sy-rec"><span class="w">${s.w}</span>–<span class="l">${s.l}</span>${s.t?`–${s.t}`:''} · ${(s.pct*100).toFixed(0)}%${lkStr}</span>
      <span class="res-sy-rk ${rkCls}">#${s.rank} ${icon}</span>
    </div>`;
  }).join('');

  // Best/worst from narratives
  const bestS=nar.bestSeason,worstS=nar.worstSeason;
  const peakElo=nar.peakElo;
  const rival=nar.worstRival,daddy=nar.whosYourDaddy;

  // Category strength bars from all-time WLT
  const catBars=cats.filter(c=>cwlt[c]).map(c=>{
    const r=cwlt[c];const pct=r.n?r.w/r.n:0;
    const col=pct>=0.55?'var(--green)':pct<=0.45?'var(--red)':'var(--text2)';
    return`<div style="margin-bottom:4px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-family:var(--fm);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">${c}</span><span style="font-family:var(--fm);font-size:9px;font-weight:600;color:${col}">${r.w}–${r.l} (${(pct*100).toFixed(0)}%)</span></div><div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct*100}%;background:${col};border-radius:2px"></div></div></div>`;
  }).join('');

  // Outlook
  let oEmoji,oHead,oBody;
  const prRank=window._prData?.find?.(p=>p.isMyTeam&&teamKey==='Jacob')?.pwRank||6;
  if(champs>=2){oEmoji='🏆';oHead='A dynasty by any definition.';oBody=`${champs} championships. Multiple seasons at the top. This franchise has defined what winning looks like in The League for over a decade.`;}
  else if(champs===1){oEmoji='⚡';oHead='Former champion. Dangerous every year.';oBody=`One ring on the shelf and the blueprint to win another. This team has shown they can peak when it matters most.`;}
  else if((fr.pct||0)>0.55){oEmoji='🏟';oHead='Perennial playoff contender.';oBody=`Consistent excellence without the title to show for it. That cuts deep — but it also means this team shows up every single year.`;}
  else{oEmoji='📈';oHead='Building something. Watch this space.';oBody=`The franchise is still writing its story. The potential is real — the best chapter may still be ahead.`;}
  if(teamKey==='Jacob'){oEmoji='💪';oHead='2026 is the year the roster finally matches the ambition.';oBody=`Power-hitting profile with elite slugging (HR z=2.2, OPS z=1.6 in 2025). Elly De La Cruz headlining a lineup capable of winning any week. The question is whether the pitching holds up. When it does, this team is dangerous.`;}

  return`<div class="resume">
    <div class="res-hero">
      <div class="res-hero-top">
        <div class="res-abbr">${teamKey.substring(0,2).toUpperCase()}</div>
        <div class="res-title">
          <div class="res-tname">${teamKey}</div>
          <div class="res-tagline">${tagline}</div>
          <div class="res-owner-line">Legacy Rank #${lr?.rank||'—'} · ${fr.yrsInLg||0} seasons · Score: ${lr?.total?.toFixed(0)||'—'}</div>
        </div>
        <button class="res-close" onclick="closeResume()">✕ Close</button>
      </div>
      <div class="res-strip">
        <div class="res-stat"><div class="res-sv g">${fr.w||0}</div><div class="res-sl">All-Time W</div></div>
        <div class="res-stat"><div class="res-sv w">${fr.l||0}</div><div class="res-sl">All-Time L</div></div>
        <div class="res-stat"><div class="res-sv g">${wpct}</div><div class="res-sl">Win %</div></div>
        <div class="res-stat"><div class="res-sv gd">${champs}</div><div class="res-sl">Titles</div></div>
        <div class="res-stat"><div class="res-sv b">${elo?elo.toFixed(0):'—'}</div><div class="res-sl">ELO</div></div>
        <div class="res-stat"><div class="res-sv w">${lkAll?(lkAll.luckDelta>0?'+':'')+((lkAll.luckDelta*100).toFixed(1))+'%':'—'}</div><div class="res-sl">Luck Δ</div></div>
      </div>
    </div>
    <div class="res-body">

      ${musings?`<div class="res-sec">Franchise Musings</div><div class="res-musings">${musings}</div><hr class="res-div"/>`:''}

      ${catBars?`<div class="res-sec">All-Time Category Strength</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;margin-bottom:4px">${catBars}</div><hr class="res-div"/>`:''}

      ${coreSection}
      ${coreSection?'<hr class="res-div"/>':''}

      <div class="res-bot">
        <div>
          <div class="res-sec">Season by Season</div>
          ${histRows||'<div style="font-family:var(--fm);font-size:10px;color:var(--text3)">No data available.</div>'}
          ${rival||daddy?`<div style="margin-top:14px;font-family:var(--fm);font-size:10px;color:var(--text3);line-height:1.8">
            ${rival?`<div>😤 <b style="color:var(--red)">Nemesis:</b> ${rival.opp} (${rival.record})</div>`:''}
            ${daddy?`<div>😈 <b style="color:var(--green)">Owns:</b> ${daddy.opp} (${daddy.record})</div>`:''}
            ${peakElo?`<div>📈 <b style="color:var(--blue)">Peak ELO:</b> ${peakElo.elo} (${peakElo.season})</div>`:''}
          </div>`:''}
        </div>
        <div>
          <div class="res-sec">2026 Outlook</div>
          <div class="res-outlook">
            <div class="res-oh">${oEmoji} ${oHead}</div>
            <div class="res-ob">${oBody}</div>
          </div>
          ${bestS?`<div class="res-peak">
            <div class="res-pk-lbl">Best Season</div>
            <div class="res-pk-yr">${bestS.year} — #${bestS.rank||'?'}</div>
            <div class="res-pk-d">${bestS.w}–${bestS.l} · ${(bestS.pct*100).toFixed(0)}% win rate</div>
          </div>`:''}
          ${lr?.detail?`<div class="res-peak" style="margin-top:8px">
            <div class="res-pk-lbl">Legacy Breakdown</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px;font-family:var(--fm);font-size:10px;color:var(--text3)">
              <div>Rings: <b style="color:var(--white)">${(lr.rings||0).toFixed(1)}</b></div>
              <div>Sustained: <b style="color:var(--white)">${(lr.sustained||0).toFixed(1)}</b></div>
              <div>Dominance: <b style="color:var(--white)">${(lr.dominance||0).toFixed(1)}</b></div>
              <div>Consistency: <b style="color:var(--white)">${(lr.consistency||0).toFixed(1)}</b></div>
              <div>Acumen: <b style="color:var(--white)">${(lr.acumen||0).toFixed(1)}</b></div>
              <div>All-Stars: <b style="color:var(--white)">${lr.detail?.allStars||0}</b></div>
            </div>
          </div>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function openResume(key,fromTab=false){
  const html=buildResume(key);
  document.querySelectorAll('.lcard').forEach(el=>el.classList.toggle('open',el.id===`lc-${key}`));
  if(fromTab){
    document.getElementById('res-detail').innerHTML=html;
  } else {
    document.getElementById('leg-resume-slot').innerHTML=html;
    setTimeout(()=>document.getElementById('leg-resume-slot').scrollIntoView({behavior:'smooth',block:'start'}),80);
  }
}
function closeResume(){
  const s=document.getElementById('leg-resume-slot');
  const d=document.getElementById('res-detail');
  if(s)s.innerHTML='';
  if(d)d.innerHTML=`<div class="state" style="padding:30px 0">Select a team to view their full franchise resume.</div>`;
  document.querySelectorAll('.lcard').forEach(el=>el.classList.remove('open'));
}

  }).catch(()=>{
    // RecordBook not in data/ yet — analytics tabs will show guidance
    ['an-elo','an-luck','an-sos','an-cat'].forEach(id=>document.getElementById(id).innerHTML=`<div class="state">Upload <b>league_data_v6.json</b> to your repo's <b>data/</b> folder to unlock Analytics, Records, and Franchise tabs.</div>`);
    document.getElementById('rec-c').innerHTML=`<div class="state">Upload <b>league_data_v6.json</b> to your repo's <b>data/</b> folder.</div>`;
  });

  try{
    const meta=await load('meta.json');
    document.getElementById('hdr-year').textContent=meta.season;
    document.getElementById('hdr-team').textContent=meta.myTeam||'Jacob';
    document.getElementById('hdr-updated').textContent=`Updated ${fmtDate(meta.updated)}`;
  }catch(_){}

  renderStandings();
  renderMatchups();
  renderPowerRankings();
  renderTeamStats();
  renderRosters();
  loadHistory();
})();
</script>
</body>
</html>
