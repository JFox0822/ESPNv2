<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The League · Fantasy Baseball</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── Design Tokens ───────────────────────────────────────────────────────── */
:root {
  --page:#f0f2f7; --card:#ffffff; --card2:#f8f9fc;
  --navy:#0f172a; --navy2:#1e293b; --blue:#2563eb;
  --blue-lt:#dbeafe; --blue-md:#93c5fd;
  --green:#16a34a; --green-lt:#dcfce7;
  --red:#dc2626; --red-lt:#fee2e2;
  --gold:#b45309; --gold-lt:#fef3c7; --gold-bright:#f59e0b;
  --purple:#7c3aed; --purple-lt:#ede9fe;
  --border:#e2e8f0; --border2:#cbd5e1;
  --text:#334155; --text-dim:#94a3b8; --text-bright:#0f172a;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 10px 30px rgba(0,0,0,.08);
  --font-d:'Syne',sans-serif;
  --font-b:'Plus Jakarta Sans',sans-serif;
  --font-m:'JetBrains Mono',monospace;
  --radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--page);color:var(--text);font-family:var(--font-b);font-size:14px;min-height:100vh}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font-b)}

/* ── Layout ──────────────────────────────────────────────────────────────── */
.site{max-width:1200px;margin:0 auto;padding:0 20px 80px}

/* ── Header ──────────────────────────────────────────────────────────────── */
.hdr{padding:32px 0 0;margin-bottom:24px}
.hdr-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-bottom:20px;border-bottom:2px solid var(--navy)}
.hdr-left{}
.hdr-eyebrow{font-family:var(--font-m);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.hdr-title{font-family:var(--font-d);font-size:clamp(36px,5vw,60px);color:var(--navy);line-height:1;font-weight:800;letter-spacing:-.02em}
.hdr-title span{color:var(--blue)}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.my-pill{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-radius:20px;padding:5px 12px}
.my-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.hdr-meta{font-family:var(--font-m);font-size:10px;color:var(--text-dim)}
.blend-tag{display:inline-block;font-family:var(--font-m);font-size:9px;padding:2px 8px;border-radius:4px;background:var(--purple-lt);color:var(--purple);border:1px solid #c4b5fd;margin-left:6px}

/* ── Tab Nav ─────────────────────────────────────────────────────────────── */
.nav{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;flex-wrap:wrap;box-shadow:var(--shadow)}
.nav-btn{font-family:var(--font-b);font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:none;border-radius:7px;padding:8px 18px;transition:all .15s}
.nav-btn:hover{color:var(--navy);background:var(--page)}
.nav-btn.active{color:#fff;background:var(--navy);box-shadow:0 2px 8px rgba(15,23,42,.2)}

/* ── Panels ──────────────────────────────────────────────────────────────── */
.panel{display:none}.panel.active{display:block;animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Sub-nav ─────────────────────────────────────────────────────────────── */
.sub-nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sub-btn{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 14px;transition:all .15s;box-shadow:var(--shadow)}
.sub-btn:hover{color:var(--navy);border-color:var(--navy2)}
.sub-btn.active{color:var(--blue);border-color:var(--blue);background:var(--blue-lt);font-weight:600}
.sub-panel{display:none}.sub-panel.active{display:block;animation:up .15s ease}

/* ── Section heading ─────────────────────────────────────────────────────── */
.sh{font-family:var(--font-d);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;font-weight:700}

/* ── Card ────────────────────────────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-p{padding:20px}

/* ── Tables ──────────────────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-family:var(--font-b);font-size:13px}
thead th{background:var(--navy);color:rgba(255,255,255,.7);font-family:var(--font-m);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:10px 14px;text-align:left;white-space:nowrap}
thead th.r{text-align:right}thead th.c{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--card2)}
tbody tr.mine{background:#eff6ff;border-left:3px solid var(--blue)}
tbody tr.mine:hover{background:#dbeafe}
tbody td{padding:11px 14px;color:var(--text);white-space:nowrap}
tbody td.r{text-align:right;font-family:var(--font-m);font-size:12px}
tbody td.c{text-align:center;font-family:var(--font-m);font-size:12px}
tbody td.tn{font-weight:700;color:var(--navy);font-size:14px}
tbody td.rk{font-family:var(--font-d);font-size:20px;color:var(--text-dim);text-align:center;width:44px}
tbody tr.mine td.tn{color:var(--blue)}
tbody tr.mine td.rk{color:var(--blue)}
tbody tr.playoff-cut td{border-top:2px dashed var(--border2)}
.win{color:var(--green)!important}.loss{color:var(--red)!important}
.str-w{display:inline-block;font-family:var(--font-m);font-size:9px;padding:2px 7px;border-radius:4px;background:var(--green-lt);color:var(--green);font-weight:600}
.str-l{display:inline-block;font-family:var(--font-m);font-size:9px;padding:2px 7px;border-radius:4px;background:var(--red-lt);color:var(--red);font-weight:600}

/* ── Team link ───────────────────────────────────────────────────────────── */
.tlink{cursor:pointer;transition:color .1s}
.tlink:hover{color:var(--blue)!important;text-decoration:underline}

/* ── Matchup cards ───────────────────────────────────────────────────────── */
.mu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:16px}
.mu-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.mu-card.mine{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-lt),var(--shadow)}
.mu-head{background:var(--navy);padding:8px 16px;font-family:var(--font-m);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);display:flex;justify-content:space-between}
.mu-head .lead{color:var(--gold-bright)}
.mu-body{padding:16px}
.mu-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:4px 0}
.mu-name{font-weight:700;font-size:15px;color:var(--navy);flex:1}
.mu-name.me{color:var(--blue)}
.mu-score{font-family:var(--font-d);font-size:32px;color:var(--navy);min-width:36px;text-align:right;line-height:1}
.mu-score.w{color:var(--green)}.mu-score.l{color:var(--red)}
.mu-vs{text-align:center;font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:.2em;padding:4px 0}
.mu-cats{padding:12px 16px;background:var(--card2);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.mu-cat{text-align:center}
.mu-cl{font-family:var(--font-m);font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
.mu-cv{font-family:var(--font-m);font-size:10px;color:var(--text);margin-top:1px}
.mu-cat.wc .mu-cv{color:var(--green);font-weight:600}.mu-cat.lc .mu-cv{color:var(--red)}

/* ── Power Rankings ──────────────────────────────────────────────────────── */
.pr-list{display:flex;flex-direction:column;gap:12px}
.pr-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow);transition:box-shadow .15s}
.pr-card:hover{box-shadow:var(--shadow-md)}
.pr-card.mine{border-color:var(--blue);background:linear-gradient(135deg,#eff6ff,#fff)}
.pr-num{font-family:var(--font-d);font-size:42px;line-height:1;min-width:50px;color:var(--border2)}
.pr-card.mine .pr-num{color:var(--blue)}
.pr-delta{font-family:var(--font-m);font-size:10px;min-width:28px;text-align:center;margin-top:6px}
.du{color:var(--green)}.dd{color:var(--red)}.ds{color:var(--text-dim)}
.pr-body{flex:1;min-width:0}
.pr-name{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.pr-card.mine .pr-name{color:var(--blue)}
.pr-sub{font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-top:2px}
.pr-bars{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin:10px 0}
.b-row{}.b-top{display:flex;justify-content:space-between;margin-bottom:3px}
.b-lbl{font-family:var(--font-m);font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.07em}
.b-val{font-family:var(--font-m);font-size:9px;font-weight:600}
.b-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.b-fill{height:100%;border-radius:3px;transition:width .4s ease}
.cat-pills{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
.cp{font-family:var(--font-m);font-size:8px;padding:2px 5px;border-radius:3px;border:1px solid transparent}
.r1{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.r2{background:#d1fae5;color:#065f46;border-color:#a7f3d0}
.r3{background:#ecfdf5;color:#047857;border-color:#d1fae5}
.rm{background:var(--card2);color:var(--text-dim);border-color:var(--border)}
.rb{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.r10{background:#fee2e2;color:#b91c1c;border-color:#fca5a5}
.r11{background:#fee2e2;color:#991b1b;border-color:#f87171}
.r12{background:#fef2f2;color:#7f1d1d;border-color:#f87171}
.pr-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;min-width:110px}
.comp-val{font-family:var(--font-d);font-size:38px;color:var(--navy);line-height:1;font-weight:800}
.comp-lbl{font-family:var(--font-m);font-size:8px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase}
.h2h-val{font-family:var(--font-d);font-size:18px;color:var(--text)}
.h2h-lbl{font-family:var(--font-m);font-size:8px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.pr-view-btn{font-family:var(--font-m);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);background:var(--blue-lt);border:1px solid var(--blue-md);border-radius:4px;padding:4px 10px;transition:all .15s}
.pr-view-btn:hover{background:var(--blue);color:#fff}
.proj-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-family:var(--font-m);font-size:10px;box-shadow:var(--shadow)}
.proj-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:flex}
.proj-seg{height:100%}

/* ── Rosters ─────────────────────────────────────────────────────────────── */
.team-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tbtn{font-family:var(--font-m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px 14px;transition:all .15s;box-shadow:var(--shadow)}
.tbtn:hover{color:var(--navy);border-color:var(--navy2)}
.tbtn.active{color:#fff;background:var(--navy);border-color:var(--navy)}
.tbtn.mine{border-color:var(--blue)}
.tbtn.mine.active{background:var(--blue);border-color:var(--blue)}
.inj{display:inline-block;font-family:var(--font-m);font-size:8px;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:600}
.inj-ok{background:var(--green-lt);color:var(--green)}
.inj-q{background:var(--gold-lt);color:var(--gold)}
.inj-out{background:var(--red-lt);color:var(--red)}
.inj-il{background:var(--purple-lt);color:var(--purple)}
.tier-elite{display:inline-block;font-family:var(--font-m);font-size:8px;padding:1px 6px;border-radius:3px;background:var(--gold-lt);color:var(--gold);border:1px solid #fcd34d;font-weight:700;margin-left:4px}
.tier-solid{display:inline-block;font-family:var(--font-m);font-size:8px;padding:1px 6px;border-radius:3px;background:var(--green-lt);color:var(--green);border:1px solid #86efac;font-weight:700;margin-left:4px}
.pos-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;background:var(--navy);color:#fff;font-family:var(--font-m);font-size:9px;font-weight:600;flex-shrink:0}

/* ── History ─────────────────────────────────────────────────────────────── */
.hist-sel{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.hist-sel label{font-family:var(--font-m);font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.hist-sel select,.hist-search{font-family:var(--font-m);font-size:11px;background:var(--card);color:var(--navy);border:1px solid var(--border);border-radius:6px;padding:6px 10px;box-shadow:var(--shadow)}
.hist-search{min-width:180px}
.h2h-row{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--card);border-radius:8px;margin-bottom:4px;border:1px solid var(--border);box-shadow:var(--shadow)}
.h2h-name{flex:1;font-weight:700;color:var(--navy);font-size:13px}
.h2h-rec{font-family:var(--font-m);font-size:12px;min-width:60px;text-align:center}
.h2h-bar{flex:2;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.h2h-fill{height:100%;background:var(--blue);border-radius:3px}
.h2h-pct{font-family:var(--font-m);font-size:11px;color:var(--text-dim);min-width:36px;text-align:right}

/* ── Legacy / Franchise ──────────────────────────────────────────────────── */
.leg-list{display:flex;flex-direction:column;gap:12px}
.leg-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.leg-card:hover{box-shadow:var(--shadow-md);border-color:var(--navy)}
.leg-card.open{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-lt),var(--shadow-md)}
.leg-rank{font-family:var(--font-d);font-size:52px;line-height:1;min-width:60px;text-align:center;font-weight:800}
.rk-1{color:var(--gold-bright)}.rk-2{color:#94a3b8}.rk-3{color:#cd7f32}.rk-o{color:var(--border2)}
.leg-info{flex:1}
.leg-name{font-family:var(--font-d);font-size:20px;color:var(--navy);font-weight:700;letter-spacing:-.01em}
.leg-sub{font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-top:3px}
.leg-trophies{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tr-icon{font-size:16px}
.leg-score{text-align:right}
.leg-score-val{font-family:var(--font-d);font-size:44px;color:var(--navy);line-height:1;font-weight:800}
.leg-score-lbl{font-family:var(--font-m);font-size:8px;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase}
.leg-breakdown{display:flex;gap:14px;margin-top:6px;justify-content:flex-end}
.lb-i{font-family:var(--font-m);font-size:9px;color:var(--text-dim);text-align:right}
.lb-v{color:var(--navy);font-weight:700}

/* ── RESUME (matches Fantrax screenshot style but light) ─────────────────── */
.resume-wrap{background:var(--navy);border-radius:var(--radius);overflow:hidden;margin-top:16px;animation:up .3s ease;box-shadow:var(--shadow-md)}
.res-hero{padding:28px 32px 24px;border-bottom:1px solid rgba(255,255,255,.08)}
.res-top{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
.res-badge{width:64px;height:64px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:22px;color:#fff;font-weight:800;flex-shrink:0}
.res-badge.mine{background:var(--blue)}
.res-title-block{flex:1}
.res-name{font-family:var(--font-d);font-size:clamp(24px,3vw,36px);color:#fff;font-weight:800;line-height:1;letter-spacing:-.01em}
.res-tagline{font-style:italic;color:#34d399;font-size:13px;margin-top:6px;font-weight:500}
.res-owner{font-family:var(--font-m);font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.06em}
.res-stats-row{display:flex;gap:0;margin-top:20px;border-top:1px solid rgba(255,255,255,.08);padding-top:20px}
.res-stat{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.08)}
.res-stat:last-child{border-right:none}
.res-stat-val{font-family:var(--font-d);font-size:28px;color:#fff;font-weight:700;line-height:1}
.res-stat-val.g{color:#34d399}.res-stat-val.gold{color:var(--gold-bright)}
.res-stat-lbl{font-family:var(--font-m);font-size:8px;color:rgba(255,255,255,.35);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.res-body{padding:24px 32px}
.res-section-title{font-family:var(--font-m);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#34d399;margin-bottom:12px;font-weight:600}
.res-divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:20px 0}
.res-text{color:rgba(255,255,255,.75);font-size:13px;line-height:1.7;margin-bottom:12px}
.res-text:last-child{margin-bottom:0}
.res-cores{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:4px}
.res-core-title{font-family:var(--font-m);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#34d399;margin-bottom:10px}
.res-player{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.res-player:last-child{border-bottom:none}
.res-pos{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:9px;color:rgba(255,255,255,.5);font-weight:600;flex-shrink:0}
.res-player-info{flex:1;min-width:0}
.res-player-name{font-weight:700;color:#fff;font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.res-player-cats{font-family:var(--font-m);font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.05em}
.res-elite{font-family:var(--font-m);font-size:8px;padding:1px 6px;border-radius:3px;background:rgba(245,158,11,.2);color:var(--gold-bright);border:1px solid rgba(245,158,11,.3);font-weight:700}
.res-solid{font-family:var(--font-m);font-size:8px;padding:1px 6px;border-radius:3px;background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.25);font-weight:700}
.res-more{font-family:var(--font-m);font-size:9px;color:rgba(255,255,255,.25);padding-top:8px}
.res-bottom{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px}
.res-season-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.res-season-row:last-child{border-bottom:none}
.res-sy{font-family:var(--font-m);font-size:10px;color:rgba(255,255,255,.35);min-width:36px}
.res-srec{font-family:var(--font-m);font-size:11px;color:rgba(255,255,255,.6);flex:1}
.res-srank{font-family:var(--font-d);font-size:18px;min-width:32px;text-align:right}
.res-srank.champ{color:var(--gold-bright)}.res-srank.runu{color:#94a3b8}.res-srank.playoff{color:#34d399}.res-srank.other{color:rgba(255,255,255,.25)}
.res-outlook{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:8px;padding:14px}
.res-outlook-head{font-weight:700;color:#fff;font-size:14px;margin-bottom:6px}
.res-outlook-body{color:rgba(255,255,255,.6);font-size:12px;line-height:1.6}
.res-peak{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px;margin-top:12px}
.res-peak-lbl{font-family:var(--font-m);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:6px}

.res-peak-detail{font-family:var(--font-m);font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.res-loading{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-family:var(--font-m);font-size:11px;letter-spacing:.12em}

@media(max-width:700px){
  .mu-grid,.res-cores,.res-bottom{grid-template-columns:1fr}
  .pr-bars{grid-template-columns:1fr}
  .pr-card{flex-wrap:wrap}
  .mu-cats{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>
<div class="site">

<!-- Header -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-left">
      <div class="hdr-eyebrow">ESPN Fantasy Baseball · H2H Categories · Since 2013</div>
      <div class="hdr-title">The League <span id="hdr-year">2026</span></div>
    </div>
    <div class="hdr-right">
      <div class="my-pill"><span class="dot"></span><span id="hdr-team">Jacob</span></div>
      <div class="hdr-meta" id="hdr-updated">Loading…</div>
    </div>
  </div>
</header>

<!-- Tab nav -->
<nav class="nav">
  <button class="nav-btn active" data-tab="standings">Standings</button>
  <button class="nav-btn" data-tab="matchups">Matchups</button>
  <button class="nav-btn" data-tab="power">Power Rankings</button>
  <button class="nav-btn" data-tab="stats">Team Stats</button>
  <button class="nav-btn" data-tab="rosters">Rosters</button>
  <button class="nav-btn" data-tab="history">History</button>
  <button class="nav-btn" data-tab="franchise">Franchise</button>
</nav>

<!-- Standings -->
<div id="tab-standings" class="panel active"><div id="std-c"><div class="state">Loading…</div></div></div>
<!-- Matchups -->
<div id="tab-matchups" class="panel"><div id="mu-c"><div class="state">Loading…</div></div></div>
<!-- Power -->
<div id="tab-power" class="panel"><div id="pr-c"><div class="state">Loading…</div></div></div>
<!-- Stats -->
<div id="tab-stats" class="panel"><div id="ts-c"><div class="state">Loading…</div></div></div>
<!-- Rosters -->
<div id="tab-rosters" class="panel"><div id="ros-c"><div class="state">Loading…</div></div></div>
<!-- History -->
<div id="tab-history" class="panel">
  <div class="sub-nav">
    <button class="sub-btn active" data-sub="hs-st">Season Standings</button>
    <button class="sub-btn" data-sub="hs-h2h">All-Time H2H</button>
    <button class="sub-btn" data-sub="hs-mu">Weekly Results</button>
    <button class="sub-btn" data-sub="hs-cat">Category Records</button>
  </div>
  <div id="hs-st" class="sub-panel active"><div class="state">Loading…</div></div>
  <div id="hs-h2h" class="sub-panel"><div class="state">Loading…</div></div>
  <div id="hs-mu" class="sub-panel"><div class="state">Loading…</div></div>
  <div id="hs-cat" class="sub-panel"><div class="state">Loading…</div></div>
</div>
<!-- Franchise -->
<div id="tab-franchise" class="panel">
  <div class="sub-nav">
    <button class="sub-btn active" data-sub="fr-leg">Legacy Rankings</button>
    <button class="sub-btn" data-sub="fr-res">Team Resumes</button>
  </div>
  <div id="fr-leg" class="sub-panel active"><div class="state">Loading…</div></div>
  <div id="fr-res" class="sub-panel"><div class="state">Loading…</div></div>
</div>

</div><!-- /site -->

<script>
// ── Global state ──────────────────────────────────────────────────────────────
let ROSTERS=null, LEGACY=null;
let activeRosterId=null;

// ── Navigation ────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
  });
});
document.querySelectorAll('.sub-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    const p=b.closest('.panel');
    p.querySelectorAll('.sub-btn').forEach(x=>x.classList.remove('active'));
    p.querySelectorAll('.sub-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.sub).classList.add('active');
  });
});

function goToRoster(teamId){
  document.querySelector('[data-tab="rosters"]').click();
  setTimeout(()=>{
    activeRosterId=teamId;
    if(ROSTERS) drawRosters();
  },50);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
async function load(f){const r=await fetch(`data/${f}?t=${Date.now()}`);if(!r.ok)throw new Error(`HTTP ${r.status}: ${f}`);return r.json();}
function errBox(id,msg){document.getElementById(id).innerHTML=`<div class="state err">⚠ ${msg}<br><small>Run the GitHub Action to generate data files.</small></div>`;}
function fmt(iso){if(!iso)return'—';return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});}
function pClass(r,n=12){if(r===1)return'r1';if(r===2)return'r2';if(r===3)return'r3';if(r===n)return'r12';if(r===n-1)return'r11';if(r===n-2)return'r10';if(r>n*.6)return'rb';return'rm';}
function bar(lbl,val,color,pct){
  return`<div class="b-row"><div class="b-top"><span class="b-lbl">${lbl}</span><span class="b-val" style="color:${color}">${val.toFixed(1)}</span></div><div class="b-track"><div class="b-fill" style="width:${Math.max(val,0)}%;background:${color}"></div></div></div>`;
}

// ── Standings ─────────────────────────────────────────────────────────────────
async function renderStandings(){
  try{
    const{standings,week,updated}=await load('standings.json');
    document.getElementById('hdr-updated').textContent=`Updated ${fmt(updated)}`;
    const CUT=6;
    const rows=standings.map((t,i)=>{
      const my=t.isMyTeam?'mine':'';
      const cut=i===CUT?'playoff-cut':'';
      const sc=t.streakType==='WIN'?'str-w':'str-l';
      const sl=t.streakType==='WIN'?'W':'L';
      const st=t.streak?`<span class="${sc}">${sl}${t.streak}</span>`:'—';
      const tot=t.wins+t.losses;const pct=tot?(t.wins/tot).toFixed(3).replace(/^0/,''):'.000';
      return`<tr class="${my} ${cut}">
        <td class="rk">${t.rank}</td>
        <td class="tn tlink" onclick="goToRoster(${t.id})" title="View roster">${t.name}</td>
        <td class="r"><span class="win">${t.wins}</span>–<span class="loss">${t.losses}</span></td>
        <td class="r">${pct}</td><td class="r">${t.pointsFor}</td>
        <td class="r">${t.pointsAgainst}</td><td class="c">${st}</td>
      </tr>`;
    }).join('');
    document.getElementById('std-c').innerHTML=`
      <div class="sh">Week ${week} · League Standings</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th style="width:44px">#</th><th>Team</th><th class="r">W–L</th><th class="r">PCT</th><th class="r">PF</th><th class="r">PA</th><th class="c">Streak</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="margin-top:10px;font-family:var(--font-m);font-size:9px;color:var(--text-dim)">── dashed line = playoff cutoff · Click any team name to view roster</div>`;
  }catch(e){errBox('std-c',e.message);}
}

// ── Matchups ──────────────────────────────────────────────────────────────────
async function renderMatchups(){
  try{
    const{matchups,week}=await load('matchups.json');
    const H=['R','RBI','HR','SB','K','AVG','OPS'],P=['IP','H','K','QS','ERA','WHIP','SV'];
    const cards=matchups.map(m=>{
      const{home,away}=m;const hasMe=home.isMyTeam||away.isMyTeam;
      const hw=home.catWins>away.catWins,aw=away.catWins>home.catWins;
      const catRow=cats=>cats.map(c=>{
        const h=home.categories?.[c]||{};const hc=h.result==='WIN'?'wc':h.result==='LOSS'?'lc':'';
        return`<div class="mu-cat ${hc}"><div class="mu-cl">${c}</div><div class="mu-cv">${h.value!==undefined?h.value:'—'}</div></div>`;
      }).join('');
      const hasCats=Object.keys(home.categories||{}).length>0;
      return`<div class="mu-card ${hasMe?'mine':''}">
        <div class="mu-head"><span>Week ${week}</span><span class="lead">${m.winner!=='UNDECIDED'?'✓ Final':`${m.leader} leading`}</span></div>
        <div class="mu-body">
          <div class="mu-row"><span class="mu-name ${home.isMyTeam?'me':''} tlink" onclick="goToRoster(${home.teamId})">${home.team}</span><span class="mu-score ${hw?'w':aw?'l':''}">${home.catWins}</span></div>
          <div class="mu-vs">vs</div>
          <div class="mu-row"><span class="mu-name ${away.isMyTeam?'me':''} tlink" onclick="goToRoster(${away.teamId})">${away.team}</span><span class="mu-score ${aw?'w':hw?'l':''}">${away.catWins}</span></div>
        </div>
        ${hasCats?`<div class="mu-cats" style="grid-template-columns:repeat(7,1fr)">${catRow(H)}</div><div class="mu-cats" style="grid-template-columns:repeat(7,1fr)">${catRow(P)}</div>`:''}
      </div>`;
    }).join('');
    document.getElementById('mu-c').innerHTML=`
      <div class="sh">Week ${week} Matchups</div>
      <div class="mu-grid">${cards||'<div class="state">No matchup data yet.</div>'}</div>`;
  }catch(e){errBox('mu-c',e.message);}
}

// ── Power Rankings ─────────────────────────────────────────────────────────────
async function renderPowerRankings(){
  try{
    const{rankings,week,cats,projBlend,weights}=await load('power_rankings.json');
    const w=weights||{};const pb=projBlend||{projPct:0,actualPct:100};
    const pPct=pb.projPct||0,aPct=pb.actualPct||100;
    const projW=Math.round(pPct);const actW=100-projW;

    const allSame=rankings.length>1&&rankings.every(p=>p.composite===rankings[0].composite);
    const cards=rankings.map(p=>{
      const d=p.rankDelta;
      const dEl=d>0?`<span class="pr-delta du">▲${d}</span>`:d<0?`<span class="pr-delta dd">▼${Math.abs(d)}</span>`:`<span class="pr-delta ds">—</span>`;
      const pills=(cats||[]).map(c=>{const r=p.catRanks?.[c];return r?`<span class="cp ${pClass(r,rankings.length)}">${c} #${r}</span>`:''}).join('');
      return`<div class="pr-card ${p.isMyTeam?'mine':''}">
        <div class="pr-num">${p.pwRank}</div>${dEl}
        <div class="pr-body">
          <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
            <div class="pr-name tlink" onclick="goToRoster(${p.id})">${p.name}</div>
            <div style="font-family:var(--font-m);font-size:10px;color:var(--text-dim)">#${p.overallRank} standings · ${p.overallW}–${p.overallL}</div>
          </div>
          <div class="pr-bars">
            ${bar(`Starter Hitting (${(w.starterHit*100|0)}%)`,p.starterHitScore||0,'#16a34a')}
            ${bar(`Starter Pitching (${(w.starterPit*100|0)}%)`,p.starterPitScore||0,'#2563eb')}
            ${bar(`Bench Hit Depth (${(w.benchHit*100|0)}%)`,p.benchHitScore||0,'#4ade80')}
            ${bar(`Bench Pitch Depth (${(w.benchPit*100|0)}%)`,p.benchPitScore||0,'#93c5fd')}
          </div>
          <div class="cat-pills">${pills}</div>
        </div>
        <div class="pr-right">
          <div><div class="comp-val">${(p.composite||0).toFixed(1)}</div><div class="comp-lbl">Composite</div></div>
          <div><div class="h2h-val"><span class="win">${p.h2hWins}</span>–<span class="loss">${p.h2hLosses}</span></div><div class="h2h-lbl">14-Cat H2H</div></div>
          <div style="font-family:var(--font-m);font-size:9px;color:var(--text-dim)">${p.hitDepth||0}H / ${p.pitchDepth||0}P</div>
          <button class="pr-view-btn" onclick="goToRoster(${p.id})">View Roster →</button>
        </div>
      </div>`;
    }).join('');

    document.getElementById('pr-c').innerHTML=`
      <div class="sh">Week ${week} Power Rankings</div>
      <div class="proj-bar">
        <div style="font-family:var(--font-m);font-size:10px;color:var(--text-dim);white-space:nowrap">Stat Blend</div>
        <div class="proj-bar-track">
          <div class="proj-seg" style="width:${projW}%;background:var(--purple)"></div>
          <div class="proj-seg" style="width:${actW}%;background:var(--blue)"></div>
        </div>
        <div style="font-family:var(--font-m);font-size:10px;white-space:nowrap">
          <span style="color:var(--purple)">${projW}% Projected</span> · <span style="color:var(--blue)">${actW}% Actual</span>
        </div>
      </div>
      <div style="font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-bottom:16px;line-height:1.8">
        <b style="color:var(--navy)">Composite</b> = 5-component weighted score (cat rank + starter hitting/pitching + bench depth).<br>
        <b style="color:var(--green)">Starter bars</b> = z-score vs all league players at that position. <b style="color:var(--navy)">14-Cat H2H</b> = simulated vs every team.<br>
        ${allSame?'<span style="color:var(--purple)">Scores equalizing — projection data loads as season starts.</span>':'Click a team name or View Roster to jump to that roster.'}
      </div>
      <div class="pr-list">${cards||'<div class="state">No data yet.</div>'}</div>`;
    // Store globally so resumes can reference it
    window._prData=rankings;
    console.log('PR loaded:', rankings.length, 'teams, top team:', rankings[0]?.name, rankings[0]?.composite);
  }catch(e){errBox('pr-c',e.message);}
}

// ── Team Stats ─────────────────────────────────────────────────────────────────
async function renderTeamStats(){
  try{
    const{teams,season}=await load('team_stats.json');
    const H=['R','RBI','HR','SB','K','AVG','OPS'],P=['IP','H','K','QS','ERA','WHIP','SV','HLD'];
    function tbl(lbl,cols){
      const hdr=['#','Team',...cols].map((c,i)=>`<th ${i>1?'class="r"':''}>${c}</th>`).join('');
      const rows=teams.map((t,i)=>{
        const my=t.isMyTeam?'mine':'';
        const cells=cols.map(c=>`<td class="r">${t.stats[c]!==undefined?t.stats[c]:'—'}</td>`).join('');
        return`<tr class="${my}"><td class="rk">${i+1}</td><td class="tn tlink" onclick="goToRoster(${t.id})">${t.name}</td>${cells}</tr>`;
      }).join('');
      return`<div class="sh" style="margin-top:24px">${lbl}</div><div class="tbl-wrap"><table><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    document.getElementById('ts-c').innerHTML=`<div class="sh">${season} Season Stats</div>`+tbl('Hitting',H)+tbl('Pitching',P);
  }catch(e){errBox('ts-c',e.message);}
}

// ── Rosters ────────────────────────────────────────────────────────────────────
function drawRosters(){
  if(!ROSTERS)return;
  const{teams,season,projBlend}=ROSTERS;
  const pb=projBlend||{projPct:0};
  if(!activeRosterId) activeRosterId=(teams.find(t=>t.isMyTeam)||teams[0])?.teamId;

  function injBadge(s){
    if(!s||s==='ACTIVE')return'';
    if(s==='QUESTIONABLE'||s==='DAY_TO_DAY')return'<span class="inj inj-q">DTD</span>';
    if(s==='OUT')return'<span class="inj inj-out">OUT</span>';
    if(s==='INJURY_RESERVE'||s==='IL')return'<span class="inj inj-il">IL</span>';
    return`<span class="inj inj-q">${s}</span>`;
  }
  function tierBadge(p){
    if(p.tier==='ELITE')return'<span class="tier-elite">⭐ ELITE</span>';
    if(p.tier==='SOLID')return'<span class="tier-solid">SOLID</span>';
    return'';
  }
  function pRow(p,sts){
    const cells=sts.map(s=>`<td class="r">${p.stats[s]!==undefined?p.stats[s]:'—'}</td>`).join('');
    return`<tr><td style="width:32px;text-align:center"><div class="pos-badge">${p.slot}</div></td>
      <td class="tn" style="font-size:13px">${p.name}${tierBadge(p)}${injBadge(p.injStatus)}</td>
      <td style="font-family:var(--font-m);font-size:10px;color:var(--text-dim);text-align:center">${p.position}</td>
      ${cells}</tr>`;
  }
  function section(lbl,players){
    if(!players.length)return'';
    const hitters=players.filter(p=>!p.isPitcher),pitchers=players.filter(p=>p.isPitcher);
    const HS=['AVG','OPS','R','RBI','HR','SB'],PS=['ERA','WHIP','IP','K','QS','SV'];
    let out=`<div class="sh" style="margin-top:20px">${lbl}</div>`;
    if(hitters.length){
      const hdr=['Slot','Player','Pos',...HS].map((c,i)=>`<th ${i>2?'class="r"':''}>${c}</th>`).join('');
      out+=`<div class="tbl-wrap"><table><thead><tr>${hdr}</tr></thead><tbody>${hitters.map(p=>pRow(p,HS)).join('')}</tbody></table></div>`;
    }
    if(pitchers.length){
      const hdr=['Slot','Player','Pos',...PS].map((c,i)=>`<th ${i>2?'class="r"':''}>${c}</th>`).join('');
      out+=`<div class="tbl-wrap" style="margin-top:8px"><table><thead><tr>${hdr}</tr></thead><tbody>${pitchers.map(p=>pRow(p,PS)).join('')}</tbody></table></div>`;
    }
    return out;
  }

  const team=teams.find(t=>t.teamId===activeRosterId)||teams[0];
  const active=team.players.filter(p=>!p.onBench&&!p.onIL);
  const bench=team.players.filter(p=>p.onBench);
  const il=team.players.filter(p=>p.onIL);
  const btns=teams.map(t=>`<button class="tbtn ${t.isMyTeam?'mine':''} ${t.teamId===activeRosterId?'active':''}" onclick="activeRosterId=${t.teamId};drawRosters()">${t.abbrev}</button>`).join('');

  document.getElementById('ros-c').innerHTML=`
    <div class="sh">${season} Rosters</div>
    ${pb.projPct>0?`<div style="font-family:var(--font-m);font-size:10px;color:var(--purple);margin-bottom:12px">⚗ Stats use ${pb.projPct}% projected / ${pb.actualPct}% actual blend · <span class="blend-tag">${pb.projPct}% Proj</span></div>`:''}
    <div class="team-btns">${btns}</div>
    ${section('Active Roster',active)}${section('Bench',bench)}${section('Injured List',il)}`;
}

async function renderRosters(){
  try{ROSTERS=await load('rosters.json');drawRosters();}
  catch(e){errBox('ros-c',e.message);}
}

// ── History ────────────────────────────────────────────────────────────────────
let H={};
async function loadHistory(){
  try{
    const[st,h2h,mu,cats]=await Promise.all([load('history_standings.json'),load('history_h2h.json'),load('history_matchups.json'),load('history_cats.json')]);
    H={st,h2h,mu,cats};renderHSt();renderHH2H();renderHMu();renderHCat();
  }catch(e){['hs-st','hs-h2h','hs-mu','hs-cat'].forEach(id=>errBox(id,e.message));}
}
function renderHSt(){
  try{
    const{seasons}=H.st;if(!seasons?.length){errBox('hs-st','No data.');return;}
    let cur=seasons[seasons.length-1].season;
    function draw(){
      const s=seasons.find(x=>x.season===cur);
      const rows=s.teams.map(t=>`<tr><td class="rk">${t.rank}</td><td class="tn">${t.name}</td>
        <td class="r"><span class="win">${t.wins}</span>–<span class="loss">${t.losses}</span></td>
        <td class="r">${t.pointsFor}</td>
        <td class="c">${t.champion?'🏆':t.runnerUp?'🥈':t.madePlayoffs?'🏟️':'—'}</td></tr>`).join('');
      const opts=seasons.map(s=>`<option value="${s.season}" ${s.season===cur?'selected':''}>${s.season}</option>`).join('');
      document.getElementById('hs-st').innerHTML=`
        <div class="hist-sel"><label>Season</label><select id="hss">${opts}</select></div>
        <div class="tbl-wrap"><table><thead><tr><th style="width:44px">#</th><th>Team</th><th class="r">W–L</th><th class="r">PF</th><th class="c">Result</th></tr></thead><tbody>${rows}</tbody></table></div>`;
      document.getElementById('hss').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
    }draw();
  }catch(e){errBox('hs-st',e.message);}
}
function renderHH2H(){
  try{
    const{records,teams}=H.h2h;if(!records?.length){errBox('hs-h2h','No H2H data.');return;}
    const tw={};teams.forEach(t=>{tw[t]=0;});records.forEach(r=>{tw[r.teamA]=(tw[r.teamA]||0)+r.aWins;});
    const sorted=[...teams].sort((a,b)=>(tw[b]||0)-(tw[a]||0));
    const lu={};records.forEach(r=>{lu[`${r.teamA}__${r.teamB}`]={w:r.aWins,l:r.aLosses};lu[`${r.teamB}__${r.teamA}`]={w:r.aLosses,l:r.aWins};});
    const rows=sorted.map(team=>{
      let w=0,l=0;sorted.filter(t=>t!==team).forEach(o=>{const r=lu[`${team}__${o}`]||{w:0,l:0};w+=r.w;l+=r.l;});
      const tot=w+l,pct=tot?((w/tot)*100).toFixed(1):0,bw=tot?Math.round(w/tot*100):0;
      return`<div class="h2h-row"><div class="h2h-name">${team}</div><div class="h2h-rec"><span class="win">${w}</span>–<span class="loss">${l}</span></div><div class="h2h-bar"><div class="h2h-fill" style="width:${bw}%"></div></div><div class="h2h-pct">${pct}%</div></div>`;
    }).join('');
    document.getElementById('hs-h2h').innerHTML=`<div class="sh">All-Time H2H Records</div><div style="font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-bottom:14px">Available seasons · sorted by total wins</div>${rows}`;
  }catch(e){errBox('hs-h2h',e.message);}
}
function renderHMu(){
  try{
    const{matchups}=H.mu;if(!matchups?.length){errBox('hs-mu','No matchup data.');return;}
    const seasons=[...new Set(matchups.map(m=>m.season))].sort((a,b)=>b-a);let cur=seasons[0],q='';
    function draw(){
      const fil=matchups.filter(m=>m.season===cur&&(!q||m.home.toLowerCase().includes(q)||m.away.toLowerCase().includes(q)));
      const rows=fil.map(m=>{const hw=m.winner===m.home,aw=m.winner===m.away;
        return`<tr><td class="r" style="color:var(--text-dim)">${m.week}</td><td class="tn" style="${hw?'color:var(--green)':''}">${m.home}</td><td class="c"><span class="${hw?'win':''}">${m.homeCatW}</span>–<span class="${aw?'win':''}">${m.awayCatW}</span></td><td class="tn" style="${aw?'color:var(--green)':''}">${m.away}</td></tr>`;
      }).join('');
      const opts=seasons.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
      document.getElementById('hs-mu').innerHTML=`
        <div class="hist-sel"><label>Season</label><select id="hmu">${opts}</select><input class="hist-search" id="hmuq" type="text" placeholder="Filter by team…" value="${q}"/></div>
        <div class="tbl-wrap"><table><thead><tr><th class="r">Wk</th><th>Home</th><th class="c">Score</th><th>Away</th></tr></thead><tbody>${rows||'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-dim)">No results</td></tr>'}</tbody></table></div>`;
      document.getElementById('hmu').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
      document.getElementById('hmuq').addEventListener('input',e=>{q=e.target.value.toLowerCase();draw();});
    }draw();
  }catch(e){errBox('hs-mu',e.message);}
}
function renderHCat(){
  try{
    const{seasons,cats}=H.cats;if(!seasons?.length){errBox('hs-cat','No cat data.');return;}
    const all=seasons.map(s=>s.season).sort((a,b)=>b-a);let cur=all[0];
    function draw(){
      const sd=seasons.find(s=>s.season===cur);
      const teams=[...sd.teams].sort((a,b)=>Object.values(b.catRecord||{}).reduce((s,v)=>s+(v.W||0),0)-Object.values(a.catRecord||{}).reduce((s,v)=>s+(v.W||0),0));
      const hdr=['Team',...cats].map((c,i)=>`<th ${i?'class="c"':''}>${c}</th>`).join('');
      const rows=teams.map(t=>{
        const cells=cats.map(c=>{const r=t.catRecord?.[c];if(!r)return'<td class="c" style="color:var(--text-dim)">—</td>';
          const tot=(r.W||0)+(r.L||0),pct=tot?Math.round((r.W||0)/tot*100):0;
          const col=pct>=55?'var(--green)':pct<=45?'var(--red)':'var(--text)';
          return`<td class="c"><span style="color:${col};font-family:var(--font-m);font-size:10px">${r.W||0}–${r.L||0}</span></td>`;
        }).join('');
        return`<tr><td class="tn">${t.name}</td>${cells}</tr>`;
      }).join('');
      const opts=all.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
      document.getElementById('hs-cat').innerHTML=`
        <div class="hist-sel"><label>Season</label><select id="hcat">${opts}</select></div>
        <div style="font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-bottom:12px"><span style="color:var(--green)">Green</span> = 55%+ win rate · <span style="color:var(--red)">Red</span> = 45% and below</div>
        <div class="tbl-wrap"><table><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
      document.getElementById('hcat').addEventListener('change',e=>{cur=parseInt(e.target.value);draw();});
    }draw();
  }catch(e){errBox('hs-cat',e.message);}
}

// ── Data-driven narrative generator ─────────────────────────────────────────
function generateNarrative(t, rosterTeam, prData){
  const c=t.components||{};
  const tot=t.allTimeW+t.allTimeL;
  const wpct=tot?t.allTimeW/tot:0;
  const hist=t.seasonHistory||[];
  const nSeasons=hist.length;
  // Filter to active roster — treat undefined flags as false (not on bench/IL)
  const allPlayers=rosterTeam?.players||[];
  const activePlayers=allPlayers.filter(p=>p.onBench===false&&p.onIL===false);
  // If slot flags aren't set, fall back to slot-based classification
  const useFallback=activePlayers.length===0&&allPlayers.length>0;
  const effectivePlayers=useFallback
    ? allPlayers.filter(p=>!['BE','IL'].includes(p.slot))
    : activePlayers;
  const hitters=effectivePlayers.filter(p=>!p.isPitcher).sort((a,b)=>(b.hitScore||0)-(a.hitScore||0));
  const pitchers=effectivePlayers.filter(p=>p.isPitcher).sort((a,b)=>(b.pitchScore||0)-(a.pitchScore||0));
  const eliteHitters=hitters.filter(p=>p.tier==='ELITE');
  const elitePitchers=pitchers.filter(p=>p.tier==='ELITE');
  const solidHitters=hitters.filter(p=>p.tier==='SOLID');
  const solidPitchers=pitchers.filter(p=>p.tier==='SOLID');
  const hitHeavy=hitters.length>pitchers.length+2;
  const pitchHeavy=pitchers.length>hitters.length+2;
  const peakSorted=hist.filter(s=>s.finalRank>0).sort((a,b)=>a.finalRank-b.finalRank);
  const peak=peakSorted[0];
  const worst=peakSorted[peakSorted.length-1];
  const legRank=t.legacyRank||6;
  const isElite=legRank<=3;const isMid=legRank<=7;
  const winPcts=hist.map(s=>s.winPct||0);
  const avgWinPct=winPcts.length?winPcts.reduce((a,b)=>a+b,0)/winPcts.length:0;
  const improving=hist.length>=3&&hist.slice(-2).every((s,i,a)=>i===0||s.winPct>=a[i-1].winPct);
  const declining=hist.length>=3&&hist.slice(-2).every((s,i,a)=>i===0||s.winPct<=a[i-1].winPct);
  const curYear=hist[hist.length-1];
  const prRank=prData?.pwRank||6;
  const composite=prData?.composite||50;
  const catRanks=prData?.catRanks||{};
  const strongCats=Object.entries(catRanks).filter(([,r])=>r<=3).map(([c])=>c);
  const weakCats=Object.entries(catRanks).filter(([,r])=>r>=10).map(([c])=>c);
  const starterHit=prData?.starterHitScore||50;
  const starterPit=prData?.starterPitScore||50;

  // ── Tagline ──
  let tagline;
  if(c.championships>=2) tagline="Built for October. Proven it more than once.";
  else if(c.championships===1&&c.playoffApps>=4) tagline="A champion who keeps coming back for more.";
  else if(c.championships===1) tagline="One title. The hunger for another never left.";
  else if(c.playoffApps>=5&&wpct>0.55) tagline="Consistent. Dangerous. Still chasing the big one.";
  else if(wpct>0.60) tagline="Elite win rate. The résumé speaks for itself.";
  else if(improving) tagline="Rising. The best may be ahead.";
  else if(eliteHitters.length>=2&&elitePitchers.length>=2) tagline="Loaded on both sides. This is a different kind of team.";
  else if(hitHeavy&&eliteHitters.length>=2) tagline="They hit. They score. They win.";
  else if(pitchHeavy&&elitePitchers.length>=2) tagline="Pitching wins championships. Ask this team.";
  else if(prRank<=3) tagline="The numbers say they're the best team right now.";
  else tagline="Every season is a new chapter. This one's worth reading.";

  // ── P1: Franchise story ──
  let p1='';
  const champStr=c.championships===0?'has never won a title':c.championships===1?'is a former champion':'is a multiple champion';
  const wPctStr=`${(wpct*100).toFixed(1)}%`;
  if(isElite&&c.championships>0){
    p1=`${t.name} ${champStr} and one of the defining franchises in The League's history. Across ${nSeasons} tracked seasons they've compiled a ${t.allTimeW}–${t.allTimeL} record — a ${wPctStr} win rate that puts them in rare air. `;
    p1+=c.championships>=2?`The trophy case already has ${c.championships} championships in it, and this organization shows no signs of slowing down. `:`A title is already on the shelf, and ${c.playoffApps} playoff appearances in ${nSeasons} seasons tells you this isn't a fluke. `;
    p1+=`They don't rebuild here — they reload.`;
  } else if(isElite&&c.championships===0){
    p1=`${t.name} is one of the most consistently excellent teams in The League's history despite ${champStr}. A ${wPctStr} win rate over ${nSeasons} seasons — ${t.allTimeW}–${t.allTimeL} — places them among the league's elite in terms of sustained performance. `;
    p1+=`${c.playoffApps} playoff appearances speak to a franchise that competes at the highest level year after year. The title has been elusive, but the body of work is impossible to dismiss.`;
  } else if(isMid&&c.playoffApps>=3){
    p1=`${t.name} has established themselves as a consistent playoff-caliber franchise in The League. Over ${nSeasons} seasons they've gone ${t.allTimeW}–${t.allTimeL} (${wPctStr}) with ${c.playoffApps} playoff appearances, proving they know how to build a team that competes. `;
    p1+=improving?`The arrow is pointing up — this team has gotten better each of the last few seasons, suggesting the ceiling hasn't been hit yet.`:`The foundation is solid. The question now is whether they can take that next step to championship contention.`;
  } else if(declining&&nSeasons>=3){
    p1=`${t.name} has had better days in The League. A career record of ${t.allTimeW}–${t.allTimeL} (${wPctStr}) shows a team that once competed, but recent seasons have been a struggle. `;
    p1+=`With ${c.playoffApps} playoff appearance${c.playoffApps!==1?'s':''} on the ledger, there's proof this franchise can reach the postseason — the challenge now is recapturing that form.`;
  } else {
    p1=`${t.name} is a franchise still writing their story in The League. Across ${nSeasons} seasons they've gone ${t.allTimeW}–${t.allTimeL} (${wPctStr}), building toward something. `;
    p1+=c.championships>0?`A championship is already on the board, which means this organization knows what it takes to win. `:`The postseason has come ${c.playoffApps} time${c.playoffApps!==1?'s':''} — the foundation for more is being laid right now. `;
    p1+=`Every dynasty starts somewhere.`;
  }

  // ── P2: Roster identity ──
  let p2='';
  const topH=hitters[0]?.name,topP=pitchers[0]?.name;
  const h2=hitters[1]?.name,p2n=pitchers[1]?.name;
  if(eliteHitters.length>=2&&elitePitchers.length>=2){
    p2=`The current roster is legitimately scary on both sides. ${eliteHitters.map(p=>p.name).join(' and ')} give them elite-tier production at the plate${strongCats.filter(c=>['R','HR','RBI','AVG','OPS'].includes(c)).length?`, led by category dominance in ${strongCats.filter(c=>['R','HR','RBI','AVG','OPS'].includes(c)).join(', ')}`:''}. `;
    p2+=`On the mound, ${elitePitchers.map(p=>p.name).join(' and ')} anchor a staff that${strongCats.filter(c=>['ERA','WHIP','K','QS'].includes(c)).length?` ranks among the league's best in ${strongCats.filter(c=>['ERA','WHIP','K','QS'].includes(c)).join(', ')}`:' competes in every pitching category'}. `;
    p2+=weakCats.length?`The one area to watch: ${weakCats.slice(0,2).join(' and ')} remain vulnerabilities that opponents will look to exploit.`:`There aren't many exploitable weaknesses on this roster — a true two-way threat.`;
  } else if(hitHeavy||starterHit>starterPit+15){
    p2=`This is a lineup-first operation. `;
    if(topH) p2+=`${topH}${h2?` and ${h2}`:''} lead an offense${strongCats.filter(c=>['R','HR','RBI','SB','AVG','OPS'].includes(c)).length?` that excels in ${strongCats.filter(c=>['R','HR','RBI','SB','AVG','OPS'].includes(c)).join(', ')}`:'designed to put up big numbers'}. `;
    p2+=`The hitting depth — ${hitters.length} active bats — is the engine that drives this team. `;
    p2+=weakCats.filter(c=>['ERA','WHIP','K','QS'].includes(c)).length?`Pitching${weakCats.filter(c=>['ERA','WHIP'].includes(c)).length?`, particularly ${weakCats.filter(c=>['ERA','WHIP'].includes(c)).join(' and ')},`:''} is the area where opponents will try to steal categories. Whether the offense can outscore those deficits is the defining question for this squad.`:`The pitching staff provides just enough support to let the lineup do its work.`;
  } else if(pitchHeavy||starterPit>starterHit+15){
    p2=`This is a pitching-first identity through and through. `;
    if(topP) p2+=`${topP}${p2n?` and ${p2n}`:''} headline a staff${strongCats.filter(c=>['ERA','WHIP','K','QS','SV'].includes(c)).length?` that dominates in ${strongCats.filter(c=>['ERA','WHIP','K','QS','SV'].includes(c)).join(', ')}`:'built to suppress opposing lineups'}. `;
    p2+=`With ${pitchers.length} active arms, the depth here is real. `;
    p2+=weakCats.filter(c=>['R','HR','RBI','AVG','OPS'].includes(c)).length?`The offense${weakCats.filter(c=>['R','HR','RBI','AVG','OPS'].includes(c)).length?` — particularly in ${weakCats.filter(c=>['R','HR','RBI','AVG','OPS'].includes(c)).slice(0,2).join(' and ')} —`:''} needs to contribute enough to let the pitching staff win close category matchups.`:`When the offense clicks, this team is a nightmare to face.`;
  } else {
    p2=`A balanced roster with pieces across the board. `;
    if(topH&&topP) p2+=`${topH} anchors the lineup while ${topP} leads the pitching staff — a reliable one-two punch at the core. `;
    p2+=strongCats.length?`Their clearest advantages come in ${strongCats.slice(0,3).join(', ')}, categories where they consistently put points on the board. `:'';
    p2+=weakCats.length?`They'll need to limit losses in ${weakCats.slice(0,2).join(' and ')} to keep matchups in their favor.`:'There are no glaring holes — just a team that competes in every category.';
  }

  // ── P3: 2026 context ──
  let p3='';
  if(prRank<=3&&c.championships>0){
    p3=`The 2026 season looks like a championship window. Power ranked #${prRank} with a composite score of ${composite.toFixed(1)}, this team has the talent to back up the expectations. `;
    p3+=`For a franchise that's already won ${c.championships} title${c.championships>1?'s':''}${curYear?`, this year's ${curYear.wins}–${curYear.losses} record`:'the current campaign'} is just the opening act. The goal is singular and everyone in the league knows it.`;
  } else if(prRank<=3){
    p3=`Power ranked #${prRank} heading into the teeth of the schedule — the numbers say this team belongs at the top. `;
    p3+=`For a franchise still chasing their first championship, this is the moment. The roster is constructed correctly, the category profile is well-rounded, and the window is open.${improving?' The trajectory over recent seasons makes this feel less like a surprise and more like an inevitability.':''}`;
  } else if(prRank>=9){
    p3=`The power rankings have them at #${prRank}, which is an honest assessment of where this team stands. `;
    p3+=weakCats.length?`Shoring up ${weakCats.slice(0,2).join(' and ')} would dramatically change their matchup profile. `:'';
    p3+=`The roster pieces are there to climb — it's a matter of putting it all together over a full season.`;
  } else {
    p3=`Sitting at power rank #${prRank} with a composite score of ${composite.toFixed(1)}, this team is squarely in the playoff conversation. `;
    const lastSeason=hist[hist.length-1];
    if(lastSeason?.madePlayoffs) p3+=`Coming off a playoff appearance, the expectation is to be back in October. `;
    else if(lastSeason&&!lastSeason.madePlayoffs) p3+=`After missing the playoffs last season, there's something to prove. `;
    p3+=`The category strengths${strongCats.length?` — especially ${strongCats.slice(0,2).join(' and ')} —`:''} give them legitimate paths to winning matchups each week.`;
  }

  // ── Outlook ──
  let outlookEmoji, outlookHead, outlookBody;
  if(prRank===1){outlookEmoji='🔥';outlookHead='The best team in the league right now. Full stop.';outlookBody=`Power ranked #1 and the composite score backs it up. ${topH||'The lineup'} and ${topP||'the rotation'} give this team the two-way profile that wins championships. If the season ended today, they'd be the favorites.`;}
  else if(prRank<=3&&c.championships>0){outlookEmoji='🏆';outlookHead='Championship window is wide open.';outlookBody=`A proven champion sitting in the top 3 of power rankings — this is a dangerous combination. The roster is built for October and the track record shows they know how to win when it matters.`;}
  else if(prRank<=3){outlookEmoji='⚡';outlookHead='Legitimate title contender. First one would mean everything.';outlookBody=`Top-3 power ranking, elite roster construction, and a franchise hungry for their first title. All the ingredients are there. 2026 could be the year it all comes together.`;}
  else if(prRank<=6){outlookEmoji='🏟️';outlookHead='Playoff-bound. Dangerous in a short series.';outlookBody=`A comfortable power ranking in the playoff picture. This team has the category depth to steal matchups on any given week — and in the postseason, anything can happen.`;}
  else if(improving){outlookEmoji='📈';outlookHead="Rising fast. Don't sleep on this team.";outlookBody=`The trend line is going the right direction. Recent seasons show consistent improvement, the roster construction is getting sharper, and the power ranking will follow.`;}
  else if(declining){outlookEmoji='⚠️';outlookHead="A rebuild is in progress. The pieces are there.";outlookBody=`Recent seasons haven't matched the franchise's best days, but the foundation is still present. A few smart moves and this team can be back in the postseason picture faster than the standings suggest.`;}
  else{outlookEmoji='⚾';outlookHead="Still competing. Never count them out.";outlookBody=`Middle of the power rankings but capable of beating anyone in a given week. Fantasy baseball is volatile — this team has enough category upside to make noise.`;}

  return{tagline,p1,p2,p3,outlookEmoji,outlookHead,outlookBody};
}

  );
  // Filter to active roster — treat undefined flags as false (not on bench/IL)
  const allPlayers=rosterTeam?.players||[];
  const activePlayers=allPlayers.filter(p=>p.onBench===false&&p.onIL===false);

  const useFallback=activePlayers.length===0&&allPlayers.length>0;
  const effectivePlayers=useFallback
    ? allPlayers.filter(p=>!['BE','IL'].includes(p.slot))
    : activePlayers;
  const hitters=effectivePlayers.filter(p=>!p.isPitcher).sort((a,b)=>(b.hitScore||0)-(a.hitScore||0));
  const pitchers=effectivePlayers.filter(p=>p.isPitcher).sort((a,b)=>(b.pitchScore||0)-(a.pitchScore||0));

  // Pull power ranking data for this team
  const prData=window._prData?.find?.(p=>p.name===t.name)||null;

  // Generate narrative from data
  const nar=generateNarrative(t, rosterTeam, prData);
  const{tagline,p1,p2,p3,outlookEmoji,outlookHead,outlookBody}=nar;

  function playerRow(p,is_hit){
    const cats=is_hit?['R','HR','RBI','SB','AVG','OPS']:['IP','QS','ERA','WHIP','K','SV'];
    const catStr=cats.filter(c=>p.stats[c]!==undefined).join(' · ');
    const tbadge=p.tier==='ELITE'?'<span class="res-elite">⭐ ELITE</span>':p.tier==='SOLID'?'<span class="res-solid">SOLID</span>':'';
    return`<div class="res-player">
      <div class="res-pos">${p.position}</div>
      <div class="res-player-info">
        <div class="res-player-name">${p.name}${tbadge}</div>
        <div class="res-player-cats">${catStr}</div>
      </div>
    </div>`;
  }

  const coreHitters=hitters.slice(0,5);const moreH=hitters.length-5;
  const corePitchers=pitchers.slice(0,5);const moreP=pitchers.length-5;

  // Season history
  const hist=t.seasonHistory||[];
  const histRows=hist.map(s=>{
    const fr=s.finalRank;const rc=s.champion?'champ':s.runnerUp?'runu':s.madePlayoffs?'playoff':'other';
    const icon=s.champion?'🏆':s.runnerUp?'🥈':s.madePlayoffs?'🏟️':'';
    return`<div class="res-season-row"><span class="res-sy">${s.season}</span><span class="res-srec"><span class="win">${s.wins}</span>–<span class="loss">${s.losses}</span> · ${(s.winPct*100).toFixed(0)}%</span><span class="res-srank ${rc}">${fr?`#${fr}`:icon||'—'} ${icon&&fr?icon:''}</span></div>`;
  }).join('');

  const peakSorted=hist.filter(s=>s.finalRank>0).sort((a,b)=>a.finalRank-b.finalRank);
  const peak=peakSorted[0];

  return`<div class="resume-wrap">
    <!-- Hero -->
    <div class="res-hero">
      <div class="res-top">
        <div class="res-badge">${t.allNames?.[0]?.substring(0,2)||t.name.substring(0,2)}</div>
        <div class="res-title-block">
          <div class="res-name">${t.name}</div>
          <div class="res-tagline">${tagline}</div>
          <div class="res-owner">Legacy Rank #${t.legacyRank} · ${t.seasonsTracked} seasons tracked · The League</div>
        </div>
        <button class="res-close" onclick="closeResume()">✕ Close</button>
      </div>
      <div class="res-stats-row">
        <div class="res-stat"><div class="res-stat-val g">${t.allTimeW}</div><div class="res-stat-lbl">All-Time W</div></div>
        <div class="res-stat"><div class="res-stat-val">${t.allTimeL}</div><div class="res-stat-lbl">All-Time L</div></div>
        <div class="res-stat"><div class="res-stat-val g">${wpct}%</div><div class="res-stat-lbl">Win %</div></div>
        <div class="res-stat"><div class="res-stat-val gold">${c.championships||0}</div><div class="res-stat-lbl">Titles</div></div>
        <div class="res-stat"><div class="res-stat-val">${c.playoffApps||0}</div><div class="res-stat-lbl">Playoffs</div></div>
        <div class="res-stat"><div class="res-stat-val">${c.winningSeasons||0}</div><div class="res-stat-lbl">Win Seas.</div></div>
      </div>
    </div>

    <!-- Body -->
    <div class="res-body">

      <!-- Team Identity -->
      <div class="res-section-title">Team Identity</div>
      <div class="res-text">${p1}</div>
      <div class="res-text">${p2}</div>
      <div class="res-text">${p3}</div>
      <hr class="res-divider"/>

      <!-- Hitting + Pitching Core -->
      ${rosterTeam?`
      <div class="res-cores">
        <div>
          <div class="res-core-title">Hitting Core (${hitters.length} Players)</div>
          ${coreHitters.map(p=>playerRow(p,true)).join('')}
          ${moreH>0?`<div class="res-more">+ ${moreH} more active hitters</div>`:''}
        </div>
        <div>
          <div class="res-core-title">Pitching Core (${pitchers.length} Players)</div>
          ${corePitchers.map(p=>playerRow(p,false)).join('')}
          ${moreP>0?`<div class="res-more">+ ${moreP} more active arms</div>`:''}
        </div>
      </div>
      <hr class="res-divider"/>`:''}

      <!-- Season History + Outlook -->
      <div class="res-bottom">
        <div>
          <div class="res-section-title">Season by Season</div>
          ${histRows||'<div style="font-family:var(--font-m);font-size:10px;color:rgba(255,255,255,.25)">No season data yet.</div>'}
        </div>
        <div>
          <div class="res-section-title">2026 Outlook</div>
          <div class="res-outlook">
            <div class="res-outlook-head">${outlookEmoji} ${outlookHead}</div>
            <div class="res-outlook-body">${outlookBody}</div>
          </div>
          ${peak?`<div class="res-peak">
            <div class="res-peak-lbl">Peak Season</div>
            <div class="res-peak-year">${peak.season} — Rank #${peak.finalRank}</div>
            <div class="res-peak-detail">${peak.wins}–${peak.losses} · ${(peak.winPct*100).toFixed(0)}% win rate</div>
          </div>`:''}
        </div>
      </div>

    </div><!-- /res-body -->
  </div>`;
}

let activeOwnerKey=null;
function openResume(ownerKey, fromTab=false){
  let t=LEGACY.find(x=>x.ownerKey===ownerKey);
  // Fallback: build a stub legacy object from roster data
  if(!t && ownerKey.startsWith('r_')){
    const rosterId=parseInt(ownerKey.replace('r_',''));
    const rt=ROSTERS?.teams?.find(r=>r.teamId===rosterId);
    if(!rt)return;
    t={
      ownerKey,name:rt.name,abbrev:rt.abbrev,allNames:[rt.name],
      legacyRank:'—',legacyScore:0,seasonsTracked:0,
      allTimeW:0,allTimeL:0,winPct:0,
      components:{championships:0,runnerUps:0,playoffApps:0,winningSeasons:0,consistencyBonus:0,catBalanceBonus:0},
      seasonHistory:[],trophyCase:[],bestSeason:null,worstSeason:null,
      longestWinStreak:0,longestLossStreak:0,h2hRecords:[],
    };
  }
  if(!t)return;
  activeOwnerKey=ownerKey;
  document.querySelectorAll('.leg-card').forEach(c=>c.classList.toggle('open',c.id===`lc-${ownerKey}`));
  const html=buildResume(t, fromTab);
  if(fromTab){
    document.getElementById('res-detail').innerHTML=html;
    document.querySelector('[data-sub="fr-res"]').click();
  } else {
    document.getElementById('leg-resume-slot').innerHTML=html;
    setTimeout(()=>document.getElementById('leg-resume-slot').scrollIntoView({behavior:'smooth',block:'start'}),80);
  }
}
function closeResume(){
  document.getElementById('leg-resume-slot').innerHTML='';
  document.querySelectorAll('.leg-card').forEach(c=>c.classList.remove('open'));
  activeOwnerKey=null;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async()=>{
  try{
    const meta=await load('meta.json');
    document.getElementById('hdr-year').textContent=meta.season;
    document.getElementById('hdr-team').textContent=meta.myTeam;
    document.getElementById('hdr-updated').textContent=`Updated ${fmt(meta.updated)}`;
  }catch(_){}
  renderStandings();
  renderMatchups();
  renderPowerRankings();
  renderTeamStats();
  renderRosters();
  loadHistory();
  loadFranchise();
})();
</script>
</body>
