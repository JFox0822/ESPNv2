                <div style="font-family:var(--fm);font-size:9px;color:var(--ink2);margin-top:2px">${recStr(daddy)} · ${pctStr(daddy)} win rate</div>
              </div>
              <div style="background:rgba(231,76,60,.06);border:1px solid rgba(231,76,60,.25);border-radius:6px;padding:10px 12px">
                <div style="font-family:var(--fm);font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:4px">😤 Nemesis</div>
                <div style="font-family:var(--fd);font-size:18px;font-weight:900;color:var(--red)">${nemesis.opp}</div>
                <div style="font-family:var(--fm);font-size:9px;color:var(--ink2);margin-top:2px">${recStr(nemesis)} · ${pctStr(nemesis)} win rate</div>
              </div>
            </div>
            ${nar.peakElo?`<div style="margin-top:8px;font-family:var(--fm);font-size:9px;color:var(--ink3)">📈 <b style="color:var(--blue)">Peak ELO:</b> ${nar.peakElo.elo} (${nar.peakElo.season})</div>`:''}`;
          })()}
        </div>
        <div>
          <div class="res-sec">2026 Outlook</div>
          <div class="res-outlook"><div class="res-oh">${oHead}</div><div class="res-ob">${oBody}</div></div>
          ${nar.bestSeason?`<div class="res-peak"><div class="res-pk-lbl">Best Season</div><div class="res-pk-val">${(()=>{
              const yr=String(nar.bestSeason.year);
              const standings=RB.standings?.[yr]||[];
              const entry=standings.find(s=>s.team===key);
              const rank=entry?.rank||nar.bestSeason.rank||'?';
              return nar.bestSeason.year+' — Reg Season #'+rank;
            })()}</div>
            <div class="res-pk-d">${nar.bestSeason.w}–${nar.bestSeason.l}${nar.bestSeason.t?'–'+nar.bestSeason.t:''} · ${((nar.bestSeason.pct??0)*100).toFixed(0)}%</div>
            <div class="res-pk-d" style="margin-top:3px">${(()=>{
              const yr=nar.bestSeason.year;
              const champ=RB.championships?.find(c=>c.year===yr);
              if(!champ) return '';
              if(champ.champion===key) return '🏆 Champion';
              if(champ.runnerUp===key) return '🥈 Runner-Up';
              // Determine playoff finish from regular season rank
              const standings=RB.standings?.[String(yr)]||[];
              const entry=standings.find(s=>s.team===key);
              const rank=entry?.rank;
              if(!rank) return '';
              if(rank<=6) return '🏟 Playoff appearance (seed #'+rank+')';
              return 'Did not qualify (finished #'+rank+')';
            })()}</div>
          </div>`:''}
          ${lr?.detail?`<div class="res-peak" style="margin-top:8px"><div class="res-pk-lbl">Score Breakdown</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px;font-family:var(--fm);font-size:9px;color:var(--ink3)">${['rings','sustained','dominance','consistency','acumen'].map(k=>`<div>${k}: <b style="color:var(--ink)">${(lr[k]||0).toFixed(1)}</b></div>`).join('')}</div></div>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

// ═══ CHAMPIONSHIPS ═══
function renderChampions(){
  const champs=(RB.championships||[]).slice().reverse();
  const counts={};champs.forEach(c=>{counts[c.champion]=(counts[c.champion]||0)+1;});
  const ranked=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const cards=champs.map(c=>`<div class="champ-card champ"><div class="champ-year">${c.year}</div><div class="champ-name">🏆 ${c.champion}</div><div class="champ-runner">Runner-up: ${c.runnerUp}</div></div>`).join('');
  const cRows=ranked.map(([team,n],i)=>{const mine=isMineExact(team);return`<tr class="${mine?'mine':''}"><td class="rk" style="color:${i===0?'var(--gold)':i===1?'#94a3b8':'#cd7f32'}">${i+1}</td><td class="${mine?'wt':''} bt">${team}</td><td class="r" style="font-family:var(--fd);font-size:24px;font-weight:900;color:var(--gold)">${n}</td><td style="font-size:18px;letter-spacing:2px">${'🏆'.repeat(n)}</td></tr>`;}).join('');
  document.getElementById('champ-c').innerHTML=`${sh('Championship History','2013–2025')}<div class="champ-grid" style="margin-bottom:28px">${cards}</div>${sh('All-Time Title Count','')}<div class="tw"><table><thead><tr><th class="c">#</th><th>Owner</th><th class="r">Titles</th><th></th></tr></thead><tbody>${cRows}</tbody></table></div>`;
}

// ═══ HALL OF FAME ═══
function renderHOF(){
  const seasons=(RB.playerRater?.seasons||[]).slice(0,50);
  const summary=(RB.playerRater?.teamSummary||[]).sort((a,b)=>b.allStar-a.allStar);
  const prRows=seasons.map((p,i)=>`<tr><td class="rk" style="color:${i===0?'var(--gold)':i===1?'#94a3b8':i===2?'#cd7f32':'var(--ink3)'}">${i+1}</td><td class="bt">${p.player}</td><td style="color:var(--green);font-family:var(--fd);font-size:15px;font-weight:700">${p.team}</td><td class="r dt">${p.year}</td><td class="r" style="font-family:var(--fd);font-size:18px;font-weight:900;color:var(--gold)">${p.score.toFixed(2)}</td></tr>`).join('');
  const sumRows=summary.map(t=>{const mine=isMineExact(t.team);return`<tr class="${mine?'mine':''}"><td class="${mine?'wt':''} bt">${t.team}</td><td class="r dt">${t.allStar}</td><td class="r dt">${t.mvp}</td><td class="r dt">${t.num1}</td><td class="r dt">${t.bestSeason}</td><td class="r" style="font-family:var(--fd);font-size:16px;color:var(--gold)">${t.bestScore.toFixed(2)}</td></tr>`;}).join('');
  document.getElementById('hof-c').innerHTML=`${sh('Hall of Fame','Top Single-Season Player Rater Scores')}<div class="tw" style="margin-bottom:28px"><table><thead><tr><th class="c">#</th><th>Player</th><th>Owner</th><th class="r">Year</th><th class="r">Rating</th></tr></thead><tbody>${prRows}</tbody></table></div>${sh('Team Acumen','All-Star & MVP seasons per franchise')}<div class="tw"><table><thead><tr><th>Owner</th><th class="r">All-Stars</th><th class="r">MVPs</th><th class="r">#1 Overall</th><th class="r">Best Season</th><th class="r">Best Score</th></tr></thead><tbody>${sumRows}</tbody></table></div>`;
}



// ═══ DRAFT + KEEPERS ═══
async function renderDraft() {
  try {
    const data = await load('draft.json');
    const picks = data.picks || [];
    if (!picks.length) { document.getElementById('ros-draft-c').innerHTML = '<div class="state">Draft data not yet available. Will populate after league drafts.</div>'; return; }
    const teams = [...new Set(picks.map(p=>p.team))].sort();
    let curTeam = MY_TEAM && teams.includes(MY_TEAM) ? MY_TEAM : teams[0];
    function draw() {
      const tPicks = picks.filter(p=>p.team===curTeam);
      const opts = teams.map(t=>`<option value="${t}" ${t===curTeam?'selected':''}>${t}</option>`).join('');
      const rows = tPicks.map(p=>`<tr class="${p.keeperEligible?'mine':''}">
        <td class="rk">${p.round}</td><td class="c dt">${p.pick}</td>
        <td class="bt">${p.player}</td>
        <td class="c">${p.keeperEligible?'<span style="color:var(--green);font-family:var(--fm);font-size:9px">✅ Eligible</span>':'<span style="color:var(--ink3);font-family:var(--fm);font-size:9px">—</span>'}</td>
      </tr>`).join('');
      document.getElementById('ros-draft-c').innerHTML = `${sh('2026 Draft Results', '')}
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
          <label style="font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3)">Owner</label>
          <select class="dropdown" id="draft-sel">${opts}</select>
        </div>
        <div class="tw"><table>
          <thead><tr><th class="c">Rd</th><th class="c">Pick</th><th>Player</th><th class="c">Keeper?</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
        <div style="margin-top:10px;font-family:var(--fm);font-size:8px;color:var(--ink3)">Rounds 13+ are keeper eligible · Free agent pickups also eligible</div>`;
      document.getElementById('draft-sel').addEventListener('change',e=>{curTeam=e.target.value;draw();});
    }
    draw();
  } catch(_) {
    document.getElementById('ros-draft-c').innerHTML = '<div class="state">Draft data not yet available — runs after the draft.</div>';
  }
}

async function renderKeepers() {
  const el = document.getElementById('ros-keep-c');
  try {
    const {teams} = await load('rosters.json');
    if (!teams?.length) {
      el.innerHTML = `${sh('Keeper Eligible Players','Round 13+ draft picks · FA/Waiver pickups')}<div class="info-box">No roster data — trigger the GitHub Action to populate.</div>`;
      return;
    }

    const keeperMap = {}; // teamName -> [{name, source}]

    // ── Path A: new rosters.json format has keeperEligible on each player ──
    const hasNewFormat = 'keeperEligible' in (teams[0]?.players?.[0] || {});
    if (hasNewFormat) {
      teams.forEach(t => {
        const elig = (t.players||[]).filter(p => p.keeperEligible);
        if (elig.length) keeperMap[t.name] = elig.map(p => ({
          name: p.name,
          source: p.draftRound >= 13 ? `Rd ${p.draftRound} pick` : 'FA/Waiver add',
        }));
      });
    }

    // ── Path B: cross-reference draft.json picks ──
    if (!Object.keys(keeperMap).length) {
      let picks = [];
      try { picks = (await load('draft.json')).picks || []; } catch(_) {}

      if (picks.length) {
        // Build lookup: "team::player" → round
        const byTeamPlayer = {};
        picks.forEach(p => { byTeamPlayer[`${p.team}::${p.player}`] = p.round; });

        teams.forEach(t => {
          const elig = [];
          (t.players||[]).forEach(p => {
            // Match player name to draft pick (try exact, then last name)
            const exact = byTeamPlayer[`${t.name}::${p.name}`];
            if (exact !== undefined) {
              if (exact >= 13) elig.push({name: p.name, source: `Rd ${exact} pick`});
              // rounds 1-12 = NOT eligible, skip
            } else {
              // Not in draft = FA/Waiver pickup = eligible
              elig.push({name: p.name, source: 'FA/Waiver add'});
            }
          });
          if (elig.length) keeperMap[t.name] = elig;
        });
      }
    }

    // ── Path C: no draft data yet — show all rostered players as pre-draft ──
    if (!Object.keys(keeperMap).length) {
      teams.forEach(t => {
        const players = (t.players||[]).filter(p => p.name && p.slot !== 'NA');
        if (players.length) keeperMap[t.name] = players.map(p => ({name: p.name, source: 'TBD'}));
      });
    }

    if (!Object.keys(keeperMap).length) {
      el.innerHTML = `${sh('Keeper Eligible Players','Round 13+ draft picks · FA/Waiver pickups')}<div class="info-box">No roster data — trigger the GitHub Action to populate.</div>`;
      return;
    }

    const isPreDraft = Object.values(keeperMap).flat().every(p => p.source === 'TBD');

    const teamRows = Object.entries(keeperMap)
      .sort((a,b) => a[0].localeCompare(b[0]))
      .map(([team, players]) => {
        const mine = isMine(team);
        const pRows = players
          .sort((a,b) => a.name.localeCompare(b.name))
          .map(p => {
            const srcCol = p.source.startsWith('Rd') ? 'var(--green)' :
                           p.source.startsWith('FA') ? 'var(--blue)' : 'var(--ink3)';
            return `<tr class="${mine?'mine':''}">
              <td class="bt">${p.name}</td>
              <td class="c dt" style="font-family:var(--fm);font-size:9px;color:${srcCol}">${p.source}</td>
            </tr>`;
          }).join('');
        return `<div style="margin-bottom:20px">
          <div style="font-family:var(--fd);font-size:18px;font-weight:800;text-transform:uppercase;margin-bottom:8px;${mine?'color:var(--green)':''}">
            ${team} <span style="font-family:var(--fm);font-size:10px;font-weight:400;color:var(--ink3)">(${players.length})</span>
          </div>
          <div class="tw"><table>
            <thead><tr><th>Player</th><th class="c">Source</th></tr></thead>
            <tbody>${pRows}</tbody>
          </table></div>
        </div>`;
      }).join('');

    el.innerHTML = `${sh('Keeper Eligible Players','Round 13+ draft picks · FA/Waiver pickups · Refreshes with every roster update')}
      ${isPreDraft ? `<div class="info-box" style="background:rgba(240,180,41,.08);border-color:rgba(240,180,41,.2);color:var(--gold);margin-bottom:16px">
        ⚑ Draft data not yet available — showing all rostered players. Source column will update to show Rd 13+ or FA/Waiver once draft.json is populated.
      </div>` : `<div style="display:flex;gap:16px;flex-wrap:wrap;font-family:var(--fm);font-size:9px;color:var(--ink3);margin-bottom:16px">
        <div><span style="color:var(--green)">■</span> Rd 13+ draft pick</div>
        <div><span style="color:var(--blue)">■</span> FA/Waiver add</div>
      </div>`}
      ${teamRows}`;
  } catch(e) {
    el.innerHTML = `<div class="state err">⚠ ${e.message}</div>`;
  }
}


// ═══ KING OF THE HILL ═══
async function renderKOH() {
  const c = document.getElementById('koh-c');
  let state;
  try {
    state = await load('koh.json');
  } catch(_) {
    c.innerHTML = `${sh('King of the Hill','Track it →')}
      <div class="info-box" style="background:rgba(240,180,41,.08);border-color:rgba(240,180,41,.2);color:var(--gold)">
        ⚑ KOH tracking begins with the 2026 season. Data will appear here after the first week's matchups are finalized and the daily refresh runs.
      </div>
      <div style="font-family:var(--fm);font-size:10px;color:var(--ink3);line-height:1.9;margin-top:16px">
        <b style="color:var(--ink)">How it works:</b> Every week, all 6 losing teams are identified.
        Among those losers, the team that won the fewest categories is eliminated from KOH.
        If there's a tie, all tied teams are eliminated. The last team standing wins the round — 
        then it resets and all 12 teams start fresh. Multiple rounds can occur in a single season.
      </div>`;
    return;
  }

  const teams12 = (RB.legacyRankings?.rankings||[]).map(t=>t.team);
  const noWeeksPlayed = !(state.history?.length);
  // If no weeks played yet, all teams are alive by default
  const activeSet = noWeeksPlayed
    ? new Set(teams12)
    : new Set(state.active || []);
  const elimMap = {};
  (state.eliminated||[]).forEach(e => elimMap[e.team] = e);
  const champNames = (state.champions||[]).map(c=>c.team);

  // Cards
  const cards = teams12.map(name => {
    const alive = activeSet.has(name);
    // Try matching by name fragment since active stores IDs sometimes
    const eInfo = elimMap[name];
    const isChamp = champNames.includes(name);
    const mine = isMineExact(name);
    const status = isChamp ? 'koh-champ-lbl' : alive ? 'koh-alive' : 'koh-dead';
    const statusTxt = isChamp ? '🏆 Champion' : alive ? '✅ Alive' : `❌ Out (W${eInfo?.week||'?'}, ${eInfo?.catWins??'?'} cats)`;
    const cls = isChamp ? 'champ' : alive ? 'alive' : 'dead';
    return `<div class="koh-card ${cls} ${mine?'mine':''}">
      <div class="koh-cname" style="${!alive&&!isChamp?'color:var(--red)':isChamp?'color:var(--gold)':mine?'color:var(--green)':''}">${name}</div>
      <div class="koh-status ${status}">${statusTxt}</div>
    </div>`;
  }).join('');

  // Timeline
  const hist = (state.history||[]).sort((a,b)=>a.week-b.week);
  const timeline = hist.map(w => {
    const elims = w.eliminated || [];
    const champion = w.champion ? `<div style="font-family:var(--fd);font-size:16px;font-weight:900;color:var(--gold);padding:8px 14px">🏆 ${w.champion} wins this round!</div>` : '';
    const elimRows = elims.map(e => `<div class="koh-elim-row">
      <span class="koh-skull">💀</span>
      <span class="koh-ename">${e.team}</span>
      <span class="koh-cats">${e.catWins} cat ${e.catWins===1?'win':'wins'} (fewest among losers)</span>
    </div>`).join('');

    // Survivors
    const allActive = Object.entries(w.allActive||{});
    const survs = allActive.filter(([,alive])=>alive).map(([t])=>t);
    const survTags = survs.length ? `<div class="koh-surviv">${survs.map(t=>`<div class="koh-s-tag">${t}</div>`).join('')}</div>` : '';

    return `<div class="koh-week">
      <div class="koh-week-hd"><span class="koh-week-lbl">Week ${w.week} — Round ${w.round||state.currentRound||1}</span>
        <span style="font-family:var(--fm);font-size:9px;color:var(--ink3)">${elims.length} eliminated</span></div>
      ${elimRows||'<div style="padding:8px 14px;font-family:var(--fm);font-size:9px;color:var(--ink3)">No active team lost this week</div>'}
      ${champion}${survTags}
    </div>`;
  }).join('');

  const surviving = teams12.filter(n => activeSet.has(n));
  const roundInfo = noWeeksPlayed
    ? `Round 1 · Season hasn't started — all 12 alive`
    : `Round ${state.currentRound||1} · ${surviving.length} of 12 surviving`;

  c.innerHTML = `${sh('King of the Hill', roundInfo)}
    <div style="font-family:var(--fm);font-size:9px;color:var(--ink3);margin-bottom:20px;line-height:1.8">
      Each week: among all <b style="color:var(--ink)">losing teams</b>, the team with <b style="color:var(--red)">fewest category wins</b> is eliminated.
      Ties = both eliminated. Last team standing wins the round — then all 12 reset.
    </div>
    ${champNames.length ? `<div style="background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.2);border-radius:8px;padding:16px 20px;margin-bottom:20px"><div style="font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px">Champions</div>${champNames.map((n,i)=>`<div style="font-family:var(--fd);font-size:18px;font-weight:900">🏆 ${n} <span style="font-size:12px;color:var(--ink3)">Round ${i+1}, Week ${(state.champions||[])[i]?.week||'?'}</span></div>`).join('')}</div>` : ''}
    <div style="font-family:var(--fm);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px">Current Status</div>
    <div class="koh-grid">${cards}</div>
    ${hist.length ? `<div style="font-family:var(--fm);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;margin-top:8px">Weekly Timeline</div>
    <div class="koh-timeline">${timeline}</div>` : ''}`;
}
